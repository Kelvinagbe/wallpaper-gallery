name: Build Android APK + AAB (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SDK: /usr/local/lib/android/sdk
      JAVA_DIR: android/app/src/main/java/ng/name/ovrica/walls
      RES: android/app/src/main/res
      KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK"     >> $GITHUB_ENV
          mkdir -p $SDK/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > $SDK/licenses/android-sdk-license
          echo "y" | $SDK/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: Install dependencies & Configure Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          [ -f "public/app/index.html" ] || (echo "ERROR: public/app/index.html not found." && exit 1)
          printf '{"appId":"ng.name.ovrica.walls","appName":"Walls","webDir":"public/app","android":{"allowMixedContent":true,"backgroundColor":"#000000"}}' \
            > capacitor.config.json
          npx cap add android

          # ── Copy icon to resources/ ──────────────────────────────────────────
          mkdir -p resources
          ICON_SRC="public/icon/icon-512x512.png"
          if [ -f "$ICON_SRC" ]; then
            cp "$ICON_SRC" resources/icon.png && echo "Icon copied"
          else
            echo "WARNING: $ICON_SRC not found — using Capacitor default icon"
          fi

          # ── Generate mipmap sizes with @capacitor/assets then Pillow ─────────
          if [ -f "resources/icon.png" ]; then
            npx @capacitor/assets generate --android \
              --iconBackgroundColor '#000000' \
              --iconBackgroundColorDark '#000000' 2>&1 || true

            pip install pillow --break-system-packages -q
            python3 - "resources/icon.png" "$RES" <<'ICONEOF'
import sys, os
from PIL import Image
src, res = sys.argv[1], sys.argv[2]
img = Image.open(src).convert("RGBA")
sizes = {"mipmap-mdpi":48,"mipmap-hdpi":72,"mipmap-xhdpi":96,"mipmap-xxhdpi":144,"mipmap-xxxhdpi":192}
for folder, px in sizes.items():
    d = os.path.join(res, folder); os.makedirs(d, exist_ok=True)
    out = img.resize((px,px), Image.LANCZOS)
    out.save(os.path.join(d,"ic_launcher.png"))
    out.save(os.path.join(d,"ic_launcher_round.png"))
print("Icons generated from", src)
ICONEOF
          fi

      - name: Copy google-services.json
        run: cp public/google-services.json android/app/google-services.json

      - name: Write resource files
        run: |
          mkdir -p "$RES/xml" "$RES/values" "$RES/drawable"

          cat > "$RES/xml/file_paths.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="walls_downloads" path="Pictures/Walls/" />
            <external-path name="external_files" path="." />
            <external-files-path name="external_files_path" path="." />
            <cache-path name="cache" path="." />
          </paths>
EOF

          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="ic_launcher_background">#000000</color></resources>' \
            > "$RES/values/ic_launcher_background.xml"

          cat > "$RES/values/styles.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
              <item name="android:windowBackground">#000000</item>
              <item name="colorPrimary">#6c63ff</item>
              <item name="colorPrimaryDark">#000000</item>
              <item name="colorAccent">#6c63ff</item>
            </style>
            <style name="Theme.App.SplashScreen" parent="Theme.SplashScreen">
              <item name="windowSplashScreenBackground">#000000</item>
              <item name="windowSplashScreenAnimatedIcon">@mipmap/ic_launcher</item>
              <item name="postSplashScreenTheme">@style/AppTheme</item>
            </style>
          </resources>
EOF

          cat > "$RES/drawable/ic_notification.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
            <path android:fillColor="#FFFFFF"
                android:pathData="M12,2C8.13,2 5,5.13 5,9v6l-2,2v1h18v-1l-2,-2V9C19,5.13 15.87,2 12,2zM12,22c1.1,0 2,-0.9 2,-2h-4C10,21.1 10.9,22 12,22z"/>
          </vector>
EOF

      - name: Write MainActivity.java
        run: |
          mkdir -p "$JAVA_DIR"
          cat > "$JAVA_DIR/MainActivity.java" <<'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.content.pm.PackageManager;
          import android.content.res.Configuration;
          import android.database.Cursor;
          import android.graphics.*;
          import android.graphics.drawable.ColorDrawable;
          import android.Manifest;
          import android.net.Uri;
          import android.os.*;
          import android.provider.MediaStore;
          import android.webkit.*;
          import android.widget.Toast;
          import android.view.View;
          import android.view.WindowManager;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AlertDialog;
          import androidx.core.app.*;
          import androidx.core.content.*;
          import androidx.core.splashscreen.SplashScreen;
          import com.getcapacitor.BridgeActivity;
          import com.google.firebase.messaging.FirebaseMessaging;
          import org.json.*;
          import java.io.*;
          import java.net.*;
          import java.util.HashMap;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends BridgeActivity {

              static final String DL_CH    = "walls_downloads";
              static final String PROMO_CH = "walls_promo";
              static final String TREND_CH = "walls_trending";
              static final String PREF_FILE = "walls_prefs";
              static final String BASE_URL  = "https://walls.ovrica.name.ng";

              private static final int REQ_STORAGE = 1002, REQ_NOTIF = 1001;
              private static final int NOTIF_WELCOME = 4001;
              private static final String AUTHORITY = "ng.name.ovrica.walls.fileprovider";
              private static final String WALLS_FOLDER = "Walls";

              private final HashMap<Long, DownloadInfo> activeDownloads = new HashMap<>();
              private static int nextNotifId = 3000;

              private NotificationManager nm;
              private BroadcastReceiver dlReceiver;
              private final Handler progressHandler = new Handler(Looper.getMainLooper());
              private Runnable progressRunnable;
              private String pendingDlUrl, pendingDlName, pendingWpUrl, pendingWpTarget;
              private long backPressedTime = 0;
              private boolean webLoaded = false, splashDone = false;
              private int lastBgColor = 0;
              // Tracks whether onboarding has been shown this session
              private boolean onboardingShownThisSession = false;

              static class DownloadInfo {
                  String filename, localPath;
                  int notifIngId, notifDoneId;
                  long startTime;
                  DownloadInfo(String f) {
                      filename = f; startTime = System.currentTimeMillis();
                      notifIngId = nextNotifId++; notifDoneId = nextNotifId++;
                  }
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  SplashScreen splash = SplashScreen.installSplashScreen(this);
                  splash.setKeepOnScreenCondition(() -> !splashDone);
                  lastBgColor = Color.parseColor(isDarkTheme() ? "#111318" : "#F1F3F4");
                  getWindow().setBackgroundDrawable(new ColorDrawable(lastBgColor));
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS);
                  super.onCreate(savedInstanceState);
                  applySystemTheme();
                  FirebaseMessaging.getInstance().getToken().addOnCompleteListener(task -> {
                      if (!task.isSuccessful()) return;
                      String token = task.getResult();
                      android.util.Log.d("FCM", "Token: " + token);
                      getSharedPreferences(PREF_FILE, MODE_PRIVATE).edit().putString("fcm_token", token).apply();
                  });
              }

              @Override
              public void onStart() {
                  super.onStart();
                  nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  mkChannel(DL_CH,    "Walls Downloads",     "Wallpaper download notifications");
                  mkChannel(PROMO_CH, "Wallpaper Reminders", "Periodic reminders");
                  mkChannel(TREND_CH, "Trending Wallpapers", "Hot & trending wallpaper picks");
                  if (getBridge() != null && getBridge().getWebView() != null && !webLoaded) {
                      setupWebView(); setupJsBridge(); webLoaded = true;
                  }
                  registerDlReceiver(); scheduleReminder();
                  handleDeepLink(getIntent()); handleNotifUrl(getIntent());
                  showWelcome();
                  // checkForUpdate is now called from onPageFinished after WebView loads
              }

              @Override public void onNewIntent(Intent i) { super.onNewIntent(i); setIntent(i); handleDeepLink(i); handleNotifUrl(i); }

              @Override
              public void onResume() {
                  super.onResume();
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) return;
                  int newBg = Color.parseColor(isDarkTheme() ? "#111318" : "#F1F3F4");
                  if (newBg != lastBgColor) { lastBgColor = newBg; getWindow().setBackgroundDrawable(new ColorDrawable(newBg)); wv.setBackgroundColor(newBg); }
                  String url = wv.getUrl();
                  if (url == null || url.equals("about:blank")) wv.loadUrl(BASE_URL);
                  // If user returns from Settings while onboarding step 1 is showing, refresh badges
                  wv.evaluateJavascript(
                      "(function(){return document.getElementById('walls-ob')!=null})()",
                      val -> { if ("true".equals(val)) runOnUiThread(() -> showOnboardingStep(1)); });
              }

              @Override public void onConfigurationChanged(Configuration c) { super.onConfigurationChanged(c); applySystemTheme(); }

              @Override
              public void onBackPressed() {
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null && wv.canGoBack()) { wv.goBack(); return; }
                  if (System.currentTimeMillis() - backPressedTime < 2000) { super.onBackPressed(); return; }
                  backPressedTime = System.currentTimeMillis();
                  Toast.makeText(this, "Press back again to exit", Toast.LENGTH_SHORT).show();
              }

              @Override
              public void onDestroy() {
                  super.onDestroy(); stopProgressPolling();
                  if (dlReceiver != null) try { unregisterReceiver(dlReceiver); } catch (Exception ignored) {}
              }

              private boolean isDarkTheme() {
                  return (getResources().getConfiguration().uiMode & Configuration.UI_MODE_NIGHT_MASK) == Configuration.UI_MODE_NIGHT_YES;
              }

              private void applySystemTheme() {
                  boolean dark = isDarkTheme();
                  int bg = Color.parseColor(dark ? "#111318" : "#F1F3F4");
                  lastBgColor = bg; getWindow().setBackgroundDrawable(new ColorDrawable(bg));
                  getWindow().setStatusBarColor(bg); getWindow().setNavigationBarColor(bg);
                  View decor = getWindow().getDecorView();
                  int flags = decor.getSystemUiVisibility();
                  if (!dark) flags |= View.SYSTEM_UI_FLAG_LIGHT_NAVIGATION_BAR | View.SYSTEM_UI_FLAG_LIGHT_STATUS_BAR;
                  else       flags &= ~(View.SYSTEM_UI_FLAG_LIGHT_NAVIGATION_BAR | View.SYSTEM_UI_FLAG_LIGHT_STATUS_BAR);
                  decor.setSystemUiVisibility(flags);
              }

              private String offlineHtml() {
                  boolean dark = isDarkTheme();
                  String bg = dark ? "#111318" : "#F1F3F4", fg = dark ? "#ffffff" : "#1a1a1a";
                  String muted = dark ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.45)";
                  return "<html><body style='background:" + bg + ";color:" + fg + ";font-family:-apple-system,sans-serif;" +
                      "display:flex;flex-direction:column;align-items:center;justify-content:center;" +
                      "height:100vh;margin:0;text-align:center;padding:32px;box-sizing:border-box'>" +
                      "<div style='font-size:56px;margin-bottom:8px'>📡</div>" +
                      "<h2 style='margin:0 0 8px;font-size:20px'>No Internet</h2>" +
                      "<p style='margin:0 0 28px;font-size:14px;color:" + muted + "'>Check your connection and try again</p>" +
                      "<button onclick='location.reload()' style='padding:13px 32px;background:#6c63ff;" +
                      "border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer'>Retry</button>" +
                      "</body></html>";
              }

              void handleNotifUrl(Intent intent) {
                  if (intent == null) return;
                  String url = intent.getStringExtra("open_url");
                  if (url == null || url.isEmpty()) return;
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) return;
                  runOnUiThread(() -> { showLoadingOverlay(wv); wv.loadUrl(url.startsWith("http") ? url : BASE_URL + url); });
              }

              private void setupWebView() {
                  WebView wv = getBridge().getWebView();
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true); ws.setDomStorageEnabled(true); ws.setAllowFileAccess(true);
                  ws.setAllowContentAccess(true); ws.setCacheMode(WebSettings.LOAD_DEFAULT); ws.setTextZoom(100);
                  ws.setSupportZoom(false); ws.setUseWideViewPort(true); ws.setMediaPlaybackRequiresUserGesture(false);
                  if (Build.VERSION.SDK_INT >= 21) ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  wv.setBackgroundColor(lastBgColor);

                  wv.setWebViewClient(new WebViewClient() {
                      private final Handler toH = new Handler(Looper.getMainLooper());
                      private Runnable toR;

                      @Override public void onPageStarted(WebView v, String url, Bitmap fav) {
                          runOnUiThread(() -> showLoadingOverlay(v));
                          if (toR != null) toH.removeCallbacks(toR);
                          toR = () -> { splashDone = true; runOnUiThread(() -> { hideLoadingOverlay(v); v.loadData(offlineHtml(), "text/html", "UTF-8"); }); };
                          toH.postDelayed(toR, 15000);
                      }

                      @Override public void onPageFinished(WebView v, String url) {
                          if (toR != null) { toH.removeCallbacks(toR); toR = null; }
                          splashDone = true; runOnUiThread(() -> hideLoadingOverlay(v));
                          boolean dark = isDarkTheme();
                          String fcmToken = getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("fcm_token", "");
                          v.evaluateJavascript(
                              "window.WALLS_PLATFORM='android';" +
                              "window.WALLS_VERSION='" + getVersion() + "';" +
                              "window.WALLS_DARK=" + dark + ";" +
                              "window.WALLS_FCM_TOKEN='" + fcmToken + "';" +
                              "window.WallsApp={" +
                              "  download:        function(u,n){Android.downloadFile(u,n||'wallpaper.jpg')}," +
                              "  setWallpaper:    function(u,t){Android.setWallpaper(u,t||'home')}," +
                              "  requestStorage:  function(){Android.requestStoragePermission()}," +
                              "  hasStorage:      function(){return Android.hasStorage()}," +
                              "  isAndroid:       function(){return true}," +
                              "  getVersion:      function(){return Android.getVersion()}," +
                              "  openUrl:         function(u){Android.openUrl(u)}," +
                              "  getTheme:        function(){return Android.getTheme()}," +
                              "  getSystemImages: function(cb){Android.getSystemImages(cb)}," +
                              "  shareFile:       function(p){Android.shareFile(p)}," +
                              "  shareUrl:        function(u,t){Android.shareUrl(u,t||'')}," +
                              "  toast:           function(m){Android.showToast(m)}," +
                              "  vibrate:         function(){Android.vibrate()}," +
                              "  getSetLog:       function(){try{return JSON.parse(Android.getWallpaperLog())}catch(e){return []}}," +
                              "  getFcmToken:     function(){return window.WALLS_FCM_TOKEN}," +
                              "  pickImages:function(cb){" +
                              "    window._wallsPickCb=cb;Android.requestStoragePermission();" +
                              "    window.addEventListener('walls_perm_granted',function h(){" +
                              "      window.removeEventListener('walls_perm_granted',h);Android.getSystemImages('_wallsPickCb');" +
                              "    },{once:true});" +
                              "  }" +
                              "};" +
                              "window.Android_download=    function(u,n){window.WallsApp.download(u,n)};" +
                              "window.Android_setWallpaper=function(u,t){window.WallsApp.setWallpaper(u,t)};" +
                              "window.Android_pickImages=  function(cb){window.WallsApp.pickImages(cb)};" +
                              "window.Android_hasStorage=  function(){return window.WallsApp.hasStorage()};" +
                              "window.Android_getFcmToken= function(){return window.WALLS_FCM_TOKEN};" +
                              "window.dispatchEvent(new CustomEvent('walls_native_ready',{detail:{" +
                              "  hasStorage:" + hasStoragePermission() + ",dark:" + dark + ",platform:'android',fcmToken:'" + fcmToken + "'}}));" +
                              "window.dispatchEvent(new CustomEvent('walls_theme',{detail:{dark:" + dark + "}}));", null);
                          // Run update check AFTER page is loaded so UI can show
                          runOnUiThread(() -> checkForUpdate());
                          // Show onboarding overlay after page loaded (first-launch)
                          if (!onboardingShownThisSession) {
                              SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                              if (prefs.getBoolean("first_launch_onboarding", true)) {
                                  onboardingShownThisSession = true;
                                  // Small delay so the page renders before overlay appears
                                  new Handler(Looper.getMainLooper()).postDelayed(() -> showOnboarding(), 600);
                              }
                          }
                      }

                      @Override public void onReceivedError(WebView v, WebResourceRequest req, WebResourceError err) {
                          if (!req.isForMainFrame()) return;
                          if (toR != null) { toH.removeCallbacks(toR); toR = null; }
                          splashDone = true;
                          runOnUiThread(() -> { hideLoadingOverlay(v); v.loadData(offlineHtml(), "text/html", "UTF-8"); });
                      }

                      @Override public boolean shouldOverrideUrlLoading(WebView v, WebResourceRequest req) {
                          String u = req.getUrl().toString();
                          if (u.startsWith(BASE_URL) || u.startsWith("https://localhost") || u.startsWith("http://localhost") || u.startsWith("capacitor://")) return false;
                          try { startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(u))); } catch (Exception ignored) {}
                          return true;
                      }
                  });

                  wv.setWebChromeClient(new WebChromeClient() {
                      @Override public boolean onConsoleMessage(ConsoleMessage msg) {
                          android.util.Log.d("WallsJS", msg.sourceId() + ":" + msg.lineNumber() + " " + msg.message()); return true;
                      }
                      @Override public boolean onJsConfirm(WebView v, String url, String msg, JsResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK",(d,w)->r.confirm()).setNegativeButton("Cancel",(d,w)->r.cancel())
                              .setOnCancelListener(d->r.cancel()).show(); return true;
                      }
                      @Override public boolean onJsAlert(WebView v, String url, String msg, JsResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK",(d,w)->r.confirm()).setOnCancelListener(d->r.confirm()).show(); return true;
                      }
                      @Override public boolean onJsPrompt(WebView v, String url, String msg, String def, JsPromptResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK",(d,w)->r.confirm(def)).setNegativeButton("Cancel",(d,w)->r.cancel())
                              .setOnCancelListener(d->r.cancel()).show(); return true;
                      }
                  });
              }

              private android.widget.FrameLayout loadingOverlay;
              void showLoadingOverlay(WebView wv) {
                  if (loadingOverlay != null && loadingOverlay.getParent() != null) return;
                  android.widget.FrameLayout fl = new android.widget.FrameLayout(this);
                  fl.setBackgroundColor(lastBgColor);
                  android.widget.ProgressBar pb = new android.widget.ProgressBar(this);
                  pb.setIndeterminate(true);
                  pb.getIndeterminateDrawable().setColorFilter(Color.parseColor("#6c63ff"), android.graphics.PorterDuff.Mode.SRC_IN);
                  android.widget.FrameLayout.LayoutParams lp = new android.widget.FrameLayout.LayoutParams(120, 120);
                  lp.gravity = android.view.Gravity.CENTER;
                  fl.addView(pb, lp); loadingOverlay = fl;
                  if (wv.getParent() instanceof android.view.ViewGroup)
                      ((android.view.ViewGroup) wv.getParent()).addView(fl, new android.view.ViewGroup.LayoutParams(-1, -1));
              }
              void hideLoadingOverlay(WebView wv) {
                  if (loadingOverlay != null && loadingOverlay.getParent() != null)
                      ((android.view.ViewGroup) loadingOverlay.getParent()).removeView(loadingOverlay);
                  loadingOverlay = null;
              }

              private void setupJsBridge() {
                  getBridge().getWebView().addJavascriptInterface(new Object() {
                      @android.webkit.JavascriptInterface
                      public void downloadFile(String url, String filename) {
                          if (url == null || url.isEmpty()) return;
                          String name = (filename != null && !filename.isEmpty()) ? filename : "wallpaper.jpg";
                          if (!name.contains(".")) name += ".jpg";
                          final String fn = name;
                          if (hasStoragePermission()) runOnUiThread(() -> triggerDownload(url, fn));
                          else { pendingDlUrl = url; pendingDlName = fn; requestStoragePermission(); }
                      }
                      @android.webkit.JavascriptInterface
                      public void setWallpaper(String url, String target) {
                          if (url == null || url.isEmpty()) return;
                          if (hasStoragePermission()) runOnUiThread(() -> downloadForWallpaper(url, target));
                          else { pendingWpUrl = url; pendingWpTarget = target; requestStoragePermission(); }
                      }
                      @android.webkit.JavascriptInterface public void    requestStoragePermission() { runOnUiThread(() -> MainActivity.this.requestStoragePermission()); }
                      @android.webkit.JavascriptInterface public void onboardingNext(int step) { runOnUiThread(() -> MainActivity.this.handleOnboardingStep(step)); }
                      @android.webkit.JavascriptInterface public void onboardingOpenSettings() { runOnUiThread(() -> MainActivity.this.openAppSettings()); }
                      @android.webkit.JavascriptInterface public boolean hasStorage()   { return hasStoragePermission(); }
                      @android.webkit.JavascriptInterface public boolean isAndroid()    { return true; }
                      @android.webkit.JavascriptInterface public String  getVersion()   { return MainActivity.this.getVersion(); }
                      @android.webkit.JavascriptInterface public String  getTheme()     { return isDarkTheme() ? "dark" : "light"; }
                      @android.webkit.JavascriptInterface public String  getFcmToken()  { return getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("fcm_token", ""); }
                      @android.webkit.JavascriptInterface public void    showToast(String m) { if (m != null) runOnUiThread(() -> Toast.makeText(MainActivity.this, m, Toast.LENGTH_SHORT).show()); }
                      @android.webkit.JavascriptInterface public void vibrate() {
                          android.os.Vibrator v = (android.os.Vibrator) getSystemService(VIBRATOR_SERVICE);
                          if (v == null) return;
                          if (Build.VERSION.SDK_INT >= 26) v.vibrate(android.os.VibrationEffect.createOneShot(40, android.os.VibrationEffect.DEFAULT_AMPLITUDE));
                          else v.vibrate(40);
                      }
                      @android.webkit.JavascriptInterface public void openUrl(String url) {
                          if (url == null || url.isEmpty()) return;
                          runOnUiThread(() -> { try { startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); } catch (Exception ignored) {} });
                      }
                      @android.webkit.JavascriptInterface public void shareUrl(String url, String text) {
                          if (url == null || url.isEmpty()) return;
                          runOnUiThread(() -> {
                              Intent i = new Intent(Intent.ACTION_SEND).setType("text/plain")
                                  .putExtra(Intent.EXTRA_TEXT, (text != null && !text.isEmpty() ? text + "\n" : "") + url);
                              startActivity(Intent.createChooser(i, "Share wallpaper"));
                          });
                      }
                      @android.webkit.JavascriptInterface public String getWallpaperLog() {
                          try { return getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("wp_set_log", "[]"); } catch (Exception e) { return "[]"; }
                      }
                      @android.webkit.JavascriptInterface
                      public String getSystemImages(String callbackName) {
                          new Thread(() -> {
                              try {
                                  String[] proj = { MediaStore.Images.Media.DATA, MediaStore.Images.Media.DISPLAY_NAME, MediaStore.Images.Media.SIZE };
                                  Cursor cur = getContentResolver().query(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, proj, null, null, MediaStore.Images.Media.DATE_ADDED + " DESC");
                                  JSONArray arr = new JSONArray();
                                  if (cur != null) {
                                      int di = cur.getColumnIndexOrThrow(MediaStore.Images.Media.DATA);
                                      int ni = cur.getColumnIndexOrThrow(MediaStore.Images.Media.DISPLAY_NAME);
                                      int si = cur.getColumnIndexOrThrow(MediaStore.Images.Media.SIZE);
                                      while (cur.moveToNext())
                                          arr.put(new JSONObject().put("path", cur.getString(di)).put("name", cur.getString(ni)).put("size", cur.getLong(si)).put("uri", "file://" + cur.getString(di)));
                                      cur.close();
                                  }
                                  final String json = arr.toString();
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null && callbackName != null && !callbackName.isEmpty())
                                      runOnUiThread(() -> wv.evaluateJavascript("if(typeof " + callbackName + "==='function')" + callbackName + "(" + json + ");", null));
                              } catch (Exception e) {
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null && callbackName != null && !callbackName.isEmpty())
                                      runOnUiThread(() -> wv.evaluateJavascript("if(typeof " + callbackName + "==='function')" + callbackName + "([]);", null));
                              }
                          }).start();
                          return "pending";
                      }
                      @android.webkit.JavascriptInterface
                      public void shareFile(String path) {
                          if (path == null || path.isEmpty()) return;
                          runOnUiThread(() -> {
                              try {
                                  File f = new File(path.replace("file://", ""));
                                  Uri uri = FileProvider.getUriForFile(MainActivity.this, AUTHORITY, f);
                                  startActivity(Intent.createChooser(new Intent(Intent.ACTION_SEND).setType("image/*")
                                      .putExtra(Intent.EXTRA_STREAM, uri).addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION), "Share wallpaper"));
                              } catch (Exception e) { Toast.makeText(MainActivity.this, "Share failed: " + e.getMessage(), Toast.LENGTH_SHORT).show(); }
                          });
                      }
                  }, "Android");
              }

              private boolean hasStoragePermission() {
                  if (Build.VERSION.SDK_INT >= 34)
                      return ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_IMAGES) == PackageManager.PERMISSION_GRANTED
                          || ContextCompat.checkSelfPermission(this, "android.permission.READ_MEDIA_VISUAL_USER_SELECTED") == PackageManager.PERMISSION_GRANTED;
                  if (Build.VERSION.SDK_INT >= 33) return ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_IMAGES) == PackageManager.PERMISSION_GRANTED;
                  if (Build.VERSION.SDK_INT >= 29) return true;
                  return ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE) == PackageManager.PERMISSION_GRANTED;
              }

              private void requestStoragePermission() {
                  if (Build.VERSION.SDK_INT >= 34)
                      ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.READ_MEDIA_IMAGES, "android.permission.READ_MEDIA_VISUAL_USER_SELECTED" }, REQ_STORAGE);
                  else if (Build.VERSION.SDK_INT >= 33)
                      ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.READ_MEDIA_IMAGES }, REQ_STORAGE);
                  else if (Build.VERSION.SDK_INT < 29)
                      ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE }, REQ_STORAGE);
                  // Android 29-32: no runtime permission needed for Downloads/Pictures
              }

              @Override
              public void onRequestPermissionsResult(int code, @NonNull String[] perms, @NonNull int[] results) {
                  super.onRequestPermissionsResult(code, perms, results);
                  boolean granted = results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED;
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;

                  if (code == REQ_STORAGE) {
                      if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_perm_" + (granted ? "granted" : "denied") + "'))", null);
                      if (!granted) {
                          handleOnboardingPermissionResult();
                          return;
                      }
                      // Storage granted — now request notification if still needed (Android 13+)
                      if (Build.VERSION.SDK_INT >= 33 &&
                          ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.POST_NOTIFICATIONS }, REQ_NOTIF);
                      } else {
                          dismissOnboarding();
                      }
                      if (pendingDlUrl != null) { final String u = pendingDlUrl, n = pendingDlName; pendingDlUrl = null; pendingDlName = null; runOnUiThread(() -> triggerDownload(u, n)); }
                      if (pendingWpUrl != null) { final String u = pendingWpUrl, t = pendingWpTarget; pendingWpUrl = null; pendingWpTarget = null; runOnUiThread(() -> downloadForWallpaper(u, t)); }

                  } else if (code == REQ_NOTIF) {
                      if (!granted && Build.VERSION.SDK_INT >= 33) {
                          new AlertDialog.Builder(this)
                              .setTitle("Notifications Disabled")
                              .setMessage("Enable notifications in Settings so Walls can alert you about fresh wallpapers.")
                              .setPositiveButton("Open Settings", (d, w) -> {
                                  try {
                                      Intent i = new Intent(android.provider.Settings.ACTION_APPLICATION_DETAILS_SETTINGS)
                                          .setData(Uri.parse("package:" + getPackageName()));
                                      startActivity(i);
                                  } catch (Exception ex) { try { startActivity(new Intent(android.provider.Settings.ACTION_APP_NOTIFICATION_SETTINGS).putExtra(android.provider.Settings.EXTRA_APP_PACKAGE, getPackageName())); } catch (Exception ignored) {} }
                              })
                              .setNegativeButton("Continue", (d, w2) -> dismissOnboarding())
                              .show();
                      } else {
                          dismissOnboarding();
                      }
                  }
              }

              private void triggerDownload(String url, String filename) {
                  DownloadInfo info = new DownloadInfo(filename);
                  Toast.makeText(this, "Starting download…", Toast.LENGTH_SHORT).show();
                  nm.notify(info.notifIngId, notifBuilder(DL_CH, "⬇️ Downloading", filename).setProgress(0, 0, true).setOngoing(true).setOnlyAlertOnce(true).build());
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_started',{detail:{name:'" + filename + "'}}))", null);
                  try {
                      new File(android.os.Environment.getExternalStoragePublicDirectory(android.os.Environment.DIRECTORY_PICTURES), WALLS_FOLDER).mkdirs();
                      DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                      DownloadManager.Request req = new DownloadManager.Request(Uri.parse(url))
                          .setTitle(filename).setDescription("Saving to Pictures/Walls…").setMimeType("image/jpeg")
                          .setDestinationInExternalPublicDir(android.os.Environment.DIRECTORY_PICTURES, WALLS_FOLDER + "/" + filename)
                          .setNotificationVisibility(DownloadManager.Request.VISIBILITY_HIDDEN);
                      long dlId = dm.enqueue(req);
                      activeDownloads.put(dlId, info);
                      startProgressPolling();
                  } catch (Exception e) { nm.cancel(info.notifIngId); runOnUiThread(() -> Toast.makeText(this, "Download failed: " + e.getMessage(), Toast.LENGTH_LONG).show()); }
              }

              private void downloadForWallpaper(String url, String target) {
                  Toast.makeText(this, "Downloading wallpaper…", Toast.LENGTH_SHORT).show();
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                          conn.setConnectTimeout(15000); conn.setReadTimeout(30000); conn.connect();
                          Bitmap bmp = BitmapFactory.decodeStream(conn.getInputStream());
                          if (bmp == null) throw new Exception("Could not decode image");
                          int flags = "lock".equals(target) ? WallpaperManager.FLAG_LOCK :
                                      "both".equals(target) ? WallpaperManager.FLAG_SYSTEM | WallpaperManager.FLAG_LOCK : WallpaperManager.FLAG_SYSTEM;
                          applyWallpaperBitmap(bmp, flags);
                          String fname = "walls_" + System.currentTimeMillis() + ".jpg";
                          File dir = new File(android.os.Environment.getExternalStoragePublicDirectory(android.os.Environment.DIRECTORY_PICTURES), WALLS_FOLDER);
                          dir.mkdirs(); File out = new File(dir, fname);
                          try (FileOutputStream fos = new FileOutputStream(out)) { bmp.compress(Bitmap.CompressFormat.JPEG, 95, fos); }
                          scanFile(out);
                      } catch (Exception e) { runOnUiThread(() -> Toast.makeText(this, "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show()); }
                  }).start();
              }

              private void applyWallpaperBitmap(Bitmap bmp, int flags) {
                  try {
                      WallpaperManager wm = WallpaperManager.getInstance(this);
                      if (Build.VERSION.SDK_INT >= 24) wm.setBitmap(bmp, null, true, flags); else wm.setBitmap(bmp);
                      String target = (flags == WallpaperManager.FLAG_LOCK) ? "Lock Screen" :
                                      (flags == (WallpaperManager.FLAG_SYSTEM | WallpaperManager.FLAG_LOCK)) ? "Both" : "Home Screen";
                      logWallpaperSet(target);
                      runOnUiThread(() -> {
                          android.os.Vibrator v = (android.os.Vibrator) getSystemService(VIBRATOR_SERVICE);
                          if (v != null) {
                              if (Build.VERSION.SDK_INT >= 26) v.vibrate(android.os.VibrationEffect.createOneShot(60, android.os.VibrationEffect.DEFAULT_AMPLITUDE));
                              else v.vibrate(60);
                          }
                          Toast.makeText(this, "Wallpaper set! 🎉", Toast.LENGTH_SHORT).show();
                          WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                          if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_wp_set',{detail:{target:'" + target + "'}}))", null);
                      });
                  } catch (Exception e) { runOnUiThread(() -> Toast.makeText(this, "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show()); }
              }

              private void logWallpaperSet(String target) {
                  try {
                      SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                      JSONArray logs = new JSONArray(prefs.getString("wp_set_log", "[]"));
                      JSONObject entry = new JSONObject();
                      entry.put("time", new java.text.SimpleDateFormat("yyyy-MM-dd HH:mm", java.util.Locale.getDefault()).format(new java.util.Date()));
                      entry.put("target", target); logs.put(entry);
                      while (logs.length() > 50) logs.remove(0);
                      prefs.edit().putString("wp_set_log", logs.toString()).apply();
                  } catch (Exception ignored) {}
              }

              private void applyWallpaper(File file, int flags) {
                  new Thread(() -> {
                      try {
                          Bitmap bmp = BitmapFactory.decodeFile(file.getAbsolutePath());
                          if (bmp == null) throw new Exception("Could not decode image");
                          applyWallpaperBitmap(bmp, flags);
                      } catch (Exception e) { runOnUiThread(() -> Toast.makeText(this, "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show()); }
                  }).start();
              }

              private void scanFile(File file) { sendBroadcast(new Intent(Intent.ACTION_MEDIA_SCANNER_SCAN_FILE).setData(Uri.fromFile(file))); }
              String getVersion() { try { return getPackageManager().getPackageInfo(getPackageName(), 0).versionName; } catch (Exception e) { return "1.0.0"; } }

              private void startProgressPolling() {
                  if (progressRunnable != null) return;
                  DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                  progressRunnable = new Runnable() {
                      @Override public void run() {
                          if (activeDownloads.isEmpty()) { stopProgressPolling(); return; }
                          for (Long dlId : new java.util.ArrayList<>(activeDownloads.keySet())) {
                              DownloadInfo info = activeDownloads.get(dlId);
                              if (info == null) continue;
                              if (System.currentTimeMillis() - info.startTime > 30_000) {
                                  dm.remove(dlId); activeDownloads.remove(dlId); nm.cancel(info.notifIngId);
                                  nm.notify(info.notifDoneId, notifBuilder(DL_CH, "Download Timed Out", "\"" + info.filename + "\" took too long.").setAutoCancel(true).build());
                                  runOnUiThread(() -> Toast.makeText(MainActivity.this, info.filename + " timed out.", Toast.LENGTH_SHORT).show());
                                  continue;
                              }
                              Cursor c = dm.query(new DownloadManager.Query().setFilterById(dlId));
                              if (c == null || !c.moveToFirst()) { if (c != null) c.close(); continue; }
                              int  status = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_STATUS));
                              long dl     = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_BYTES_DOWNLOADED_SO_FAR));
                              long tot    = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_TOTAL_SIZE_BYTES));
                              String luri = c.getString(c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI));
                              c.close();
                              if (luri != null) info.localPath = luri;
                              if (status == DownloadManager.STATUS_FAILED) {
                                  activeDownloads.remove(dlId); nm.cancel(info.notifIngId);
                                  nm.notify(info.notifDoneId, notifBuilder(DL_CH, "Download Failed", "\"" + info.filename + "\" could not be downloaded.").setAutoCancel(true).build());
                                  runOnUiThread(() -> Toast.makeText(MainActivity.this, info.filename + " failed.", Toast.LENGTH_SHORT).show());
                              } else if (status == DownloadManager.STATUS_RUNNING && tot > 0) {
                                  int pct = (int)(dl * 100L / tot);
                                  String sz = dl < 1<<20 ? String.format("%.1f KB", dl/1024f) : String.format("%.1f MB", dl/(1024f*1024));
                                  String tsz = tot < 1<<20 ? String.format("%.1f KB", tot/1024f) : String.format("%.1f MB", tot/(1024f*1024));
                                  nm.notify(info.notifIngId, notifBuilder(DL_CH, info.filename, sz + " / " + tsz + "  ·  " + pct + "%")
                                      .setProgress(100, pct, false).setOngoing(true).setOnlyAlertOnce(true).build());
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_progress',{detail:{pct:" + pct + ",name:'" + info.filename + "'}}))", null);
                              }
                          }
                          if (!activeDownloads.isEmpty()) progressHandler.postDelayed(this, 1000);
                          else stopProgressPolling();
                      }
                  };
                  progressHandler.postDelayed(progressRunnable, 500);
              }

              private void stopProgressPolling() {
                  if (progressRunnable != null) { progressHandler.removeCallbacks(progressRunnable); progressRunnable = null; }
              }

              private void registerDlReceiver() {
                  dlReceiver = new BroadcastReceiver() {
                      @Override public void onReceive(Context ctx, Intent intent) {
                          long id = intent.getLongExtra(DownloadManager.EXTRA_DOWNLOAD_ID, -1);
                          DownloadInfo info = activeDownloads.remove(id);
                          if (info == null) return;
                          DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                          Cursor c = dm.query(new DownloadManager.Query().setFilterById(id));
                          if (c == null || !c.moveToFirst()) { if (c != null) c.close(); return; }
                          int    status = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_STATUS));
                          String uri    = c.getString(c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI));
                          int    reason = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_REASON));
                          c.close(); nm.cancel(info.notifIngId);
                          runOnUiThread(() -> {
                              if (status == DownloadManager.STATUS_SUCCESSFUL && uri != null) onDownloadSuccess(ctx, uri, info);
                              else {
                                  nm.notify(info.notifDoneId, notifBuilder(DL_CH, "Download Failed", "Could not download \"" + info.filename + "\".").setAutoCancel(true).build());
                                  Toast.makeText(ctx, info.filename + " failed (code " + reason + ")", Toast.LENGTH_LONG).show();
                              }
                          });
                      }
                  };
                  IntentFilter f = new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE);
                  if (Build.VERSION.SDK_INT >= 33) registerReceiver(dlReceiver, f, RECEIVER_NOT_EXPORTED);
                  else registerReceiver(dlReceiver, f);
              }

              private void onDownloadSuccess(Context ctx, String localUri, DownloadInfo info) {
                  try {
                      File file = new File(Uri.parse(localUri).getPath()); scanFile(file);
                      WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                      if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_done',{detail:{name:'" + info.filename + "'}}))", null);
                      Bitmap thumb = null;
                      try { BitmapFactory.Options o = new BitmapFactory.Options(); o.inSampleSize = 4; thumb = BitmapFactory.decodeFile(file.getAbsolutePath(), o); } catch (Exception ignored) {}
                      final Bitmap ft = thumb;
                      new AlertDialog.Builder(this).setTitle("Set as Wallpaper")
                          .setMessage("\"" + info.filename + "\" saved!\nSet it as your wallpaper?")
                          .setNegativeButton("Lock Screen", (d,w) -> applyWallpaper(file, WallpaperManager.FLAG_LOCK))
                          .setNeutralButton("Both",         (d,w) -> applyWallpaper(file, WallpaperManager.FLAG_SYSTEM | WallpaperManager.FLAG_LOCK))
                          .setPositiveButton("Home Screen", (d,w) -> applyWallpaper(file, WallpaperManager.FLAG_SYSTEM))
                          .create().show();
                      Uri safeUri = FileProvider.getUriForFile(ctx, AUTHORITY, file);
                      Intent setIntent = Intent.createChooser(new Intent(Intent.ACTION_ATTACH_DATA).setDataAndType(safeUri, "image/*")
                          .addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION).putExtra("mimeType", "image/*"), "Set as wallpaper");
                      NotificationCompat.Builder nb = notifBuilder(DL_CH, "✅ Wallpaper Saved!", "\"" + info.filename + "\" — tap to set as wallpaper");
                      if (ft != null) { nb.setLargeIcon(ft); nb.setStyle(new NotificationCompat.BigPictureStyle().bigPicture(ft).bigLargeIcon((Bitmap)null).setBigContentTitle("✅ Wallpaper Saved!").setSummaryText(info.filename)); }
                      nm.notify(info.notifDoneId, nb.setContentIntent(PendingIntent.getActivity(ctx, 0, setIntent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE)).setAutoCancel(true).build());
                  } catch (Exception e) { nm.notify(info.notifDoneId, notifBuilder(DL_CH, "Error", "Saved but could not open: " + e.getMessage()).setAutoCancel(true).build()); }
              }

              void mkChannel(String id, String name, String desc) {
                  if (Build.VERSION.SDK_INT < 26) return;
                  NotificationChannel ch = new NotificationChannel(id, name, NotificationManager.IMPORTANCE_HIGH);
                  ch.setDescription(desc); ch.enableVibration(true); ch.setVibrationPattern(new long[]{0,250,100,250});
                  ch.setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI, new android.media.AudioAttributes.Builder().setUsage(android.media.AudioAttributes.USAGE_NOTIFICATION).build());
                  nm.createNotificationChannel(ch);
              }

              NotificationCompat.Builder notifBuilder(String ch, String title, String text) {
                  NotificationCompat.Builder b = new NotificationCompat.Builder(this, ch)
                      .setSmallIcon(R.drawable.ic_notification).setContentTitle(title).setContentText(text)
                      .setPriority(NotificationCompat.PRIORITY_HIGH).setCategory(NotificationCompat.CATEGORY_STATUS).setDefaults(NotificationCompat.DEFAULT_ALL);
                  try { b.setLargeIcon(BitmapFactory.decodeResource(getResources(), R.mipmap.ic_launcher)); } catch (Exception ignored) {}
                  return b;
              }

              PendingIntent launchIntent() {
