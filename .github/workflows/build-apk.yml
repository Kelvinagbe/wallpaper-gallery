              private void checkForUpdate() {
                  final String cv = getVersion();
                  SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                  String cachedMin = prefs.getString(PREF_MIN_VER, "");
                  if (!cachedMin.isEmpty() && isNewer(cachedMin, cv)) { runOnUiThread(() -> showUpdateUI(cv, cachedMin, true)); return; }
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(BASE_URL + "/version.json").openConnection();
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000); conn.setRequestProperty("Cache-Control","no-cache");
                          if (conn.getResponseCode() != 200) return;
                          BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder(); String line;
                          while ((line = br.readLine()) != null) sb.append(line); br.close();
                          JSONObject vObj = new JSONObject(sb.toString());
                          String latest = vObj.optString("latest",""), minVer = vObj.optString("minVersion","");
                          if (!minVer.isEmpty()) prefs.edit().putString(PREF_MIN_VER, minVer).apply();
                          if (!latest.isEmpty() && isNewer(latest, cv)) { boolean forced = !minVer.isEmpty() && isNewer(minVer,cv); runOnUiThread(() -> showUpdateUI(cv,latest,forced)); }
                      } catch (Exception e) { android.util.Log.e("WallsUpdate", e.getMessage()); }
                  }).start();
              }

              private boolean isNewer(String a, String b) {
                  try {
                      String[] av = a.split("\\."), bv = b.split("\\.");
                      for (int i = 0; i < Math.max(av.length,bv.length); i++) {
                          int ai = i < av.length ? Integer.parseInt(av[i].trim()) : 0;
                          int bi = i < bv.length ? Integer.parseInt(bv[i].trim()) : 0;
                          if (ai != bi) return ai > bi;
                      }
                  } catch (Exception ignored) {} return false;
              }

              private void showUpdateUI(String current, String latest, boolean forced) {
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null; if (wv == null) return;
                  boolean dark = isDarkTheme();
                  String bg=dark?"#0d0d12":"#F1F3F4", fg=dark?"#ffffff":"#111318";
                  String muted=dark?"rgba(255,255,255,0.5)":"rgba(0,0,0,0.45)", bdr=dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.1)";
                  String label=forced?"Update Required":"Update Available";
                  String sub="v"+current+" → v"+latest+(forced?" — Required to continue":"");
                  String dlUrl=BASE_URL+"/download";
                  String js="(function(){if(document.getElementById('walls-upd-overlay'))return;" +
                      "var o=document.createElement('div');o.id='walls-upd-overlay';" +
                      "o.style.cssText='position:fixed;inset:0;background:"+bg+";z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:32px;box-sizing:border-box;text-align:center';" +
                      "var img=document.createElement('img');img.src='file:///android_res/mipmap/ic_launcher.png';img.style.cssText='width:80px;height:80px;border-radius:20px;margin-bottom:24px;box-shadow:0 4px 32px rgba(108,99,255,0.35)';img.onerror=function(){this.style.display='none'};o.appendChild(img);" +
                      "var h=document.createElement('div');h.textContent='"+label+"';h.style.cssText='font-size:24px;font-weight:800;color:"+fg+";margin-bottom:8px';o.appendChild(h);" +
                      "var s=document.createElement('div');s.textContent='"+sub+"';s.style.cssText='font-size:14px;color:"+muted+";margin-bottom:40px';o.appendChild(s);" +
                      "var w=document.createElement('div');w.style.cssText='width:100%;max-width:340px';" +
                      "var btn=document.createElement('button');btn.textContent='Update Now';btn.style.cssText='width:100%;padding:16px;background:#6c63ff;border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer';" +
                      "btn.onclick=function(){window.Android&&Android.openUrl('"+dlUrl+"')};w.appendChild(btn);" +
                      (forced?"":"var later=document.createElement('button');later.textContent='Maybe Later';later.style.cssText='margin-top:10px;width:100%;padding:13px;background:transparent;border:1px solid "+bdr+";border-radius:14px;color:"+muted+";font-size:14px;cursor:pointer;font-family:inherit';later.onclick=function(){document.getElementById('walls-upd-overlay').remove()};w.appendChild(later);") +
                      "o.appendChild(w);document.body.appendChild(o);})();";
                  wv.post(() -> wv.evaluateJavascript(js, null));
              }

              private void scheduleReminder() {
                  AlarmManager am = (AlarmManager) getSystemService(ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(this, 0, new Intent(this, WallpaperReminderReceiver.class), PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), pi);
                  else am.setRepeating(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), TimeUnit.HOURS.toMillis(6), pi);
              }
          }
