                      Bitmap thumb = null;
                      try { BitmapFactory.Options o = new BitmapFactory.Options(); o.inSampleSize = 4; thumb = BitmapFactory.decodeFile(file.getAbsolutePath(), o); } catch (Exception ignored) {}
                      Uri safeUri = FileProvider.getUriForFile(ctx, AUTHORITY, file);
                      Intent setIntent = Intent.createChooser(new Intent(Intent.ACTION_ATTACH_DATA).setDataAndType(safeUri, "image/*")
                          .addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION).putExtra("mimeType", "image/*"), "Set as wallpaper");
                      NotificationCompat.Builder nb = notifBuilder(DL_CH, "✅ Wallpaper Saved!", "\"" + lastFile + "\" — tap to set as wallpaper");
                      if (thumb != null) { nb.setLargeIcon(thumb); nb.setStyle(new NotificationCompat.BigPictureStyle().bigPicture(thumb).bigLargeIcon((Bitmap)null).setBigContentTitle("✅ Wallpaper Saved!").setSummaryText(lastFile)); }
                      nm.notify(NOTIF_DONE, nb.setContentIntent(PendingIntent.getActivity(ctx, 0, setIntent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE)).setAutoCancel(true).build());
                  } catch (Exception e) { nm.notify(NOTIF_DONE, notifBuilder(DL_CH, "Error", "Saved but could not open: " + e.getMessage()).setAutoCancel(true).build()); }
