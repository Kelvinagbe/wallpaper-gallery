name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Install pexpect
        run: pip install pexpect --break-system-packages

      - name: Pre-configure Bubblewrap (JDK/SDK paths)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Run Bubblewrap init (non-interactive via pexpect)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p ${{ github.workspace }}/walls-android
          python3 << 'PYEOF'
          import pexpect, sys, os

          workspace = os.environ.get('GITHUB_WORKSPACE', '')
          cmd = (
              'bubblewrap init '
              '--manifest https://walls.ovrica.name.ng/manifest.webmanifest '
              f'--directory {workspace}/walls-android'
          )

          print(f"[pexpect] Spawning: {cmd}")
          child = pexpect.spawn(cmd, timeout=300, encoding='utf-8')
          child.logfile_read = sys.stdout

          while True:
              index = child.expect([
                  pexpect.EOF,                         # 0 - done
                  pexpect.TIMEOUT,                     # 1 - stuck
                  r'(?i)install.*JDK',                 # 2 - JDK install? -> n
                  r'(?i)install.*Android',              # 3 - Android SDK? -> n
                  r'(?i)Domain:',                       # 4 - domain
                  r'(?i)URL path:',                     # 5 - url path
                  r'(?i)Application name',              # 6 - app name
                  r'(?i)short name',                    # 7 - launcher name
                  r'(?i)Application ID',                # 8 - package id
                  r'(?i)version code',                  # 9 - version code (default)
                  r'(?i)version name',                  # 10 - version name (default)
                  r'(?i)display mode',                  # 11 - display (default)
                  r'(?i)orientation',                   # 12 - orientation (default)
                  r'(?i)theme color',                   # 13 - theme color (default)
                  r'(?i)background color',              # 14 - bg color (default)
                  r'(?i)enable notifications',          # 15 - notifications (default)
                  r'(?i)existing directory',            # 16 - overwrite dir? -> y
                  r'(?i)overwrite',                     # 17 - overwrite? -> y
                  r'\(Y/n\)',                           # 18 - generic Y/n -> n
                  r'\(y/N\)',                           # 19 - generic y/N -> enter
              ], timeout=120)

              if index == 0:
                  print("\n[pexpect] Process complete.")
                  break
              elif index == 1:
                  print("\n[pexpect] TIMEOUT — no prompt received, stuck.")
                  sys.exit(1)
              elif index in (2, 3, 18):
                  print("\n[pexpect] -> n")
                  child.sendline('n')
              elif index in (16, 17):
                  print("\n[pexpect] -> y")
                  child.sendline('y')
              elif index == 4:
                  print("\n[pexpect] -> walls.ovrica.name.ng")
                  child.sendline('walls.ovrica.name.ng')
              elif index == 5:
                  print("\n[pexpect] -> /")
                  child.sendline('/')
              elif index == 6:
                  print("\n[pexpect] -> Walls")
                  child.sendline('Walls')
              elif index == 7:
                  print("\n[pexpect] -> Walls")
                  child.sendline('Walls')
              elif index == 8:
                  print("\n[pexpect] -> ng.name.ovrica.walls")
                  child.sendline('ng.name.ovrica.walls')
              elif index in (9, 10, 11, 12, 13, 14, 15, 19):
                  print("\n[pexpect] -> (accept default)")
                  child.sendline('')

          child.close()
          exit_code = child.exitstatus
          if exit_code and exit_code != 0:
              print(f"[pexpect] Non-zero exit: {exit_code}")
              sys.exit(exit_code)

          print("[pexpect] Bubblewrap init completed successfully.")
          PYEOF

      - name: Verify Bubblewrap generated files
        run: |
          echo "=== walls-android contents ==="
          ls -la ${{ github.workspace }}/walls-android/
          echo "=== Checking for gradlew ==="
          if [ ! -f "${{ github.workspace }}/walls-android/gradlew" ]; then
            echo "ERROR: gradlew not found — bubblewrap init did not complete"
            exit 1
          fi
          echo "gradlew found. Proceeding to build."

      - name: Update signing config in twa-manifest.json
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 << 'PYEOF'
          import json, os
          workspace = os.environ.get('GITHUB_WORKSPACE', '')
          manifest_path = f'{workspace}/walls-android/twa-manifest.json'
          with open(manifest_path) as f:
              m = json.load(f)
          m['signingKey'] = {
              'path': f'{workspace}/walls.keystore',
              'alias': 'walls'
          }
          with open(manifest_path, 'w') as f:
              json.dump(m, f, indent=2)
          print('twa-manifest.json updated with signing key.')
          PYEOF

      - name: Build APK with Bubblewrap
        run: |
          cd ${{ github.workspace }}/walls-android
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ${{ github.workspace }}/walls.keystore \
            --signingKeyAlias walls \
            --signingKeyPassword ${{ secrets.KEYSTORE_PASSWORD }} \
            --signingStorePassword ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Copy APK
        run: |
          echo "=== APKs found ==="
          find ${{ github.workspace }}/walls-android -name "*.apk"
          APK=$(find ${{ github.workspace }}/walls-android -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found after build"
            exit 1
          fi
          cp "$APK" ${{ github.workspace }}/app-release-signed.apk
          echo "APK copied from: $APK"

      - name: Get SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > sha256.txt
          cat sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-apk
          path: |
            app-release-signed.apk
            sha256.txt
          retention-days: 30
