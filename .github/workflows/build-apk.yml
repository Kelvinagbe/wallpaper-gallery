      - name: Patch AndroidManifest & build.gradle
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          ET.register_namespace('android','http://schemas.android.com/apk/res/android')
          ET.register_namespace('tools','http://schemas.android.com/tools')
          ANDROID='http://schemas.android.com/apk/res/android'
          def a(name): return f'{{{ANDROID}}}{name}'

          path='android/app/src/main/AndroidManifest.xml'
          tree=ET.parse(path); root=tree.getroot()
          existing={el.get(a('name')) for el in root.findall('uses-permission')}

          perms=[
              'android.permission.INTERNET','android.permission.ACCESS_NETWORK_STATE',
              'android.permission.SET_WALLPAPER','android.permission.SET_WALLPAPER_HINTS',
              'android.permission.RECEIVE_BOOT_COMPLETED','android.permission.DOWNLOAD_WITHOUT_NOTIFICATION',
              'android.permission.FOREGROUND_SERVICE','android.permission.FOREGROUND_SERVICE_DATA_SYNC','android.permission.WAKE_LOCK',
              'android.permission.SCHEDULE_EXACT_ALARM',
              'android.permission.POST_NOTIFICATIONS','android.permission.READ_MEDIA_IMAGES','android.permission.USE_EXACT_ALARM',
              'android.permission.READ_MEDIA_VISUAL_USER_SELECTED',
          ]
          for perm in perms:
              if perm not in existing: ET.SubElement(root,'uses-permission').set(a('name'),perm)
          for perm,sdk in [('android.permission.WRITE_EXTERNAL_STORAGE','28'),('android.permission.READ_EXTERNAL_STORAGE','32')]:
              if perm not in existing:
                  el=ET.SubElement(root,'uses-permission'); el.set(a('name'),perm); el.set(a('maxSdkVersion'),sdk)

          app=root.find('application')
          app.set(a('icon'),'@mipmap/ic_launcher'); app.set(a('roundIcon'),'@mipmap/ic_launcher_round')
          app.set(a('usesCleartextTraffic'),'true'); app.set(a('hardwareAccelerated'),'true')

          activity=next((act for act in app.findall('activity') if 'MainActivity' in act.get(a('name'),'')),None)
          if activity is not None:
              activity.set(a('exported'),'true'); activity.set(a('theme'),'@style/Theme.App.SplashScreen')
              activity.set(a('configChanges'),'uiMode|orientation|screenSize|keyboardHidden')
              existing_hosts=[d.get(a('host'),'') for f in activity.findall('intent-filter') for d in f.findall('data')]
              if 'walls.ovrica.name.ng' not in existing_hosts:
                  filt=ET.SubElement(activity,'intent-filter'); filt.set(a('autoVerify'),'true')
                  ET.SubElement(filt,'action').set(a('name'),'android.intent.action.VIEW')
                  ET.SubElement(filt,'category').set(a('name'),'android.intent.category.DEFAULT')
                  ET.SubElement(filt,'category').set(a('name'),'android.intent.category.BROWSABLE')
                  data=ET.SubElement(filt,'data'); data.set(a('scheme'),'https'); data.set(a('host'),'walls.ovrica.name.ng')

          if 'ng.name.ovrica.walls.fileprovider' not in [p.get(a('authorities'),'') for p in app.findall('provider')]:
              prov=ET.SubElement(app,'provider')
              prov.set(a('name'),'androidx.core.content.FileProvider'); prov.set(a('authorities'),'ng.name.ovrica.walls.fileprovider')
              prov.set(a('exported'),'false'); prov.set(a('grantUriPermissions'),'true')
              meta=ET.SubElement(prov,'meta-data'); meta.set(a('name'),'android.support.FILE_PROVIDER_PATHS'); meta.set(a('resource'),'@xml/file_paths')

          if '.WallsFirebaseMessagingService' not in [s.get(a('name'),'') for s in app.findall('service')]:
              svc=ET.SubElement(app,'service'); svc.set(a('name'),'.WallsFirebaseMessagingService'); svc.set(a('exported'),'false')
              ET.SubElement(ET.SubElement(svc,'intent-filter'),'action').set(a('name'),'com.google.firebase.MESSAGING_EVENT')

          recv=[r.get(a('name'),'') for r in app.findall('receiver')]
          if '.WallpaperReminderReceiver' not in recv:
              rec=ET.SubElement(app,'receiver'); rec.set(a('name'),'.WallpaperReminderReceiver'); rec.set(a('exported'),'false')
          if '.BootReceiver' not in recv:
              rec=ET.SubElement(app,'receiver'); rec.set(a('name'),'.BootReceiver'); rec.set(a('exported'),'true')
              filt=ET.SubElement(rec,'intent-filter')
              ET.SubElement(filt,'action').set(a('name'),'android.intent.action.BOOT_COMPLETED')
              ET.SubElement(filt,'action').set(a('name'),'android.intent.action.QUICKBOOT_POWERON')

          tree.write(path,encoding='utf-8',xml_declaration=True); ET.parse(path); print("Manifest patched OK")
          PYEOF

          cat >> android/build.gradle << 'EOF'
          subprojects { configurations.all { resolutionStrategy {
            force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
          } } }
          EOF

      - name: Add dependencies & generate keystore
        run: |
          sed -i '/dependencies {/a\    implementation "androidx.core:core-splashscreen:1.0.1"' android/app/build.gradle
          sed -i '/dependencies {/a\    implementation "com.google.firebase:firebase-messaging"' android/app/build.gradle
          sed -i '/dependencies {/a\    implementation "com.google.firebase:firebase-inappmessaging-display"' android/app/build.gradle
          sed -i '/dependencies {/a\    implementation platform("com.google.firebase:firebase-bom:34.11.0")' android/app/build.gradle
          sed -i "/^plugins {/a\\    id 'com.google.gms.google-services'" android/app/build.gradle
          sed -i "/^        classpath 'com.android.tools.build:gradle/a\\        classpath 'com.google.gms:google-services:4.4.4'" android/build.gradle
          keytool -genkeypair -v -keystore walls.keystore \
            -alias walls -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Build APK + AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Sign and package
        run: |
          BT=$ANDROID_SDK_ROOT/build-tools/34.0.0
          UNSIGNED=$(find android -name "app-release-unsigned.apk" | head -1)
          [ -z "$UNSIGNED" ] && echo "ERROR: No unsigned APK!" && exit 1
          $BT/zipalign -v -p 4 "$UNSIGNED" app-aligned.apk
          $BT/apksigner sign --ks walls.keystore --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out app-release-signed.apk app-aligned.apk
          $BT/apksigner verify --verbose app-release-signed.apk
          AAB_UNSIGNED=$(find android -name "app-release.aab" | head -1)
          if [ -n "$AAB_UNSIGNED" ]; then
            cp "$AAB_UNSIGNED" app-release-signed.aab
          fi
          mkdir -p release; cp app-release-signed.apk release/
          [ -f app-release-signed.aab ] && cp app-release-signed.aab release/
          keytool -list -v -keystore walls.keystore -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep "SHA256" > release/sha256.txt
          SHA256=$(sed 's/.*SHA256: //' release/sha256.txt)
          echo '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"ng.name.ovrica.walls","sha256_cert_fingerprints":["'"$SHA256"'"]}}]' \
            > release/assetlinks.json
          cp walls.keystore release/walls.keystore
          zip -j release/walls-release.zip release/app-release-signed.apk release/sha256.txt release/assetlinks.json release/walls.keystore
          [ -f release/app-release-signed.aab ] && zip -j release/walls-release-aab.zip release/app-release-signed.aab

      - uses: actions/upload-artifact@v4
        with:
          name: walls-release-apk
          path: ${{ github.workspace }}/release/walls-release.zip
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: walls-release-aab
          path: ${{ github.workspace }}/release/walls-release-aab.zip
          retention-days: 30
