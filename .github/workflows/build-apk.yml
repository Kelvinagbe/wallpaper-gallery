name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap (JDK/SDK paths)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          echo "Bubblewrap global config created."

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Create Bubblewrap app config
        run: |
          mkdir -p walls-android
          cat > walls-android/bubblewrap-config.json << EOF
          {
            "manifestUrl": "https://walls.ovrica.name.ng/manifest.webmanifest",
            "applicationId": "ng.name.ovrica.walls",
            "host": "walls.ovrica.name.ng",
            "name": "Walls",
            "launcherName": "Walls",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#FFFFFF",
            "backgroundColor": "#FFFFFF",
            "enableNotifications": false,
            "enableLocationDelegation": false,
            "enablePlayBilling": false,
            "enableMaskableIcon": false,
            "signingKey": {
              "path": "${{ github.workspace }}/walls.keystore",
              "alias": "walls",
              "storePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
              "keyPassword": "${{ secrets.KEYSTORE_PASSWORD }}"
            }
          }
          EOF
          echo "Bubblewrap app config created."

      - name: Run Bubblewrap init (non-interactive)
        run: |
          bubblewrap init \
            --manifest https://walls.ovrica.name.ng/manifest.webmanifest \
            --directory ${{ github.workspace }}/walls-android \
            --config ${{ github.workspace }}/walls-android/bubblewrap-config.json

      - name: List generated files
        run: ls -la walls-android/

      - name: Build APK with Gradle
        run: |
          cd walls-android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/walls.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=walls \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Copy APK
        run: |
          find walls-android -name "*.apk" -exec cp {} app-release-signed.apk \;
          echo "APK copied successfully"

      - name: Get SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > sha256.txt
          cat sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-apk
          path: |
            app-release-signed.apk
            sha256.txt
          retention-days: 30 