name: Build Android APK + AAB (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK"     >> $GITHUB_ENV
          mkdir -p $SDK/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > $SDK/licenses/android-sdk-license
          echo "y" | $SDK/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;35.0.0" "platform-tools" 2>&1 | tail -3

      - name: Install dependencies & Configure Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          [ -f "public/app/index.html" ] || (echo "ERROR: public/app/index.html not found." && exit 1)
          printf '{"appId":"ng.name.ovrica.walls","appName":"Walls","webDir":"public/app","android":{"allowMixedContent":true,"backgroundColor":"#000000"}}' \
            > capacitor.config.json
          npx cap add android
          echo "=== android/variables.gradle ===" && cat android/variables.gradle || true
          echo "=== android/app/build.gradle (first 20 lines) ===" && head -20 android/app/build.gradle || true

      - name: Copy google-services.json
        run: cp public/google-services.json android/app/google-services.json

      - name: Write resource files
        run: |
          RES=android/app/src/main/res
          mkdir -p "$RES/xml" "$RES/values" "$RES/layout"

          cat > "$RES/xml/file_paths.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-files-path name="walls_private" path="wallpapers/" />
            <external-path name="walls_pictures"  path="Pictures/Walls/" />
            <external-path name="external_files"  path="." />
            <cache-path     name="cache"           path="." />
          </paths>
          EOF

          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="ic_launcher_background">#000000</color></resources>' \
            > "$RES/values/ic_launcher_background.xml"

          cat > "$RES/layout/notification_grid.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:background="#1a1a1a" android:orientation="vertical" android:padding="10dp">
            <TextView android:id="@+id/notif_title"
                android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:textColor="#FFFFFF" android:textSize="13sp" android:textStyle="bold"
                android:layout_marginBottom="8dp"/>
            <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal">
              <ImageView android:id="@+id/img1" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <ImageView android:id="@+id/img2" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <ImageView android:id="@+id/img3" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop"/>
            </LinearLayout>
            <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginTop="3dp">
              <ImageView android:id="@+id/img4" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <ImageView android:id="@+id/img5" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <FrameLayout android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1">
                <ImageView android:id="@+id/img6" android:layout_width="match_parent" android:layout_height="match_parent" android:scaleType="centerCrop"/>
                <TextView android:id="@+id/more_text" android:layout_width="match_parent" android:layout_height="match_parent"
                    android:gravity="center" android:textColor="#FFFFFF" android:textSize="15sp"
                    android:textStyle="bold" android:background="#99000000"/>
              </FrameLayout>
            </LinearLayout>
          </LinearLayout>
          EOF

      # ─── MainActivity.java ────────────────────────────────────────────────────
      - name: Write MainActivity.java
        run: |
          MAIN=android/app/src/main/java/ng/name/ovrica/walls/MainActivity.java
          mkdir -p $(dirname $MAIN)
          cat > $MAIN << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.content.pm.PackageManager;
          import android.content.res.Configuration;
          import android.database.Cursor;
          import android.graphics.*;
          import android.graphics.drawable.ColorDrawable;
          import android.Manifest;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.net.Uri;
          import android.os.*;
          import android.provider.MediaStore;
          import android.webkit.*;
          import android.widget.Toast;
          import android.view.View;
          import android.view.WindowManager;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AlertDialog;
          import androidx.core.app.*;
          import androidx.core.content.*;
          import androidx.core.splashscreen.SplashScreen;
          import com.getcapacitor.BridgeActivity;
          import com.google.firebase.messaging.FirebaseMessaging;
          import org.json.*;
          import java.io.*;
          import java.net.*;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends BridgeActivity {

              static final String DL_CH    = "walls_downloads";
              static final String PROMO_CH = "walls_promo";
              static final String TREND_CH = "walls_trending";

              private static final int    NOTIF_ING = 2001, NOTIF_DONE = 2002, NOTIF_WELCOME = 4001;
              private static final int    REQ_STORAGE = 1002, REQ_NOTIF = 1001;
              private static final long   TIMEOUT_MS  = 30_000;
              // ── PRIVATE folder inside Android/data/ng.name.ovrica.walls/files/wallpapers/
              private static final String WALLS_PRIV_DIR = "wallpapers";
              private static final String WALLS_PUB_DIR  = "Walls"; // for export to Pictures/
              private static final String AUTHORITY      = "ng.name.ovrica.walls.fileprovider";
              static final String         BASE_URL       = "https://walls.ovrica.name.ng";
              static final String         PREF_FILE      = "walls_prefs";
              private static final String PREF_MIN_VER   = "cached_min_version";

              private NotificationManager nm;
              private BroadcastReceiver   dlReceiver;
              private String pendingDlUrl, pendingDlName, pendingWpUrl, pendingWpTarget;
              private long   backPressedTime = 0;
              private boolean webLoaded = false;
              private boolean webReady  = false; // true only after first frame painted
              private int     lastBgColor = 0;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  // ── Samsung/Android 15 blank screen fix ────────────────────────
                  // Set window bg BEFORE super.onCreate — prevents white flash
                  boolean darkMode = (getResources().getConfiguration().uiMode &
                      Configuration.UI_MODE_NIGHT_MASK) == Configuration.UI_MODE_NIGHT_YES;
                  lastBgColor = Color.parseColor(darkMode ? "#0E0C15" : "#F7F6FB");
                  getWindow().setBackgroundDrawable(new ColorDrawable(lastBgColor));
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS);

                  // ── Install splash and keep it until WebView first paint ────────
                  // On Android 15, setKeepOnScreenCondition has a race where it can
                  // release before WebView has painted — OnPreDrawListener is the fix.
                  SplashScreen splash = SplashScreen.installSplashScreen(this);
                  super.onCreate(savedInstanceState);

                  // Use OnPreDrawListener: splash stays until we call proceed()
                  final android.view.ViewTreeObserver.OnPreDrawListener[] listener = {null};
                  final android.view.View content = findViewById(android.R.id.content);
                  listener[0] = () -> {
                      if (!webReady) return false; // keep blocking draw
                      content.getViewTreeObserver().removeOnPreDrawListener(listener[0]);
                      return true; // allow draw — splash dismissed automatically
                  };
                  content.getViewTreeObserver().addOnPreDrawListener(listener[0]);

                  applySystemTheme();
                  FirebaseMessaging.getInstance().getToken().addOnCompleteListener(task -> {
                      if (!task.isSuccessful()) return;
                      String token = task.getResult();
                      android.util.Log.d("FCM", "Token: " + token);
                      getSharedPreferences(PREF_FILE, MODE_PRIVATE).edit().putString("fcm_token", token).apply();
                  });
              }

              @Override
              public void onStart() {
                  super.onStart();
                  nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  mkChannel(DL_CH,    "Walls Downloads",     "Wallpaper download notifications");
                  mkChannel(PROMO_CH, "Wallpaper Reminders", "Periodic reminders");
                  mkChannel(TREND_CH, "Trending Wallpapers",  "Hot & trending wallpaper picks");
                  if (Build.VERSION.SDK_INT >= 33 &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED)
                      ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.POST_NOTIFICATIONS }, REQ_NOTIF);
                  if (getBridge() != null && getBridge().getWebView() != null && !webLoaded) {
                      setupWebView(); setupJsBridge(); webLoaded = true;
                  }
                  scheduleReminder();
                  handleDeepLink(getIntent()); handleNotifUrl(getIntent());
                  showWelcome(); checkForUpdate();
              }

              @Override public void onNewIntent(Intent i) {
                  super.onNewIntent(i); handleDeepLink(i); handleNotifUrl(i);
              }

              @Override
              public void onResume() {
                  super.onResume();
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) return;
                  int newBg = Color.parseColor(isDarkTheme() ? "#0E0C15" : "#F7F6FB");
                  lastBgColor = newBg;
                  getWindow().setBackgroundDrawable(new ColorDrawable(newBg));
                  wv.setBackgroundColor(newBg);
                  // Only reload if WebView has never loaded anything (cold start edge case)
                  String url = wv.getUrl();
                  if (url == null || url.isEmpty() || url.equals("about:blank")) {
                      wv.loadUrl(BASE_URL);
                  }
              }

              @Override public void onConfigurationChanged(Configuration c) { super.onConfigurationChanged(c); applySystemTheme(); }

              @Override
              public void onBackPressed() {
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null && wv.canGoBack()) { wv.goBack(); return; }
                  if (System.currentTimeMillis() - backPressedTime < 2000) { finish(); return; }
                  backPressedTime = System.currentTimeMillis();
                  Toast.makeText(this, "Press back again to exit", Toast.LENGTH_SHORT).show();
              }

              private boolean isDarkTheme() {
                  return (getResources().getConfiguration().uiMode & Configuration.UI_MODE_NIGHT_MASK) == Configuration.UI_MODE_NIGHT_YES;
              }

              private void applySystemTheme() {
                  int bg = Color.parseColor(isDarkTheme() ? "#0E0C15" : "#F7F6FB");
                  lastBgColor = bg;
                  getWindow().setBackgroundDrawable(new ColorDrawable(bg));
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null) {
                      wv.setBackgroundColor(bg);
                      boolean dark = isDarkTheme();
                      wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_theme',{detail:{dark:" + dark + "}}))", null);
                  }
              }

              private boolean isOnline() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(CONNECTIVITY_SERVICE);
                  if (cm == null) return false;
                  NetworkInfo ni = cm.getActiveNetworkInfo();
                  return ni != null && ni.isConnected();
              }

              private void setupWebView() {
                  WebView wv = getBridge().getWebView();
                  // ── Samsung/Android blank screen fix ──────────────────────────
                  // Set background BEFORE any load so there's never a white flash
                  wv.setBackgroundColor(lastBgColor);
                  wv.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  // ── WebSettings ───────────────────────────────────────────────
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                  ws.setAllowFileAccess(false);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  // ── Disable ALL zoom (prevents Samsung double-tap zoom) ────────
                  ws.setSupportZoom(false);
                  ws.setBuiltInZoomControls(false);
                  ws.setDisplayZoomControls(false);
                  // ── Mobile viewport / responsive ──────────────────────────────
                  ws.setUseWideViewPort(true);
                  ws.setLoadWithOverviewMode(true);
                  // ── Prevent font size adjustment on Samsung ────────────────────
                  ws.setTextZoom(100);

                  // ── shouldInterceptRequest serves private folder files to WebView
                  File privateDir = getExternalFilesDir(WALLS_PRIV_DIR);
                  if (privateDir != null) privateDir.mkdirs();

                  final Handler toH = new Handler(Looper.getMainLooper());
                  final Runnable[] toR = {null};

                  wv.setWebViewClient(new WebViewClient() {
                      @Override public void onPageStarted(WebView v, String url, Bitmap fav) {
                          runOnUiThread(() -> showLoadingOverlay(v));
                          // Safety timeout — if page never finishes, release splash after 12s
                          if (toR[0] != null) toH.removeCallbacks(toR[0]);
                          toR[0] = () -> {
                              webReady = true;
                              runOnUiThread(() -> hideLoadingOverlay(v));
                          };
                          toH.postDelayed(toR[0], 12000);
                      }

                      @Override public void onPageFinished(WebView v, String url) {
                          if (toR[0] != null) { toH.removeCallbacks(toR[0]); toR[0] = null; }
                          // Small delay so WebView has time to paint first frame
                          // This is the Android 15 fix — webReady=true triggers OnPreDrawListener
                          toH.postDelayed(() -> {
                              webReady = true;
                              runOnUiThread(() -> hideLoadingOverlay(v));
                          }, 120);
                          boolean dark = isDarkTheme();
                          String fcmToken = getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("fcm_token", "");
                          v.evaluateJavascript(
                              "window.WALLS_PLATFORM='android';" +
                              "window.WALLS_VERSION='" + getVersion() + "';" +
                              "window.WALLS_DARK=" + dark + ";" +
                              "window.WALLS_FCM_TOKEN='" + fcmToken + "';" +
                              "window.WALLS_LOCAL_BASE='https://walls.local/wallpapers/';" +
                              "window.WallsApp={" +
                              "  download:       function(url,id,title){Android.downloadFile(url,id||'',title||'')}," +
                              "  setWallpaper:   function(contentUri,target){Android.setWallpaper(contentUri,target||'home')}," +
                              "  exportToGallery:function(contentUri,title){Android.exportToGallery(contentUri,title||'wallpaper')}," +
                              "  deleteFile:     function(contentUri){Android.deleteFile(contentUri)}," +
                              "  getSavedList:   function(){return new Promise(function(res){var cb='_wCb'+Date.now();window[cb]=function(d){delete window[cb];res(d)};Android.getSavedList(cb);})}," +
                              "  requestStorage: function(){Android.requestStoragePermission()}," +
                              "  hasStorage:     function(){return Android.hasStorage()}," +
                              "  isAndroid:      function(){return true}," +
                              "  getVersion:     function(){return Android.getVersion()}," +
                              "  openUrl:        function(u){Android.openUrl(u)}," +
                              "  getTheme:       function(){return Android.getTheme()}," +
                              "  shareFile:      function(p){Android.shareFile(p)}," +
                              "  toast:          function(m){Android.showToast(m)}," +
                              "  getSetLog:      function(){try{return JSON.parse(Android.getWallpaperLog())}catch(e){return []}}," +
                              "  getFcmToken:    function(){return window.WALLS_FCM_TOKEN}" +
                              "};" +
                              "window.dispatchEvent(new CustomEvent('walls_native_ready',{detail:{" +
                              "  hasStorage:" + hasStoragePermission() + ",dark:" + dark + ",platform:'android',fcmToken:'" + fcmToken + "'}}));" +
                              "window.dispatchEvent(new CustomEvent('walls_theme',{detail:{dark:" + dark + "}}));", null);
                      }

                      @Override public void onReceivedError(WebView v, WebResourceRequest req, WebResourceError err) {
                          // Only handle main frame errors, release splash so app doesn't hang
                          if (!req.isForMainFrame()) return;
                          if (toR[0] != null) { toH.removeCallbacks(toR[0]); toR[0] = null; }
                          webReady = true;
                          runOnUiThread(() -> hideLoadingOverlay(v));
                          // Let WebView show its own error or the page will just be empty
                          // Do NOT inject offline HTML — app retries on resume
                      }

                      @Override public boolean shouldOverrideUrlLoading(WebView v, WebResourceRequest req) {
                          String url = req.getUrl().toString();
                          // ── Allow walls.ovrica.name.ng (deep links + static files) ──
                          if (url.startsWith("https://walls.ovrica.name.ng") ||
                              url.startsWith("https://walls.local") ||
                              url.startsWith("https://localhost") ||
                              url.startsWith("http://localhost") ||
                              url.startsWith("capacitor://")) return false;
                          // Everything else (external links) open in browser
                          try { startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); } catch (Exception ignored) {}
                          return true;
                      }

                      // ── Intercept requests to serve local private files to WebView
                      @Override public WebResourceResponse shouldInterceptRequest(WebView v, WebResourceRequest req) {
                          String url = req.getUrl().toString();
                          // Pattern: https://walls.local/wallpapers/<filename>
                          if (url.startsWith("https://walls.local/wallpapers/")) {
                              String filename = url.substring("https://walls.local/wallpapers/".length());
                              File f = new File(getExternalFilesDir(WALLS_PRIV_DIR), filename);
                              if (f.exists()) {
                                  try {
                                      return new WebResourceResponse("image/jpeg", "utf-8", new FileInputStream(f));
                                  } catch (Exception ignored) {}
                              }
                          }
                          return super.shouldInterceptRequest(v, req);
                      }
                  });

                  wv.setWebChromeClient(new WebChromeClient() {
                      @Override public boolean onConsoleMessage(ConsoleMessage msg) {
                          android.util.Log.d("WallsJS", msg.sourceId() + ":" + msg.lineNumber() + " " + msg.message()); return true;
                      }
                      @Override public boolean onJsConfirm(WebView v, String url, String msg, JsResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK",(d,w)->r.confirm()).setNegativeButton("Cancel",(d,w)->r.cancel())
                              .setOnCancelListener(d->r.cancel()).show(); return true;
                      }
                      @Override public boolean onJsAlert(WebView v, String url, String msg, JsResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK",(d,w)->r.confirm()).setOnCancelListener(d->r.confirm()).show(); return true;
                      }
                  });
              }

              // ── Loading overlay shown between splash and page ready ────────────────
              private android.widget.FrameLayout loadingOverlay;
              void showLoadingOverlay(WebView wv) {
                  if (loadingOverlay != null && loadingOverlay.getParent() != null) return;
                  android.widget.FrameLayout fl = new android.widget.FrameLayout(this);
                  fl.setBackgroundColor(lastBgColor);
                  // Spinner
                  android.widget.ProgressBar pb = new android.widget.ProgressBar(this);
                  pb.setIndeterminate(true);
                  pb.getIndeterminateDrawable().setColorFilter(Color.parseColor("#6C47E8"), android.graphics.PorterDuff.Mode.SRC_IN);
                  android.widget.FrameLayout.LayoutParams lp = new android.widget.FrameLayout.LayoutParams(100, 100);
                  lp.gravity = android.view.Gravity.CENTER;
                  fl.addView(pb, lp);
                  loadingOverlay = fl;
                  if (wv.getParent() instanceof android.view.ViewGroup)
                      ((android.view.ViewGroup) wv.getParent()).addView(fl, new android.view.ViewGroup.LayoutParams(-1, -1));
              }
              void hideLoadingOverlay(WebView wv) {
                  if (loadingOverlay != null && loadingOverlay.getParent() != null)
                      ((android.view.ViewGroup) loadingOverlay.getParent()).removeView(loadingOverlay);
                  loadingOverlay = null;
              }


              // ── JS Bridge ────────────────────────────────────────────────────────
              private void setupJsBridge() {
                  getBridge().getWebView().addJavascriptInterface(new Object() {

                      // ── DOWNLOAD to private folder ───────────────────────────────
                      // Called from JS: WallsApp.download(url, id, title)
                      // Saves to Android/data/.../files/wallpapers/walls_<id>.jpg
                      // Callbacks: walls_dl_progress, walls_dl_done {localUrl, id}
                      @android.webkit.JavascriptInterface
                      public void downloadFile(String url, String wallpaperId, String title) {
                          if (url == null || url.isEmpty()) return;
                          final String id    = (wallpaperId != null && !wallpaperId.isEmpty()) ? wallpaperId : String.valueOf(System.currentTimeMillis());
                          final String fname = "walls_" + id + ".jpg";
                          final String ttl   = (title != null && !title.isEmpty()) ? title : "Wallpaper";
                          new Thread(() -> {
                              try {
                                  File dir = getExternalFilesDir(WALLS_PRIV_DIR);
                                  if (dir == null) throw new Exception("Storage unavailable");
                                  dir.mkdirs();
                                  File outFile = new File(dir, fname);

                                  // Skip if already downloaded
                                  if (outFile.exists() && outFile.length() > 1024) {
                                      String localUrl = "https://walls.local/wallpapers/" + fname;
                                      notifyJsDownloadDone(id, fname, ttl, localUrl);
                                      return;
                                  }

                                  HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                                  conn.setConnectTimeout(15000); conn.setReadTimeout(60000); conn.connect();
                                  int total = conn.getContentLength();
                                  InputStream in = conn.getInputStream();
                                  FileOutputStream out = new FileOutputStream(outFile);
                                  byte[] buf = new byte[8192]; int read; long done = 0;
                                  while ((read = in.read(buf)) != -1) {
                                      out.write(buf, 0, read); done += read;
                                      if (total > 0) {
                                          final int pct = (int)(done * 100L / total);
                                          final String n = ttl;
                                          WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                          if (wv != null) runOnUiThread(() ->
                                              wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_progress',{detail:{pct:" + pct + ",name:'" + escJs(n) + "'}}))", null));
                                      }
                                  }
                                  out.close(); in.close();

                                  // ── Local URL readable by WebView via shouldInterceptRequest
                                  String localUrl = "https://walls.local/wallpapers/" + fname;
                                  notifyJsDownloadDone(id, fname, ttl, localUrl);

                                  // Show notification
                                  nm.notify(NOTIF_DONE, notifBuilder(DL_CH, "✅ " + ttl, "Saved to Walls").setAutoCancel(true).build());
                              } catch (Exception e) {
                                  android.util.Log.e("WallsDL", "Download failed: " + e.getMessage());
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null) runOnUiThread(() ->
                                      wv.evaluateJavascript("window.dispatchEvent(new Event('walls_dl_failed'))", null));
                              }
                          }).start();
                      }

                      // ── SET WALLPAPER from local URL (no re-download) ────────────
                      // localUrl = "https://walls.local/wallpapers/walls_<id>.jpg"
                      @android.webkit.JavascriptInterface
                      public void setWallpaper(String localUrl, String target) {
                          if (localUrl == null || localUrl.isEmpty()) return;
                          new Thread(() -> {
                              try {
                                  Bitmap bmp = null;
                                  if (localUrl.startsWith("https://walls.local/wallpapers/")) {
                                      // Read from private folder directly — no network
                                      String fname = localUrl.substring("https://walls.local/wallpapers/".length());
                                      File f = new File(getExternalFilesDir(WALLS_PRIV_DIR), fname);
                                      if (f.exists()) bmp = BitmapFactory.decodeFile(f.getAbsolutePath());
                                  }
                                  if (bmp == null) {
                                      // Fallback: download from remote URL
                                      HttpURLConnection conn = (HttpURLConnection) new URL(localUrl).openConnection();
                                      conn.setConnectTimeout(15000); conn.setReadTimeout(30000); conn.connect();
                                      bmp = BitmapFactory.decodeStream(conn.getInputStream());
                                  }
                                  if (bmp == null) throw new Exception("Could not decode image");
                                  int flags = "lock".equals(target) ? WallpaperManager.FLAG_LOCK :
                                              "both".equals(target) ? WallpaperManager.FLAG_SYSTEM | WallpaperManager.FLAG_LOCK :
                                              WallpaperManager.FLAG_SYSTEM;
                                  WallpaperManager wm = WallpaperManager.getInstance(MainActivity.this);
                                  if (Build.VERSION.SDK_INT >= 24) wm.setBitmap(bmp, null, true, flags);
                                  else wm.setBitmap(bmp);
                                  logWallpaperSet(target);
                                  runOnUiThread(() -> {
                                      Toast.makeText(MainActivity.this, "Wallpaper set! 🎉", Toast.LENGTH_SHORT).show();
                                      WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                      if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_wp_set'))", null);
                                  });
                              } catch (Exception e) {
                                  runOnUiThread(() -> Toast.makeText(MainActivity.this, "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show());
                              }
                          }).start();
                      }

                      // ── EXPORT private file → Pictures/Walls/ (Gallery) ──────────
                      @android.webkit.JavascriptInterface
                      public void exportToGallery(String localUrl, String title) {
                          if (localUrl == null || !localUrl.startsWith("https://walls.local/wallpapers/")) return;
                          String fname = localUrl.substring("https://walls.local/wallpapers/".length());
                          File src = new File(getExternalFilesDir(WALLS_PRIV_DIR), fname);
                          if (!src.exists()) { runOnUiThread(() -> Toast.makeText(MainActivity.this, "File not found", Toast.LENGTH_SHORT).show()); return; }
                          new Thread(() -> {
                              try {
                                  String displayName = (title != null && !title.isEmpty() ? title : "wallpaper") + ".jpg";
                                  OutputStream fos;
                                  if (Build.VERSION.SDK_INT >= 29) {
                                      ContentValues cv = new ContentValues();
                                      cv.put(MediaStore.Images.Media.DISPLAY_NAME, displayName);
                                      cv.put(MediaStore.Images.Media.MIME_TYPE, "image/jpeg");
                                      cv.put(MediaStore.Images.Media.RELATIVE_PATH, android.os.Environment.DIRECTORY_PICTURES + "/" + WALLS_PUB_DIR);
                                      cv.put(MediaStore.Images.Media.IS_PENDING, 1);
                                      Uri uri = getContentResolver().insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, cv);
                                      fos = getContentResolver().openOutputStream(uri);
                                      pipe(new FileInputStream(src), fos);
                                      cv.clear(); cv.put(MediaStore.Images.Media.IS_PENDING, 0);
                                      getContentResolver().update(uri, cv, null, null);
                                  } else {
                                      File pubDir = new File(android.os.Environment.getExternalStoragePublicDirectory(android.os.Environment.DIRECTORY_PICTURES), WALLS_PUB_DIR);
                                      pubDir.mkdirs();
                                      File dst = new File(pubDir, displayName);
                                      pipe(new FileInputStream(src), new FileOutputStream(dst));
                                      sendBroadcast(new Intent(Intent.ACTION_MEDIA_SCANNER_SCAN_FILE).setData(Uri.fromFile(dst)));
                                  }
                                  runOnUiThread(() -> Toast.makeText(MainActivity.this, "Exported to Gallery 📁", Toast.LENGTH_SHORT).show());
                              } catch (Exception e) {
                                  runOnUiThread(() -> Toast.makeText(MainActivity.this, "Export failed: " + e.getMessage(), Toast.LENGTH_LONG).show());
                              }
                          }).start();
                      }

                      // ── DELETE private file ──────────────────────────────────────
                      @android.webkit.JavascriptInterface
                      public void deleteFile(String localUrl) {
                          if (localUrl == null || !localUrl.startsWith("https://walls.local/wallpapers/")) return;
                          String fname = localUrl.substring("https://walls.local/wallpapers/".length());
                          File f = new File(getExternalFilesDir(WALLS_PRIV_DIR), fname);
                          if (f.exists()) f.delete();
                      }

                      // ── GET list of saved wallpapers from private folder ─────────
                      @android.webkit.JavascriptInterface
                      public String getSavedList(String callbackName) {
                          new Thread(() -> {
                              try {
                                  File dir = getExternalFilesDir(WALLS_PRIV_DIR);
                                  JSONArray arr = new JSONArray();
                                  if (dir != null && dir.exists()) {
                                      File[] files = dir.listFiles((d, name) -> name.startsWith("walls_") && name.endsWith(".jpg"));
                                      if (files != null) {
                                          java.util.Arrays.sort(files, (a, b) -> Long.compare(b.lastModified(), a.lastModified()));
                                          for (File f : files) {
                                              String localUrl = "https://walls.local/wallpapers/" + f.getName();
                                              arr.put(new JSONObject()
                                                  .put("localUrl", localUrl)
                                                  .put("filename", f.getName())
                                                  .put("size", f.length())
                                                  .put("savedAt", f.lastModified()));
                                          }
                                      }
                                  }
                                  final String json = arr.toString();
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null && callbackName != null)
                                      runOnUiThread(() -> wv.evaluateJavascript("if(typeof window['" + callbackName + "']==='function')window['" + callbackName + "'](" + json + ");", null));
                              } catch (Exception e) {
                                  android.util.Log.e("WallsSaved", e.getMessage());
                              }
                          }).start();
                          return "pending";
                      }

                      @android.webkit.JavascriptInterface public void    requestStoragePermission() { runOnUiThread(() -> MainActivity.this.requestStoragePermission()); }
                      @android.webkit.JavascriptInterface public boolean hasStorage()   { return hasStoragePermission(); }
                      @android.webkit.JavascriptInterface public boolean isAndroid()    { return true; }
                      @android.webkit.JavascriptInterface public String  getVersion()   { return MainActivity.this.getVersion(); }
                      @android.webkit.JavascriptInterface public String  getTheme()     { return isDarkTheme() ? "dark" : "light"; }
                      @android.webkit.JavascriptInterface public String  getFcmToken()  { return getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("fcm_token", ""); }
                      @android.webkit.JavascriptInterface public void    showToast(String m) { if (m != null) runOnUiThread(() -> Toast.makeText(MainActivity.this, m, Toast.LENGTH_SHORT).show()); }
                      @android.webkit.JavascriptInterface public void    openUrl(String url) {
                          if (url == null || url.isEmpty()) return;
                          runOnUiThread(() -> { try { startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); } catch (Exception ignored) {} });
                      }
                      @android.webkit.JavascriptInterface public String getWallpaperLog() {
                          try { return getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("wp_set_log", "[]"); } catch (Exception e) { return "[]"; }
                      }
                      @android.webkit.JavascriptInterface public void shareFile(String localUrl) {
                          if (localUrl == null || !localUrl.startsWith("https://walls.local/wallpapers/")) return;
                          runOnUiThread(() -> {
                              try {
                                  String fname = localUrl.substring("https://walls.local/wallpapers/".length());
