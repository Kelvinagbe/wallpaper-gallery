name: Build Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK manually (no interactive prompts)
        run: |
          # Use the pre-installed SDK on the runner
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          # Write ALL license files directly - no sdkmanager --licenses needed
          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          printf "33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" \
            > $ANDROID_SDK_ROOT/licenses/google-gdk-license
          printf "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" \
            > $ANDROID_SDK_ROOT/licenses/android-googletv-license
          printf "d975f751698a77b662f1254ddbeed3901e976f5a" \
            > $ANDROID_SDK_ROOT/licenses/intel-android-extra-license
          printf "33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" \
            > $ANDROID_SDK_ROOT/licenses/mips-android-sysimage-license
          echo "License files written:"
          ls -la $ANDROID_SDK_ROOT/licenses/

          # Install required SDK packages non-interactively
          SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          echo "y" | $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | grep -v "^$" | tail -5
          echo "Android SDK ready."

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npx next build
        env:
          NODE_ENV: production

      - name: Verify Next.js out/ folder
        run: |
          if [ ! -d "out" ]; then
            echo "ERROR: No out/ folder. Add output: 'export' to next.config.js"
            exit 1
          fi
          echo "out/ folder found. Contents:"
          ls out/

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create capacitor.config.json if not present
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.js" ] && [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.json << EOF
          {
            "appId": "ng.name.ovrica.walls",
            "appName": "Walls",
            "webDir": "out",
            "bundledWebRuntime": false,
            "android": {
              "minSdkVersion": 21
            }
          }
          EOF
            echo "capacitor.config.json created."
          else
            echo "Capacitor config already exists."
          fi

      - name: Add Android platform if not present
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android folder already exists."
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Build release APK and AAB with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace
          echo "=== APKs ==="
          find . -name "*.apk"
          echo "=== AABs ==="
          find . -name "*.aab"

      - name: Sign APK with apksigner (V1+V2+V3)
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/34.0.0
          UNSIGNED=$(find ${{ github.workspace }}/android -name "*release*.apk" | grep -v signed | head -1)
          echo "Signing: $UNSIGNED"
          $BUILD_TOOLS/zipalign -v -p 4 "$UNSIGNED" ${{ github.workspace }}/app-aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks ${{ github.workspace }}/walls.keystore \
            --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out ${{ github.workspace }}/app-release-signed.apk \
            ${{ github.workspace }}/app-aligned.apk
          $BUILD_TOOLS/apksigner verify --verbose ${{ github.workspace }}/app-release-signed.apk
          echo "APK signed and verified."

      - name: Copy AAB
        run: |
          AAB=$(find ${{ github.workspace }}/android -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" ${{ github.workspace }}/app-release-bundle.aab
            echo "AAB copied: $AAB"
          fi

      - name: Get SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > sha256.txt
          cat sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-capacitor-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
            sha256.txt
          retention-days: 30
