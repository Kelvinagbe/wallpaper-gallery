      # ─── WallpaperReminderReceiver.java ───────────────────────────────────────
      - name: Write WallpaperReminderReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallpaperReminderReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;
          import android.app.*; import android.content.*; import android.os.Build; import java.util.concurrent.TimeUnit;
          import androidx.core.app.NotificationCompat;
          public class WallpaperReminderReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context ctx, Intent intent) {
                  NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  PendingIntent pi = PendingIntent.getActivity(ctx, 0, ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()), PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  nm.notify(5001, new NotificationCompat.Builder(ctx, MainActivity.PROMO_CH)
                      .setSmallIcon(R.drawable.ic_notification).setContentTitle("Fresh Wallpapers 🎨").setContentText("New wallpapers are waiting for you!")
                      .setPriority(NotificationCompat.PRIORITY_DEFAULT).setAutoCancel(true).setContentIntent(pi).build());
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent rpi = PendingIntent.getBroadcast(ctx, 0, new Intent(ctx, WallpaperReminderReceiver.class), PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, rpi);
                  else am.set(AlarmManager.RTC_WAKEUP, next, rpi);
              }
          }
          EOF

