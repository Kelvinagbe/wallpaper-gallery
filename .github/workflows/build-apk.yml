name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap (JDK/SDK paths)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          cat ~/.bubblewrap/config.json

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Create twa-manifest.json manually (skip bubblewrap init)
        run: |
          mkdir -p ${{ github.workspace }}/walls-android
          cat > ${{ github.workspace }}/walls-android/twa-manifest.json << EOF
          {
            "packageId": "ng.name.ovrica.walls",
            "host": "walls.ovrica.name.ng",
            "name": "Walls",
            "launcherName": "Walls",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#FFFFFF",
            "themeColorDark": "#000000",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#FFFFFF",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://walls.ovrica.name.ng/icons/icon-512x512.png",
            "maskableIconUrl": "",
            "monochromeIconUrl": "",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "${{ github.workspace }}/walls.keystore",
              "alias": "walls"
            },
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://walls.ovrica.name.ng/manifest.webmanifest",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": false,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://walls.ovrica.name.ng/",
            "minSdkVersion": 19,
            "fingerprints": []
          }
          EOF
          echo "twa-manifest.json created:"
          cat ${{ github.workspace }}/walls-android/twa-manifest.json

      - name: Generate Android project with bubblewrap update (non-interactive)
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd ${{ github.workspace }}/walls-android
          bubblewrap update --skipVersionUpgrade

      - name: Verify Android project generated
        run: |
          echo "=== walls-android contents ==="
          ls -la ${{ github.workspace }}/walls-android/
          if [ ! -f "${{ github.workspace }}/walls-android/gradlew" ]; then
            echo "ERROR: gradlew not found"
            exit 1
          fi
          echo "gradlew found."

      - name: Build APK with Bubblewrap
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd ${{ github.workspace }}/walls-android
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ${{ github.workspace }}/walls.keystore \
            --signingKeyAlias walls

      - name: Copy APK
        run: |
          find ${{ github.workspace }}/walls-android -name "*.apk"
          APK=$(find ${{ github.workspace }}/walls-android -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          cp "$APK" ${{ github.workspace }}/app-release-signed.apk
          echo "Copied: $APK"

      - name: Get SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > sha256.txt
          cat sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-apk
          path: |
            app-release-signed.apk
            sha256.txt
          retention-days: 30
