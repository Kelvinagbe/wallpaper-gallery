name: Build Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          echo -e "\n33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" > $ANDROID_SDK_ROOT/licenses/google-gdk-license
          echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" > $ANDROID_SDK_ROOT/licenses/android-googletv-license
          echo "Licenses accepted."

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npx next build
        env:
          NODE_ENV: production

      - name: Verify Next.js output folder
        run: |
          if [ -d "out" ]; then
            echo "Found: out/"
            ls -la out/
          elif [ -d ".next" ]; then
            echo "Found: .next/ — make sure output: export is set in next.config.js"
            exit 1
          else
            echo "ERROR: No output folder found"
            exit 1
          fi

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor (if not already set up)
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.js" ] && [ ! -f "capacitor.config.json" ]; then
            echo "No capacitor config found — creating one"
            cat > capacitor.config.json << EOF
          {
            "appId": "ng.name.ovrica.walls",
            "appName": "Walls",
            "webDir": "out",
            "bundledWebRuntime": false,
            "android": {
              "minSdkVersion": 21
            }
          }
          EOF
          else
            echo "Capacitor config already exists"
            cat capacitor.config.json || cat capacitor.config.ts || cat capacitor.config.js
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi

      - name: Sync Capacitor (copy web assets to Android)
        run: npx cap sync android

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Build unsigned release APK and AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace
          echo "=== APKs ==="
          find . -name "*.apk"
          echo "=== AABs ==="
          find . -name "*.aab"

      - name: Sign APK with apksigner (V1 + V2 + V3)
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/34.0.0
          UNSIGNED=$(find ${{ github.workspace }}/android -name "*release*unsigned*.apk" -o -name "*release*.apk" | grep -v signed | head -1)
          echo "Found unsigned APK: $UNSIGNED"

          # Zipalign
          $BUILD_TOOLS/zipalign -v -p 4 \
            "$UNSIGNED" \
            ${{ github.workspace }}/app-aligned.apk

          # Sign with V1+V2+V3
          $BUILD_TOOLS/apksigner sign \
            --ks ${{ github.workspace }}/walls.keystore \
            --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out ${{ github.workspace }}/app-release-signed.apk \
            ${{ github.workspace }}/app-aligned.apk

          # Verify
          $BUILD_TOOLS/apksigner verify --verbose ${{ github.workspace }}/app-release-signed.apk
          echo "APK signed and verified successfully."

      - name: Copy AAB
        run: |
          AAB=$(find ${{ github.workspace }}/android -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" ${{ github.workspace }}/app-release-bundle.aab
            echo "AAB copied: $AAB"
          else
            echo "WARNING: No AAB found"
          fi

      - name: Get SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > sha256.txt
          cat sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-capacitor-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
            sha256.txt
          retention-days: 30
