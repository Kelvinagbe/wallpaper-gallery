              private void handleOnboardingStep(int currentStep) {
                  if (currentStep == 0) {
                      runOnUiThread(() -> showOnboardingStep(1));
                  } else {
                      boolean storageOk = hasStoragePermission();
                      boolean notifOk   = Build.VERSION.SDK_INT < 33 ||
                          ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) == PackageManager.PERMISSION_GRANTED;
                      if (storageOk && notifOk) { dismissOnboarding(); return; }
                      if (!storageOk) requestStoragePermission();
                      else if (Build.VERSION.SDK_INT >= 33)
                          ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.POST_NOTIFICATIONS }, REQ_NOTIF);
                  }
              }

              private void openAppSettings() {
                  try {
                      startActivity(new Intent(android.provider.Settings.ACTION_APPLICATION_DETAILS_SETTINGS)
                          .setData(Uri.parse("package:" + getPackageName())));
                  } catch (Exception e) {
                      try { startActivity(new Intent(android.provider.Settings.ACTION_APPLICATION_SETTINGS)); } catch (Exception ignored) {}
                  }
              }

              private void handleOnboardingPermissionResult() { runOnUiThread(() -> showOnboardingStep(1)); }

              // ── Version check — inline HTML overlay (not AlertDialog) ─────────────
              private void checkForUpdate() {
                  final String cv = getVersion();
                  SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                  String cachedMin = prefs.getString("cached_min_version", "");
                  if (!cachedMin.isEmpty() && isNewer(cachedMin, cv)) { runOnUiThread(() -> showUpdateUI(cv, cachedMin, true)); return; }
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(BASE_URL + "/version.json").openConnection();
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000); conn.setRequestProperty("Cache-Control","no-cache");
                          if (conn.getResponseCode() != 200) return;
                          BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder(); String line;
                          while ((line = br.readLine()) != null) sb.append(line); br.close();
                          JSONObject vObj = new JSONObject(sb.toString());
                          String latest = vObj.optString("latest",""), minVer = vObj.optString("minVersion","");
                          if (!minVer.isEmpty()) prefs.edit().putString("cached_min_version", minVer).apply();
                          if (!latest.isEmpty() && isNewer(latest, cv)) { boolean forced = !minVer.isEmpty() && isNewer(minVer,cv); runOnUiThread(() -> showUpdateUI(cv,latest,forced)); }
                      } catch (Exception e) { android.util.Log.e("WallsUpdate", "Version check failed: " + e.getMessage()); }
                  }).start();
              }

              private boolean isNewer(String a, String b) {
                  try { String[] av=a.split("\\."),bv=b.split("\\.");
                      for(int i=0;i<Math.max(av.length,bv.length);i++){int ai=i<av.length?Integer.parseInt(av[i].trim()):0,bi=i<bv.length?Integer.parseInt(bv[i].trim()):0;if(ai!=bi)return ai>bi;}
                  } catch(Exception ignored){} return false;
              }

              private void showUpdateUI(String current, String latest, boolean forced) {
