              // ── Welcome notification ──────────────────────────────────────────────────
              private void showWelcome() {
                  SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                  boolean first = prefs.getBoolean("first_launch", true);
                  if (first) prefs.edit().putBoolean("first_launch", false).apply();
                  nm.notify(NOTIF_WELCOME, notif(PROMO_CH, android.R.drawable.ic_menu_gallery,
                      first ? "Welcome to Walls 🖼️" : "Welcome back ✨",
                      first ? "Discover stunning wallpapers curated for you."
                            : "Fresh wallpapers are waiting. Find your next favorite.")
                      .setContentIntent(launchIntent()).setAutoCancel(true).build());
              }

              // ── Update check  ─────────────────────────────────────────────────────────
              // minVersion is cached in SharedPreferences so forced-update gate
              // does not need a network round-trip every launch.
              private void checkForUpdate() {
                  final String cv = getVersion();
                  SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                  // Enforce cached forced-update gate immediately (before network)
                  String cachedMin = prefs.getString(PREF_MIN_VER, "");
                  if (!cachedMin.isEmpty() && isNewer(cachedMin, cv)) {
                      runOnUiThread(() -> showUpdateDialog(cv, cachedMin, true));
                      return; // still do network check below to refresh cache
                  }
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(BASE_URL + "/version.json").openConnection();
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000);
                          conn.setRequestProperty("Cache-Control", "no-cache");
                          if (conn.getResponseCode() != 200) return;
                          BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder(); String line;
                          while ((line = br.readLine()) != null) sb.append(line);
                          br.close();
                          String json   = sb.toString();
                          String latest = json.replaceAll(".*\"latest\"\\s*:\\s*\"([^\"]+)\".*", "$1");
                          String minVer = json.replaceAll(".*\"minVersion\"\\s*:\\s*\"([^\"]+)\".*", "$1");
                          // Persist minVersion so next launch enforces it offline
                          if (!minVer.equals(json))
                              prefs.edit().putString(PREF_MIN_VER, minVer).apply();
                          if (!latest.equals(json) && isNewer(latest, cv)) {
                              boolean forced = !minVer.equals(json) && isNewer(minVer, cv);
                              runOnUiThread(() -> showUpdateDialog(cv, latest, forced));
                          }
                      } catch (Exception ignored) {}
                  }).start();
              }

              private boolean isNewer(String a, String b) {
                  try {
                      String[] av = a.split("\\."), bv = b.split("\\.");
                      for (int i = 0; i < Math.max(av.length, bv.length); i++) {
                          int ai = i < av.length ? Integer.parseInt(av[i].trim()) : 0;
                          int bi = i < bv.length ? Integer.parseInt(bv[i].trim()) : 0;
                          if (ai != bi) return ai > bi;
                      }
                  } catch (Exception ignored) {}
                  return false;
              }

              // ── Update dialog  –  full-screen + app logo ──────────────────────────────
              private void showUpdateDialog(String current, String latest, boolean forced) {
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) return;

                  // Build a full-screen overlay injected into the WebView
                  // Uses the app logo (ic_launcher) rendered via a data URI canvas trick
                  String overlayBg   = "#0d0d12";
                  String accentColor = "#6c63ff";
                  String label       = forced ? "Update Required" : "Update Available";
                  String sub         = "v" + current + " → v" + latest +
                                      (forced ? " · Required to continue" : "");
                  String laterBtn    = forced ? "" :
                      "<button id='walls-upd-later' style='margin-top:10px;background:rgba(255,255,255,0.08);" +
                      "border:none;border-radius:12px;color:rgba(255,255,255,0.7);font-size:14px;" +
                      "padding:12px 24px;cursor:pointer;width:100%' " +
                      "onclick='document.getElementById(\\\"walls-upd-overlay\\\").remove()'>Maybe Later</button>";

                  String js =
                      "(function(){" +
                      "if(document.getElementById('walls-upd-overlay'))return;" +
                      "var o=document.createElement('div');" +
                      "o.id='walls-upd-overlay';" +
                      "o.style.cssText='position:fixed;inset:0;background:" + overlayBg + ";z-index:2147483647;" +
                      "display:flex;flex-direction:column;align-items:center;justify-content:center;" +
                      "font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:32px;box-sizing:border-box';" +
                      "o.innerHTML='" +
                        // App logo from drawable (loaded as img tag pointing to Android asset)
                        "<img src=\"file:///android_res/mipmap/ic_launcher.png\" " +
                        "style=\"width:72px;height:72px;border-radius:18px;margin-bottom:20px;" +
                        "box-shadow:0 4px 24px rgba(108,99,255,0.4)\" onerror=\"this.style.display=\\'none\\'\">" +
                        "<div style=\"font-size:22px;font-weight:700;color:#fff;margin-bottom:6px\">" + label + "</div>" +
                        "<div style=\"font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:32px\">" + sub + "</div>" +
                        "<button style=\"background:" + accentColor + ";border:none;border-radius:14px;" +
                        "color:#fff;font-size:16px;font-weight:600;padding:15px 0;width:100%;cursor:pointer\" " +
                        "onclick=\"window.Android&&Android.openUrl(\\'" + BASE_URL + "/download\\')\">🚀 Update Now</button>" +
                        laterBtn +
                      "';" +
                      "document.body.appendChild(o);" +
                      "})();";
                  wv.evaluateJavascript(js, null);
              }

              // ── Reminder scheduling (works when app is closed) ────────────────────────
              private void scheduleReminder() {
                  AlarmManager am = (AlarmManager) getSystemService(ALARM_SERVICE);
                  Intent ri = new Intent(this, WallpaperReminderReceiver.class);
                  PendingIntent pi = PendingIntent.getBroadcast(this, 0, ri,
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  // Use setExactAndAllowWhileIdle for exact delivery even in doze mode
                  if (Build.VERSION.SDK_INT >= 23) {
                      am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP,
                          System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), pi);
                  } else {
                      am.setRepeating(AlarmManager.RTC_WAKEUP,
                          System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6),
                          TimeUnit.HOURS.toMillis(6), pi);
                  }
              }
          }
