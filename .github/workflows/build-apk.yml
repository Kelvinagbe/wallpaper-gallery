name: Build Android APK + AAB (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          mkdir -p $SDK/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" > $SDK/licenses/android-sdk-license
          echo "y" | $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: Install dependencies
        run: |
          # NO @capacitor/splash-screen — we use Android native splash instead
          npm install @capacitor/core @capacitor/cli @capacitor/android
          [ -f "public/app/index.html" ] || (echo "ERROR: public/app/index.html not found." && exit 1)

      - name: Configure Capacitor
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "ng.name.ovrica.walls",
            "appName": "Walls",
            "webDir": "public/app",
            "android": { "allowMixedContent": true, "backgroundColor": "#000000" }
          }
          EOF
          npx cap add android

      - name: Write file_paths.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="walls_downloads" path="Pictures/Walls/" />
            <external-path name="external_files" path="." />
            <external-files-path name="external_files_path" path="." />
            <cache-path name="cache" path="." />
          </paths>
          EOF

      # ─── MainActivity.java ────────────────────────────────────────────────────
      - name: Write MainActivity.java
        run: |
          MAIN=android/app/src/main/java/ng/name/ovrica/walls/MainActivity.java
          mkdir -p $(dirname $MAIN)
          cat > $MAIN << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.content.pm.PackageManager;
          import android.content.res.Configuration;
          import android.database.Cursor;
          import android.graphics.*;
          import android.graphics.drawable.ColorDrawable;
          import android.Manifest;
          import android.net.Uri;
          import android.os.*;
          import android.provider.MediaStore;
          import android.webkit.*;
          import android.widget.Toast;
          import android.view.View;
          import android.view.WindowManager;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AlertDialog;
          import androidx.core.app.*;
          import androidx.core.content.*;
          import androidx.core.splashscreen.SplashScreen;
          import com.getcapacitor.BridgeActivity;
          import org.json.*;
          import java.io.*;
          import java.net.*;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends BridgeActivity {

              private static final String DL_CH        = "walls_downloads";
              private static final String PROMO_CH     = "walls_promo";
              private static final String TREND_CH     = "walls_trending";
              private static final int    NOTIF_ING    = 2001, NOTIF_DONE = 2002, NOTIF_WELCOME = 4001;
              private static final int    REQ_STORAGE  = 1002, REQ_NOTIF  = 1001;
              private static final long   TIMEOUT_MS   = 60_000;
              private static final String WALLS_FOLDER = "Walls";
              private static final String AUTHORITY    = "ng.name.ovrica.walls.fileprovider";
              private static final String BASE_URL     = "https://walls.ovrica.name.ng";
              private static final String PREF_FILE    = "walls_prefs";
              private static final String PREF_MIN_VER = "cached_min_version";

              private DownloadManager   dm;
              private NotificationManager nm;
              private BroadcastReceiver dlReceiver;
              private final Handler progressHandler = new Handler(Looper.getMainLooper());
              private Runnable progressRunnable;
              private long   lastId = -1, downloadStartTime = 0;
              private String lastFile = "", lastLocalPath = "";
              private String pendingDlUrl, pendingDlName, pendingWpUrl, pendingWpTarget;
              private long backPressedTime = 0;
              private boolean webLoaded = false;
              // Native splash: keep visible until WebView finishes loading
              private boolean splashDone = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  // ── Native splash screen (shows your icon on themed bg, no plugin needed) ──
                  SplashScreen splashScreen = SplashScreen.installSplashScreen(this);
                  // Keep splash visible until our webLoaded flag is set
                  splashScreen.setKeepOnScreenCondition(() -> !splashDone);

                  getWindow().setBackgroundDrawable(new ColorDrawable(Color.BLACK));
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS);
                  super.onCreate(savedInstanceState);
                  applySystemTheme();
              }

              @Override
              public void onStart() {
                  super.onStart();
                  dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                  nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  mkChannel(DL_CH,    "Walls Downloads",     "Wallpaper download notifications");
                  mkChannel(PROMO_CH, "Wallpaper Reminders", "Periodic reminders");
                  mkChannel(TREND_CH, "Trending Wallpapers", "Hot & trending wallpaper picks");
                  if (Build.VERSION.SDK_INT >= 33 &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                          != PackageManager.PERMISSION_GRANTED)
                      ActivityCompat.requestPermissions(this,
                          new String[]{ Manifest.permission.POST_NOTIFICATIONS }, REQ_NOTIF);
                  if (getBridge() != null && getBridge().getWebView() != null && !webLoaded) {
                      setupWebView(); setupJsBridge(); setupDownload(); webLoaded = true;
                  }
                  registerDlReceiver(); scheduleReminder(); handleDeepLink(getIntent());
                  showWelcome(); checkForUpdate();
              }

              @Override public void onNewIntent(Intent i) { super.onNewIntent(i); handleDeepLink(i); }

              @Override
              public void onResume() {
                  super.onResume();
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) return;
                  boolean dark = isDarkTheme();
                  int bg = Color.parseColor(dark ? "#111318" : "#F1F3F4");
                  getWindow().setBackgroundDrawable(new ColorDrawable(bg));
                  wv.setBackgroundColor(bg);
                  String url = wv.getUrl();
                  if (url == null || url.equals("about:blank")) wv.loadUrl(BASE_URL);
              }

              @Override
              public void onConfigurationChanged(Configuration newConfig) {
                  super.onConfigurationChanged(newConfig);
                  applySystemTheme();
              }

              @Override
              public void onBackPressed() {
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null && wv.canGoBack()) { wv.goBack(); return; }
                  if (System.currentTimeMillis() - backPressedTime < 2000) { super.onBackPressed(); return; }
                  backPressedTime = System.currentTimeMillis();
                  Toast.makeText(this, "Press back again to exit", Toast.LENGTH_SHORT).show();
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  stopProgressPolling();
                  if (dlReceiver != null) try { unregisterReceiver(dlReceiver); } catch (Exception ignored) {}
              }

              private boolean isDarkTheme() {
                  int mode = getResources().getConfiguration().uiMode & Configuration.UI_MODE_NIGHT_MASK;
                  return mode == Configuration.UI_MODE_NIGHT_YES;
              }

              private void applySystemTheme() {
                  boolean dark = isDarkTheme();
                  int bgColor = Color.parseColor(dark ? "#111318" : "#F1F3F4");
                  getWindow().setBackgroundDrawable(new ColorDrawable(bgColor));
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null) {
                      wv.setBackgroundColor(bgColor);
                      wv.evaluateJavascript(
                          "window.dispatchEvent(new CustomEvent('walls_theme',{detail:{dark:" + dark + "}}))", null);
                  }
                  if (Build.VERSION.SDK_INT >= 21) {
                      getWindow().setStatusBarColor(bgColor);
                      getWindow().setNavigationBarColor(bgColor);
                  }
                  if (Build.VERSION.SDK_INT >= 26) {
                      View decor = getWindow().getDecorView();
                      int flags = decor.getSystemUiVisibility();
                      if (!dark) flags |= View.SYSTEM_UI_FLAG_LIGHT_NAVIGATION_BAR | View.SYSTEM_UI_FLAG_LIGHT_STATUS_BAR;
                      else flags &= ~(View.SYSTEM_UI_FLAG_LIGHT_NAVIGATION_BAR | View.SYSTEM_UI_FLAG_LIGHT_STATUS_BAR);
                      decor.setSystemUiVisibility(flags);
                  }
              }

              private void setupWebView() {
                  WebView wv = getBridge().getWebView();
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true); ws.setDomStorageEnabled(true);
                  ws.setAllowFileAccess(true); ws.setAllowContentAccess(true);
                  ws.setCacheMode(WebSettings.LOAD_DEFAULT); ws.setTextZoom(100);
                  ws.setSupportZoom(false); ws.setUseWideViewPort(true);
                  ws.setMediaPlaybackRequiresUserGesture(false);
                  if (Build.VERSION.SDK_INT >= 21) ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  boolean dark = isDarkTheme();
                  wv.setBackgroundColor(Color.parseColor(dark ? "#111318" : "#F1F3F4"));

                  wv.setWebViewClient(new WebViewClient() {
                      @Override public void onPageStarted(WebView v, String url, Bitmap favicon) {
                          runOnUiThread(() -> showLoadingOverlay(v));
                      }
                      @Override public void onPageFinished(WebView v, String url) {
                          // Dismiss native splash now that WebView has content
                          splashDone = true;
                          runOnUiThread(() -> hideLoadingOverlay(v));
                          boolean dark = isDarkTheme();
                          v.evaluateJavascript(
                              "window.WALLS_PLATFORM='android';" +
                              "window.WALLS_VERSION='" + getVersion() + "';" +
                              "window.WALLS_DARK=" + dark + ";" +
                              "window.WallsApp={" +
                              "  download:function(url,name){Android.downloadFile(url,name||'wallpaper.jpg')}," +
                              "  setWallpaper:function(url,t){Android.setWallpaper(url,t||'home')}," +
                              "  requestStorage:function(){Android.requestStoragePermission()}," +
                              "  hasStorage:function(){return Android.hasStorage()}," +
                              "  isAndroid:function(){return true}," +
                              "  getVersion:function(){return Android.getVersion()}," +
                              "  openUrl:function(url){Android.openUrl(url)}," +
                              "  getTheme:function(){return Android.getTheme()}," +
                              "  getSystemImages:function(cb){Android.getSystemImages(cb)}," +
                              "  shareFile:function(path){Android.shareFile(path)}," +
                              "  toast:function(msg){Android.showToast(msg)}" +
                              "};" +
                              "window.dispatchEvent(new CustomEvent('walls_native_ready',{detail:{" +
                              "  hasStorage:" + hasStoragePermission() + ",dark:" + dark + "}}));" +
                              "window.dispatchEvent(new CustomEvent('walls_theme',{detail:{dark:" + dark + "}}));", null);
                      }
                      @Override public void onReceivedError(WebView v, WebResourceRequest req, WebResourceError err) {
                          if (!req.isForMainFrame()) return;
                          splashDone = true; // dismiss splash even on error
                          runOnUiThread(() -> hideLoadingOverlay(v));
                          boolean dark = isDarkTheme();
                          String bg = dark ? "#111318" : "#F1F3F4", fg = dark ? "#ffffff" : "#1a1a1a";
                          v.loadData(
                              "<html><body style='background:" + bg + ";color:" + fg + ";font-family:sans-serif;" +
                              "display:flex;flex-direction:column;align-items:center;justify-content:center;" +
                              "height:100vh;margin:0;text-align:center;padding:24px'>" +
                              "<div style='font-size:48px'>📡</div>" +
                              "<h2 style='margin:12px 0 8px'>No Internet</h2>" +
                              "<p style='opacity:0.6;margin:0 0 24px'>Check your connection and try again</p>" +
                              "<button onclick='location.reload()' style='padding:12px 28px;background:#6c63ff;" +
                              "border:none;border-radius:10px;color:#fff;font-size:15px;cursor:pointer'>Retry</button>" +
                              "</body></html>", "text/html", "UTF-8");
                      }
                      @Override public boolean shouldOverrideUrlLoading(WebView v, WebResourceRequest req) {
                          String url = req.getUrl().toString();
                          if (url.startsWith(BASE_URL) || url.startsWith("https://localhost") ||
                              url.startsWith("http://localhost") || url.startsWith("capacitor://")) return false;
                          try { startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); } catch (Exception ignored) {}
                          return true;
                      }
                  });

                  wv.setWebChromeClient(new WebChromeClient() {
                      @Override public boolean onConsoleMessage(ConsoleMessage msg) {
                          android.util.Log.d("WallsJS", msg.sourceId() + ":" + msg.lineNumber() + " " + msg.message());
                          return true;
                      }
                      @Override public boolean onJsConfirm(WebView v, String url, String msg, JsResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK", (d, w) -> r.confirm())
                              .setNegativeButton("Cancel", (d, w) -> r.cancel())
                              .setOnCancelListener(d -> r.cancel()).show(); return true;
                      }
                      @Override public boolean onJsAlert(WebView v, String url, String msg, JsResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK", (d, w) -> r.confirm())
                              .setOnCancelListener(d -> r.confirm()).show(); return true;
                      }
                      @Override public boolean onJsPrompt(WebView v, String url, String msg, String def, JsPromptResult r) {
                          new AlertDialog.Builder(MainActivity.this).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK", (d, w) -> r.confirm(def))
                              .setNegativeButton("Cancel", (d, w) -> r.cancel())
                              .setOnCancelListener(d -> r.cancel()).show(); return true;
                      }
                  });
              }

              private android.widget.FrameLayout loadingOverlay;
              private void showLoadingOverlay(WebView wv) {
                  if (loadingOverlay != null && loadingOverlay.getParent() != null) return;
                  boolean dark = isDarkTheme();
                  android.widget.FrameLayout fl = new android.widget.FrameLayout(this);
                  fl.setBackgroundColor(Color.parseColor(dark ? "#111318" : "#F1F3F4"));
                  android.widget.ProgressBar pb = new android.widget.ProgressBar(this);
                  pb.setIndeterminate(true);
                  pb.getIndeterminateDrawable().setColorFilter(Color.parseColor("#6c63ff"), android.graphics.PorterDuff.Mode.SRC_IN);
                  android.widget.FrameLayout.LayoutParams lp = new android.widget.FrameLayout.LayoutParams(120, 120);
                  lp.gravity = android.view.Gravity.CENTER;
                  fl.addView(pb, lp);
                  loadingOverlay = fl;
                  if (wv.getParent() instanceof android.view.ViewGroup) {
                      ((android.view.ViewGroup) wv.getParent()).addView(fl, new android.view.ViewGroup.LayoutParams(
                          android.view.ViewGroup.LayoutParams.MATCH_PARENT,
                          android.view.ViewGroup.LayoutParams.MATCH_PARENT));
                  }
              }
              private void hideLoadingOverlay(WebView wv) {
                  if (loadingOverlay != null && loadingOverlay.getParent() != null)
                      ((android.view.ViewGroup) loadingOverlay.getParent()).removeView(loadingOverlay);
                  loadingOverlay = null;
              }

              private void setupJsBridge() {
                  getBridge().getWebView().addJavascriptInterface(new Object() {

                      @android.webkit.JavascriptInterface
                      public void downloadFile(String url, String filename) {
                          if (url == null || url.isEmpty()) return;
                          String name = (filename != null && !filename.isEmpty()) ? filename : "wallpaper.jpg";
                          if (!name.contains(".")) name += ".jpg";
                          final String fn = name;
                          if (hasStoragePermission()) runOnUiThread(() -> triggerDownload(url, fn));
                          else { pendingDlUrl = url; pendingDlName = fn; requestStoragePermission(); }
                      }

                      @android.webkit.JavascriptInterface
                      public void setWallpaper(String url, String target) {
                          if (url == null || url.isEmpty()) return;
                          if (hasStoragePermission()) runOnUiThread(() -> downloadForWallpaper(url, target));
                          else { pendingWpUrl = url; pendingWpTarget = target; requestStoragePermission(); }
                      }

                      @android.webkit.JavascriptInterface public void requestStoragePermission() { runOnUiThread(() -> MainActivity.this.requestStoragePermission()); }
                      @android.webkit.JavascriptInterface public boolean hasStorage() { return hasStoragePermission(); }
                      @android.webkit.JavascriptInterface public boolean isAndroid() { return true; }
                      @android.webkit.JavascriptInterface public String getVersion() { return MainActivity.this.getVersion(); }
                      @android.webkit.JavascriptInterface public String getTheme() { return isDarkTheme() ? "dark" : "light"; }
                      @android.webkit.JavascriptInterface public void openUrl(String url) {
                          if (url == null || url.isEmpty()) return;
                          runOnUiThread(() -> { try { startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); } catch (Exception ignored) {} });
                      }
                      @android.webkit.JavascriptInterface public void showToast(String msg) {
                          if (msg == null) return;
                          runOnUiThread(() -> Toast.makeText(MainActivity.this, msg, Toast.LENGTH_SHORT).show());
                      }

                      @android.webkit.JavascriptInterface
                      public String getSystemImages(String callbackName) {
                          new Thread(() -> {
                              try {
                                  String[] projection = { MediaStore.Images.Media.DATA,
                                      MediaStore.Images.Media.DISPLAY_NAME, MediaStore.Images.Media.SIZE };
                                  Cursor cursor = getContentResolver().query(
                                      MediaStore.Images.Media.EXTERNAL_CONTENT_URI,
                                      projection, null, null,
                                      MediaStore.Images.Media.DATE_ADDED + " DESC");
                                  JSONArray arr = new JSONArray();
                                  if (cursor != null) {
                                      int dataIdx = cursor.getColumnIndexOrThrow(MediaStore.Images.Media.DATA);
                                      int nameIdx = cursor.getColumnIndexOrThrow(MediaStore.Images.Media.DISPLAY_NAME);
                                      int sizeIdx = cursor.getColumnIndexOrThrow(MediaStore.Images.Media.SIZE);
                                      while (cursor.moveToNext()) {
                                          String path = cursor.getString(dataIdx);
                                          arr.put(new JSONObject().put("path", path)
                                              .put("name", cursor.getString(nameIdx))
                                              .put("size", cursor.getLong(sizeIdx))
                                              .put("uri", "file://" + path));
                                      }
                                      cursor.close();
                                  }
                                  final String json = arr.toString();
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null && callbackName != null && !callbackName.isEmpty())
                                      runOnUiThread(() -> wv.evaluateJavascript(
                                          "if(typeof " + callbackName + "==='function')" + callbackName + "(" + json + ");", null));
                              } catch (Exception e) {
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null && callbackName != null && !callbackName.isEmpty())
                                      runOnUiThread(() -> wv.evaluateJavascript(
                                          "if(typeof " + callbackName + "==='function')" + callbackName + "([]);", null));
                              }
                          }).start();
                          return "pending";
                      }

                      @android.webkit.JavascriptInterface
                      public void shareFile(String path) {
                          if (path == null || path.isEmpty()) return;
                          runOnUiThread(() -> {
                              try {
                                  File f = new File(path.replace("file://", ""));
                                  Uri uri = FileProvider.getUriForFile(MainActivity.this, AUTHORITY, f);
                                  startActivity(Intent.createChooser(
                                      new Intent(Intent.ACTION_SEND).setType("image/*")
                                          .putExtra(Intent.EXTRA_STREAM, uri)
                                          .addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION),
                                      "Share wallpaper"));
                              } catch (Exception e) {
                                  Toast.makeText(MainActivity.this, "Share failed: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                              }
                          });
                      }
                  }, "Android");
              }

              private boolean hasStoragePermission() {
                  if (Build.VERSION.SDK_INT >= 33) return ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_IMAGES) == PackageManager.PERMISSION_GRANTED;
                  if (Build.VERSION.SDK_INT >= 29) return true;
                  return ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE) == PackageManager.PERMISSION_GRANTED;
              }

              private void requestStoragePermission() {
                  if (Build.VERSION.SDK_INT >= 33) ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.READ_MEDIA_IMAGES }, REQ_STORAGE);
                  else if (Build.VERSION.SDK_INT < 29) ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE }, REQ_STORAGE);
              }

              @Override
              public void onRequestPermissionsResult(int code, @NonNull String[] perms, @NonNull int[] results) {
                  super.onRequestPermissionsResult(code, perms, results);
                  if (code != REQ_STORAGE) return;
                  boolean granted = results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED;
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null) wv.evaluateJavascript(
                      "window.dispatchEvent(new CustomEvent('walls_perm_" + (granted ? "granted" : "denied") + "'))", null);
                  if (!granted) { Toast.makeText(this, "Storage permission denied.", Toast.LENGTH_LONG).show(); return; }
                  if (pendingDlUrl != null) { final String u = pendingDlUrl, n = pendingDlName; pendingDlUrl = null; pendingDlName = null; runOnUiThread(() -> triggerDownload(u, n)); }
                  if (pendingWpUrl != null) { final String u = pendingWpUrl, t = pendingWpTarget; pendingWpUrl = null; pendingWpTarget = null; runOnUiThread(() -> downloadForWallpaper(u, t)); }
              }

              private void triggerDownload(String url, String filename) {
                  lastFile = filename; downloadStartTime = System.currentTimeMillis();
                  Toast.makeText(this, "Starting download…", Toast.LENGTH_SHORT).show();
                  nm.notify(NOTIF_ING, notifBuilder(DL_CH, "Downloading", lastFile).setProgress(0, 0, true).setOngoing(true).build());
                  try {
                      new File(android.os.Environment.getExternalStoragePublicDirectory(
                          android.os.Environment.DIRECTORY_PICTURES), WALLS_FOLDER).mkdirs();
                      DownloadManager.Request req = new DownloadManager.Request(Uri.parse(url))
                          .setTitle(lastFile).setDescription("Downloading wallpaper…").setMimeType("image/jpeg")
                          .setDestinationInExternalPublicDir(android.os.Environment.DIRECTORY_PICTURES, WALLS_FOLDER + "/" + lastFile)
                          .setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                      lastId = dm.enqueue(req); startProgressPolling();
                      WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                      if (wv != null) wv.evaluateJavascript(
                          "window.dispatchEvent(new CustomEvent('walls_dl_started',{detail:{name:'" + lastFile + "'}}))", null);
                  } catch (Exception e) {
                      nm.cancel(NOTIF_ING);
                      runOnUiThread(() -> Toast.makeText(this, "Download failed: " + e.getMessage(), Toast.LENGTH_LONG).show());
                  }
              }

              private void downloadForWallpaper(String url, String target) {
                  Toast.makeText(this, "Downloading wallpaper…", Toast.LENGTH_SHORT).show();
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                          conn.setConnectTimeout(15000); conn.setReadTimeout(30000); conn.connect();
                          Bitmap bmp = BitmapFactory.decodeStream(conn.getInputStream());
                          if (bmp == null) throw new Exception("Could not decode image");
                          int flags = "lock".equals(target) ? WallpaperManager.FLAG_LOCK :
                                      "both".equals(target) ? WallpaperManager.FLAG_SYSTEM | WallpaperManager.FLAG_LOCK :
                                      WallpaperManager.FLAG_SYSTEM;
                          applyWallpaperBitmap(bmp, flags);
                          String fname = "walls_" + System.currentTimeMillis() + ".jpg";
                          File dir = new File(android.os.Environment.getExternalStoragePublicDirectory(
                              android.os.Environment.DIRECTORY_PICTURES), WALLS_FOLDER);
                          dir.mkdirs();
                          File out = new File(dir, fname);
                          try (FileOutputStream fos = new FileOutputStream(out)) { bmp.compress(Bitmap.CompressFormat.JPEG, 95, fos); }
                          scanFile(out);
                      } catch (Exception e) {
                          runOnUiThread(() -> Toast.makeText(this, "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show());
                      }
                  }).start();
              }

              private void applyWallpaperBitmap(Bitmap bmp, int flags) {
                  try {
                      WallpaperManager wm = WallpaperManager.getInstance(this);
                      if (Build.VERSION.SDK_INT >= 24) wm.setBitmap(bmp, null, true, flags); else wm.setBitmap(bmp);
                      runOnUiThread(() -> {
                          Toast.makeText(this, "Wallpaper set! 🎉", Toast.LENGTH_SHORT).show();
                          WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                          if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_wp_set'))", null);
                      });
                  } catch (Exception e) {
                      runOnUiThread(() -> Toast.makeText(this, "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show());
                  }
              }

              private void applyWallpaper(File file, int flags) {
                  new Thread(() -> {
                      try {
                          Bitmap bmp = BitmapFactory.decodeFile(file.getAbsolutePath());
                          if (bmp == null) throw new Exception("Could not decode image");
                          applyWallpaperBitmap(bmp, flags);
                      } catch (Exception e) {
                          runOnUiThread(() -> Toast.makeText(this, "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show());
                      }
                  }).start();
              }

              private void scanFile(File file) { sendBroadcast(new Intent(Intent.ACTION_MEDIA_SCANNER_SCAN_FILE).setData(Uri.fromFile(file))); }
              private String getVersion() { try { return getPackageManager().getPackageInfo(getPackageName(), 0).versionName; } catch (Exception e) { return "1.0.0"; } }

              private void startProgressPolling() {
                  stopProgressPolling();
                  progressRunnable = new Runnable() {
                      @Override public void run() {
                          if (lastId == -1) return;
                          if (System.currentTimeMillis() - downloadStartTime > TIMEOUT_MS) {
                              dm.remove(lastId); lastId = -1; nm.cancel(NOTIF_ING);
                              nm.notify(NOTIF_DONE, notifBuilder(DL_CH, "Download Timed Out", "\"" + lastFile + "\" took too long.").setAutoCancel(true).build());
                              runOnUiThread(() -> Toast.makeText(MainActivity.this, "Download timed out.", Toast.LENGTH_LONG).show());
                              return;
                          }
                          Cursor c = dm.query(new DownloadManager.Query().setFilterById(lastId));
                          if (c == null || !c.moveToFirst()) { if (c != null) c.close(); progressHandler.postDelayed(this, 1000); return; }
                          int status = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_STATUS));
                          long dl  = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_BYTES_DOWNLOADED_SO_FAR));
                          long tot = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_TOTAL_SIZE_BYTES));
                          String localUri = c.getString(c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI));
                          if (localUri != null) lastLocalPath = localUri;
                          c.close();
                          if (status == DownloadManager.STATUS_FAILED) {
                              stopProgressPolling(); nm.cancel(NOTIF_ING);
                              nm.notify(NOTIF_DONE, notifBuilder(DL_CH, "Download Failed", "\"" + lastFile + "\" could not be downloaded.").setAutoCancel(true).build());
                              runOnUiThread(() -> Toast.makeText(MainActivity.this, "Download failed.", Toast.LENGTH_LONG).show());
                              return;
                          }
                          if (status == DownloadManager.STATUS_RUNNING || status == DownloadManager.STATUS_PAUSED) {
                              if (tot > 0) {
                                  int pct = (int)(dl * 100L / tot);
                                  String sz  = dl  < 1<<20 ? String.format("%.1f KB", dl/1024f)  : String.format("%.1f MB", dl/(1024f*1024));
                                  String tsz = tot < 1<<20 ? String.format("%.1f KB", tot/1024f) : String.format("%.1f MB", tot/(1024f*1024));
                                  nm.notify(NOTIF_ING, notifBuilder(DL_CH, "Downloading", sz + " / " + tsz).setProgress(100, pct, false).setOngoing(true).build());
                                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                                  if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_progress',{detail:{pct:" + pct + ",name:'" + lastFile + "'}}))", null);
                              }
                              progressHandler.postDelayed(this, 1000);
                          } else { stopProgressPolling(); }
                      }
                  };
                  progressHandler.postDelayed(progressRunnable, 500);
              }

              private void stopProgressPolling() {
                  if (progressRunnable != null) { progressHandler.removeCallbacks(progressRunnable); progressRunnable = null; }
              }

              private void registerDlReceiver() {
                  dlReceiver = new BroadcastReceiver() {
                      @Override public void onReceive(Context ctx, Intent intent) {
                          long id = intent.getLongExtra(DownloadManager.EXTRA_DOWNLOAD_ID, -1);
                          if (id != lastId) return;
                          stopProgressPolling();
                          Cursor c = dm.query(new DownloadManager.Query().setFilterById(id));
                          if (c == null || !c.moveToFirst()) { if (c != null) c.close(); return; }
                          int status = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_STATUS));
                          String uri = c.getString(c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI));
                          int reason = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_REASON));
                          c.close(); nm.cancel(NOTIF_ING);
                          runOnUiThread(() -> {
                              if (status == DownloadManager.STATUS_SUCCESSFUL && uri != null) onDownloadSuccess(ctx, uri);
                              else {
                                  nm.notify(NOTIF_DONE, notifBuilder(DL_CH, "Download Failed", "Could not download \"" + lastFile + "\".").setAutoCancel(true).build());
                                  Toast.makeText(ctx, "Download failed (code " + reason + ")", Toast.LENGTH_LONG).show();
                              }
                          });
                      }
                  };
                  IntentFilter f = new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE);
                  if (Build.VERSION.SDK_INT >= 33) registerReceiver(dlReceiver, f, RECEIVER_NOT_EXPORTED);
                  else registerReceiver(dlReceiver, f);
              }

              private void onDownloadSuccess(Context ctx, String localUri) {
                  try {
                      File file = new File(Uri.parse(localUri).getPath());
                      scanFile(file);
                      WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                      if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_done',{detail:{name:'" + lastFile + "'}}))", null);

                      // Load thumbnail from saved file for notification
                      Bitmap thumb = null;
                      try { BitmapFactory.Options o = new BitmapFactory.Options(); o.inSampleSize = 4; thumb = BitmapFactory.decodeFile(file.getAbsolutePath(), o); } catch (Exception ignored) {}

                      new AlertDialog.Builder(this)
                          .setTitle("Set as Wallpaper").setMessage("\"" + lastFile + "\" saved!\nSet it as your wallpaper?")
                          .setPositiveButton("Home Screen", (d, w) -> applyWallpaper(file, WallpaperManager.FLAG_SYSTEM))
                          .setNeutralButton("Lock Screen",  (d, w) -> applyWallpaper(file, WallpaperManager.FLAG_LOCK))
                          .setNegativeButton("Both",        (d, w) -> applyWallpaper(file, WallpaperManager.FLAG_SYSTEM | WallpaperManager.FLAG_LOCK))
                          .create().show();

                      Uri safeUri = FileProvider.getUriForFile(ctx, AUTHORITY, file);
                      Intent chooser = Intent.createChooser(
                          new Intent(Intent.ACTION_ATTACH_DATA).setDataAndType(safeUri, "image/*")
                              .addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION).putExtra("mimeType", "image/*"), "Set as wallpaper");
                      NotificationCompat.Builder nb = notifBuilder(DL_CH, "Wallpaper Saved!", "Tap to set \"" + lastFile + "\" as wallpaper");
                      if (thumb != null) nb.setLargeIcon(thumb);
                      nm.notify(NOTIF_DONE, nb.setContentIntent(PendingIntent.getActivity(ctx, 0, chooser,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE)).setAutoCancel(true).build());
                  } catch (Exception e) {
                      nm.notify(NOTIF_DONE, notifBuilder(DL_CH, "Error", "Saved but could not open: " + e.getMessage()).setAutoCancel(true).build());
                  }
              }

              private void mkChannel(String id, String name, String desc) {
                  if (Build.VERSION.SDK_INT < 26) return;
                  NotificationChannel ch = new NotificationChannel(id, name, NotificationManager.IMPORTANCE_HIGH);
                  ch.setDescription(desc); ch.enableVibration(true);
                  ch.setVibrationPattern(new long[]{0, 250, 100, 250});
                  ch.setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI,
                      new android.media.AudioAttributes.Builder().setUsage(android.media.AudioAttributes.USAGE_NOTIFICATION).build());
                  nm.createNotificationChannel(ch);
              }

              // Central notification builder — monochrome small icon + app launcher as large icon
              private NotificationCompat.Builder notifBuilder(String ch, String title, String text) {
                  Bitmap appIcon = null;
                  try { appIcon = BitmapFactory.decodeResource(getResources(), R.mipmap.ic_launcher); } catch (Exception ignored) {}
                  NotificationCompat.Builder b = new NotificationCompat.Builder(this, ch)
                      .setSmallIcon(R.drawable.ic_notification)
                      .setContentTitle(title).setContentText(text)
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .setCategory(NotificationCompat.CATEGORY_MESSAGE)
                      .setDefaults(NotificationCompat.DEFAULT_ALL);
                  if (appIcon != null) b.setLargeIcon(appIcon);
                  return b;
              }

              private PendingIntent launchIntent() {
                  return PendingIntent.getActivity(this, 0,
                      getPackageManager().getLaunchIntentForPackage(getPackageName()),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
              }

              private void handleDeepLink(Intent intent) {
                  if (intent == null) return;
                  Uri data = intent.getData();
                  if (data == null || getBridge() == null) return;
                  String url = data.toString();
                  runOnUiThread(() -> {
                      WebView wv = getBridge().getWebView();
                      showLoadingOverlay(wv); wv.loadUrl(url);
                      wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_deeplink',{detail:{url:'" + url + "'}}))", null);
                  });
              }

              private void showWelcome() {
                  SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                  boolean first = prefs.getBoolean("first_launch", true);
                  if (first) prefs.edit().putBoolean("first_launch", false).apply();
                  nm.notify(NOTIF_WELCOME, notifBuilder(PROMO_CH,
                      first ? "Welcome to Walls 🖼️" : "🔥 Hot wallpapers waiting!",
                      first ? "Discover stunning wallpapers curated just for you."
                            : "Check out today's trending wallpapers. Find your next favorite.")
                      .setContentIntent(launchIntent()).setAutoCancel(true).build());
              }

              private void checkForUpdate() {
                  final String cv = getVersion();
                  SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                  String cachedMin = prefs.getString(PREF_MIN_VER, "");
                  if (!cachedMin.isEmpty() && isNewer(cachedMin, cv)) { runOnUiThread(() -> showUpdateUI(cv, cachedMin, true)); return; }
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(BASE_URL + "/version.json").openConnection();
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000);
                          conn.setRequestProperty("Cache-Control", "no-cache");
                          if (conn.getResponseCode() != 200) return;
                          BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder(); String line;
                          while ((line = br.readLine()) != null) sb.append(line);
                          br.close();
                          JSONObject vObj = new JSONObject(sb.toString());
                          String latest = vObj.optString("latest", ""), minVer = vObj.optString("minVersion", "");
                          if (!minVer.isEmpty()) prefs.edit().putString(PREF_MIN_VER, minVer).apply();
                          if (!latest.isEmpty() && isNewer(latest, cv)) {
                              boolean forced = !minVer.isEmpty() && isNewer(minVer, cv);
                              runOnUiThread(() -> showUpdateUI(cv, latest, forced));
                          }
                      } catch (Exception e) { android.util.Log.e("WallsUpdate", "checkForUpdate: " + e.getMessage()); }
                  }).start();
              }

              private boolean isNewer(String a, String b) {
                  try {
                      String[] av = a.split("\\."), bv = b.split("\\.");
                      for (int i = 0; i < Math.max(av.length, bv.length); i++) {
                          int ai = i < av.length ? Integer.parseInt(av[i].trim()) : 0;
                          int bi = i < bv.length ? Integer.parseInt(bv[i].trim()) : 0;
                          if (ai != bi) return ai > bi;
                      }
                  } catch (Exception ignored) {}
                  return false;
              }

              private void showUpdateUI(String current, String latest, boolean forced) {
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) return;
                  boolean dark = isDarkTheme();
                  String bg = dark ? "#0d0d12" : "#F1F3F4", fg = dark ? "#ffffff" : "#111318";
                  String muted = dark ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.45)";
                  String bdr   = dark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.1)";
                  String label = forced ? "Update Required" : "Update Available";
                  String sub   = "v" + current + " to v" + latest + (forced ? " - Required to continue" : "");
                  String dlUrl = BASE_URL + "/download";
                  String js =
                      "(function(){" +
                      "if(document.getElementById('walls-upd-overlay'))return;" +
                      "var o=document.createElement('div');" +
                      "o.id='walls-upd-overlay';" +
                      "o.style.cssText='position:fixed;inset:0;background:" + bg + ";z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:32px;box-sizing:border-box;text-align:center';" +
                      "var img=document.createElement('img');img.src='file:///android_res/mipmap/ic_launcher.png';img.style.cssText='width:80px;height:80px;border-radius:20px;margin-bottom:24px;box-shadow:0 4px 32px rgba(108,99,255,0.35)';img.onerror=function(){this.style.display='none'};o.appendChild(img);" +
                      "var h=document.createElement('div');h.textContent='" + label + "';h.style.cssText='font-size:24px;font-weight:800;color:" + fg + ";margin-bottom:8px';o.appendChild(h);" +
                      "var s=document.createElement('div');s.textContent='" + sub + "';s.style.cssText='font-size:14px;color:" + muted + ";margin-bottom:40px';o.appendChild(s);" +
                      "var w=document.createElement('div');w.style.cssText='width:100%;max-width:340px';" +
                      "var btn=document.createElement('button');btn.textContent='Update Now';btn.style.cssText='width:100%;padding:16px;background:#6c63ff;border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer';btn.onclick=function(){window.Android&&Android.openUrl('" + dlUrl + "')};w.appendChild(btn);" +
                      (forced ? "" : "var later=document.createElement('button');later.textContent='Maybe Later';later.style.cssText='margin-top:10px;width:100%;padding:13px;background:transparent;border:1px solid " + bdr + ";border-radius:14px;color:" + muted + ";font-size:14px;cursor:pointer;font-family:inherit';later.onclick=function(){document.getElementById('walls-upd-overlay').remove()};w.appendChild(later);") +
                      "o.appendChild(w);document.body.appendChild(o);})();";
                  wv.post(() -> wv.evaluateJavascript(js, null));
              }

              private void scheduleReminder() {
                  AlarmManager am = (AlarmManager) getSystemService(ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(this, 0,
                      new Intent(this, WallpaperReminderReceiver.class),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), pi);
                  else am.setRepeating(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), TimeUnit.HOURS.toMillis(6), pi);
              }
          }
          EOF

      # ─── WallpaperReminderReceiver ────────────────────────────────────────────
      - name: Write WallpaperReminderReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallpaperReminderReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.graphics.*;
          import android.net.Uri;
          import android.os.*;
          import androidx.core.app.NotificationCompat;
          import org.json.*;
          import java.io.*;
          import java.net.*;
          import java.util.*;
          import java.util.concurrent.TimeUnit;

          public class WallpaperReminderReceiver extends BroadcastReceiver {
              private static final String BASE_URL = "https://walls.ovrica.name.ng";
              private static final String TREND_CH = "walls_trending";
              private static final int    NOTIF_ID = 5001;

              @Override
              public void onReceive(Context ctx, Intent intent) {
                  reschedule(ctx);
                  NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel ch = new NotificationChannel(TREND_CH, "Trending Wallpapers", NotificationManager.IMPORTANCE_HIGH);
                      ch.setDescription("Hot & trending wallpaper picks"); ch.enableVibration(true);
                      nm.createNotificationChannel(ch);
                  }
                  PendingResult pr = goAsync();
                  new Thread(() -> { try { fetchAndNotify(ctx, nm); } finally { pr.finish(); } }).start();
              }

              private void fetchAndNotify(Context ctx, NotificationManager nm) {
                  try {
                      HttpURLConnection conn = (HttpURLConnection) new URL(BASE_URL + "/hot.json").openConnection();
                      conn.setConnectTimeout(8000); conn.setReadTimeout(8000);
                      conn.setRequestProperty("Cache-Control", "no-cache");
                      if (conn.getResponseCode() != 200) { fallback(ctx, nm); return; }
                      BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                      StringBuilder sb = new StringBuilder(); String line;
                      while ((line = br.readLine()) != null) sb.append(line);
                      br.close();

                      List<String> titles = new ArrayList<>(), imgUrls = new ArrayList<>();
                      try {
                          JSONArray arr = new JSONArray(sb.toString());
                          for (int i = 0; i < arr.length() && titles.size() < 5; i++) {
                              JSONObject obj = arr.getJSONObject(i);
                              if (obj.has("title")) titles.add(obj.getString("title"));
                              for (String k : new String[]{"image_url","url","thumbnail"})
                                  if (obj.has(k)) { imgUrls.add(obj.getString(k)); break; }
                          }
                      } catch (JSONException je) {
                          java.util.regex.Matcher mt = java.util.regex.Pattern.compile("\"title\"\\s*:\\s*\"([^\"]+)\"").matcher(sb);
                          while (mt.find() && titles.size() < 5) titles.add(mt.group(1));
                          java.util.regex.Matcher mu = java.util.regex.Pattern.compile("\"(?:image_url|url|thumbnail)\"\\s*:\\s*\"([^\"]+)\"").matcher(sb);
                          while (mu.find() && imgUrls.size() < 5) imgUrls.add(mu.group(1));
                      }
                      if (titles.isEmpty()) { fallback(ctx, nm); return; }

                      // Fetch wallpaper image for BigPicture style
                      Bitmap bigPic = null;
                      if (!imgUrls.isEmpty()) try {
                          HttpURLConnection ic = (HttpURLConnection) new URL(imgUrls.get(0)).openConnection();
                          ic.setConnectTimeout(5000); ic.setReadTimeout(5000);
                          bigPic = BitmapFactory.decodeStream(ic.getInputStream());
                      } catch (Exception ignored) {}

                      // App launcher as large icon
                      Bitmap appIcon = null;
                      try { appIcon = BitmapFactory.decodeResource(ctx.getResources(), R.mipmap.ic_launcher); } catch (Exception ignored) {}

                      PendingIntent pi = PendingIntent.getActivity(ctx, 0,
                          ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);

                      NotificationCompat.Builder nb;
                      if (bigPic != null) {
                          nb = new NotificationCompat.Builder(ctx, TREND_CH)
                              .setSmallIcon(R.drawable.ic_notification)
                              .setContentTitle("🔥 Hot wallpapers waiting!")
                              .setContentText(titles.get(0) + (titles.size() > 1 ? " +" + (titles.size()-1) + " more" : ""))
                              .setStyle(new NotificationCompat.BigPictureStyle()
                                  .bigPicture(bigPic)
                                  .setBigContentTitle("🔥 Hot wallpapers waiting!")
                                  .setSummaryText(titles.get(0)))
                              .setLargeIcon(bigPic);
                      } else {
                          NotificationCompat.InboxStyle inbox = new NotificationCompat.InboxStyle()
                              .setBigContentTitle("🔥 Hot wallpapers waiting!")
                              .setSummaryText(titles.size() + " hot wallpapers");
                          for (String t : titles) inbox.addLine("🖼️  " + t);
                          nb = new NotificationCompat.Builder(ctx, TREND_CH)
                              .setSmallIcon(R.drawable.ic_notification)
                              .setContentTitle("🔥 Hot wallpapers waiting!")
                              .setContentText(titles.get(0) + (titles.size() > 1 ? " +" + (titles.size()-1) + " more" : ""))
                              .setStyle(inbox);
                          if (appIcon != null) nb.setLargeIcon(appIcon);
                      }
                      nb.setPriority(NotificationCompat.PRIORITY_HIGH)
                        .setDefaults(NotificationCompat.DEFAULT_ALL)
                        .setVibrate(new long[]{0, 250, 100, 250})
                        .setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI)
                        .setContentIntent(pi).setAutoCancel(true);
                      nm.notify(NOTIF_ID, nb.build());
                  } catch (Exception e) { fallback(ctx, nm); }
              }

              private void reschedule(Context ctx) {
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(ctx, 0, new Intent(ctx, WallpaperReminderReceiver.class),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi);
                  else am.set(AlarmManager.RTC_WAKEUP, next, pi);
              }

              private void fallback(Context ctx, NotificationManager nm) {
                  Bitmap appIcon = null;
                  try { appIcon = BitmapFactory.decodeResource(ctx.getResources(), R.mipmap.ic_launcher); } catch (Exception ignored) {}
                  NotificationCompat.Builder nb = new NotificationCompat.Builder(ctx, TREND_CH)
                      .setSmallIcon(R.drawable.ic_notification)
                      .setContentTitle("🔥 Hot wallpapers waiting!")
                      .setContentText("Fresh picks are live on Walls. Come see what's new.")
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .setContentIntent(PendingIntent.getActivity(ctx, 0,
                          ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE))
                      .setAutoCancel(true);
                  if (appIcon != null) nb.setLargeIcon(appIcon);
                  nm.notify(NOTIF_ID, nb.build());
              }
          }
