      # ─────────────────────────────────────────────────────────────────────────
      # WallpaperReminderReceiver – reschedules itself so alarms survive reboot
      # ─────────────────────────────────────────────────────────────────────────
      - name: Write WallpaperReminderReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallpaperReminderReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.graphics.*;
          import android.net.Uri;
          import android.os.*;
          import androidx.core.app.NotificationCompat;
          import org.json.*;
          import java.io.*;
          import java.net.*;
          import java.util.*;
          import java.util.concurrent.TimeUnit;

          public class WallpaperReminderReceiver extends BroadcastReceiver {
              private static final String BASE_URL    = "https://walls.ovrica.name.ng";
              private static final String TREND_CH    = "walls_trending";
              private static final int    NOTIF_TREND = 5001;

              @Override
              public void onReceive(Context ctx, Intent intent) {
                  // Re-schedule next alarm (keeps working even without app open)
                  reschedule(ctx);

                  NotificationManager nm = (NotificationManager)
                      ctx.getSystemService(Context.NOTIFICATION_SERVICE);

                  // Ensure channel exists (needed if system cleared it)
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel ch = new NotificationChannel(
                          TREND_CH, "Trending Wallpapers", NotificationManager.IMPORTANCE_HIGH);
                      ch.setDescription("Hot & trending wallpaper picks");
                      ch.enableVibration(true);
                      nm.createNotificationChannel(ch);
                  }

                  // Run network fetch off main thread using goAsync()
                  PendingResult pr = goAsync();
                  new Thread(() -> {
                      try {
                          fetchAndNotify(ctx, nm);
                      } finally {
                          pr.finish();
                      }
                  }).start();
              }

              private void fetchAndNotify(Context ctx, NotificationManager nm) {
                  try {
                      HttpURLConnection conn =
                          (HttpURLConnection) new URL(BASE_URL + "/hot.json").openConnection();
                      conn.setConnectTimeout(8000);
                      conn.setReadTimeout(8000);
                      conn.setRequestProperty("Cache-Control", "no-cache");
                      if (conn.getResponseCode() != 200) { fallback(ctx, nm); return; }

                      BufferedReader br =
                          new BufferedReader(new InputStreamReader(conn.getInputStream()));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while ((line = br.readLine()) != null) sb.append(line);
                      br.close();

                      // Parse with JSONArray/JSONObject for robustness
                      List<String> titles   = new ArrayList<>();
                      List<String> imgUrls  = new ArrayList<>();
                      String json = sb.toString();

                      try {
                          JSONArray arr = new JSONArray(json);
                          for (int i = 0; i < arr.length() && titles.size() < 5; i++) {
                              JSONObject obj = arr.getJSONObject(i);
                              if (obj.has("title"))     titles.add(obj.getString("title"));
                              for (String k : new String[]{"image_url","url","thumbnail"}) {
                                  if (obj.has(k)) { imgUrls.add(obj.getString(k)); break; }
                              }
                          }
                      } catch (JSONException je) {
                          // Fallback regex parse
                          java.util.regex.Matcher mt =
                              java.util.regex.Pattern.compile("\"title\"\\s*:\\s*\"([^\"]+)\"").matcher(json);
                          while (mt.find() && titles.size() < 5) titles.add(mt.group(1));
                          java.util.regex.Matcher mu =
                              java.util.regex.Pattern.compile("\"(?:image_url|url|thumbnail)\"\\s*:\\s*\"([^\"]+)\"").matcher(json);
                          while (mu.find() && imgUrls.size() < 5) imgUrls.add(mu.group(1));
                      }

                      if (titles.isEmpty()) { fallback(ctx, nm); return; }

                      // Try to download thumbnail for BigPicture style
                      Bitmap bigPic = null;
                      if (!imgUrls.isEmpty()) {
                          try {
                              HttpURLConnection ic =
                                  (HttpURLConnection) new URL(imgUrls.get(0)).openConnection();
                              ic.setConnectTimeout(5000); ic.setReadTimeout(5000);
                              bigPic = BitmapFactory.decodeStream(ic.getInputStream());
                          } catch (Exception ignored) {}
                      }

                      PendingIntent pi = PendingIntent.getActivity(ctx, 0,
                          ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);

                      NotificationCompat.Builder nb;
                      if (bigPic != null) {
                          nb = new NotificationCompat.Builder(ctx, TREND_CH)
                              .setSmallIcon(android.R.drawable.ic_menu_gallery)
                              .setContentTitle("🔥 Trending on Walls")
                              .setContentText(titles.get(0) + (titles.size() > 1 ? " +" + (titles.size()-1) + " more" : ""))
                              .setStyle(new NotificationCompat.BigPictureStyle()
                                  .bigPicture(bigPic)
                                  .setBigContentTitle("🔥 Trending on Walls")
                                  .setSummaryText(titles.get(0)))
                              .setLargeIcon(bigPic);
                      } else {
                          NotificationCompat.InboxStyle inbox =
                              new NotificationCompat.InboxStyle()
                                  .setBigContentTitle("🔥 Trending on Walls")
                                  .setSummaryText(titles.size() + " hot wallpapers");
                          for (String t : titles) inbox.addLine("🖼️  " + t);
                          nb = new NotificationCompat.Builder(ctx, TREND_CH)
                              .setSmallIcon(android.R.drawable.ic_menu_gallery)
                              .setContentTitle("🔥 Trending on Walls")
                              .setContentText(titles.get(0) + (titles.size() > 1 ? " +" + (titles.size()-1) + " more" : ""))
                              .setStyle(inbox);
                      }

                      nb.setPriority(NotificationCompat.PRIORITY_HIGH)
                        .setDefaults(NotificationCompat.DEFAULT_ALL)
                        .setVibrate(new long[]{0, 250, 100, 250})
                        .setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI)
                        .setContentIntent(pi)
                        .setAutoCancel(true);

                      nm.notify(NOTIF_TREND, nb.build());

                  } catch (Exception e) {
                      fallback(ctx, nm);
                  }
              }

              /** Reschedule this receiver 6 h later so it fires even when app is closed */
              private void reschedule(Context ctx) {
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(ctx, 0,
                      new Intent(ctx, WallpaperReminderReceiver.class),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6);
                  if (Build.VERSION.SDK_INT >= 23)
                      am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi);
                  else
                      am.set(AlarmManager.RTC_WAKEUP, next, pi);
              }

              private void fallback(Context ctx, NotificationManager nm) {
                  PendingIntent pi = PendingIntent.getActivity(ctx, 0,
                      ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  nm.notify(NOTIF_TREND, new NotificationCompat.Builder(ctx, TREND_CH)
                      .setSmallIcon(android.R.drawable.ic_menu_gallery)
                      .setContentTitle("New wallpapers are waiting 🖼️")
                      .setContentText("Fresh picks are live on Walls. Come see what's new.")
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .setContentIntent(pi).setAutoCancel(true).build());
              }
          }
          EOF

      # ─────────────────────────────────────────────────────────────────────────
      # BootReceiver – restores alarm after device reboot
      # ─────────────────────────────────────────────────────────────────────────
      - name: Write BootReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/BootReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.*;
          import android.os.Build;
          import java.util.concurrent.TimeUnit;

          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context ctx, Intent intent) {
                  if (!Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction()) &&
                      !"android.intent.action.QUICKBOOT_POWERON".equals(intent.getAction())) return;
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(ctx, 0,
                      new Intent(ctx, WallpaperReminderReceiver.class),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(1);
                  if (Build.VERSION.SDK_INT >= 23)
                      am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi);
                  else
                      am.set(AlarmManager.RTC_WAKEUP, next, pi);
              }
          }
          EOF

      - name: Assets, sync, icons
        run: |
          sudo apt-get install -y imagemagick -q
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          npx cap sync android

          LOGO="public/icons/icon-512x512.png"
          RES="android/app/src/main/res"

          # Legacy bitmap icons (Android < 8)
          for cfg in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            folder="${cfg%%:*}"; size="${cfg##*:}"
            mkdir -p "$RES/$folder"
            convert "$LOGO" -resize "${size}x${size}" "$RES/$folder/ic_launcher.png"
            cp "$RES/$folder/ic_launcher.png" "$RES/$folder/ic_launcher_round.png"
          done

          # Adaptive icon assets (Android 8+)
          mkdir -p "$RES/drawable" "$RES/drawable-land" "$RES/mipmap-anydpi-v26" "$RES/values"
          convert "$LOGO" -resize 432x432 "$RES/drawable/ic_launcher_foreground.png"
          cat > "$RES/values/ic_launcher_background.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><color name="ic_launcher_background">#000000</color></resources>
          XMLEOF
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

          # Pure black splash with centred app logo
          convert -size 2048x2048 xc:"#000000" \( "$LOGO" -resize 512x512 \) -gravity center -composite "$RES/drawable/splash.png"
          cp "$RES/drawable/splash.png" "$RES/drawable-land/splash.png"

          # Force manifest icon refs
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:icon="[^"]*"/android:icon="@mipmap\/ic_launcher"/' $M
          sed -i 's/android:roundIcon="[^"]*"/android:roundIcon="@mipmap\/ic_launcher_round"/' $M

      - name: Patch AndroidManifest
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, re

          ET.register_namespace('android', 'http://schemas.android.com/apk/res/android')
          ET.register_namespace('tools',   'http://schemas.android.com/tools')
          ET.register_namespace('', '')

          path = 'android/app/src/main/AndroidManifest.xml'
          content = open(path).read()

          for perm in [
              'android.permission.INTERNET',
              'android.permission.ACCESS_NETWORK_STATE',
              'android.permission.READ_MEDIA_IMAGES',
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.SET_WALLPAPER',
              'android.permission.SET_WALLPAPER_HINTS',
              'android.permission.SCHEDULE_EXACT_ALARM',
              'android.permission.USE_EXACT_ALARM',
              'android.permission.RECEIVE_BOOT_COMPLETED',
          ]:
              if f'android:name="{perm}"' not in content:
                  content = content.replace('<application', f'    <uses-permission android:name="{perm}" />\n    <application', 1)

          for perm, maxSdk in [
              ('android.permission.WRITE_EXTERNAL_STORAGE', '28'),
              ('android.permission.READ_EXTERNAL_STORAGE',  '32'),
          ]:
              if f'android:name="{perm}"' not in content:
                  content = content.replace('<application',
                      f'    <uses-permission android:name="{perm}" android:maxSdkVersion="{maxSdk}" />\n    <application', 1)

          if 'android:usesCleartextTraffic' not in content:
              content = content.replace('<application', '<application android:usesCleartextTraffic="true"', 1)
          if 'android:hardwareAccelerated' not in content:
              content = content.replace('<application', '<application android:hardwareAccelerated="true"', 1)

          content = re.sub(
              r'(<activity\b(?![^>]*android:exported)[^>]*MainActivity[^>]*)',
              r'\1 android:exported="true" android:configChanges="uiMode|orientation|screenSize"', content)

          if 'walls.ovrica.name.ng' not in content:
              content = content.replace('</activity>',
                  '\n                <intent-filter android:autoVerify="true">'
                  '\n                    <action android:name="android.intent.action.VIEW" />'
                  '\n                    <category android:name="android.intent.category.DEFAULT" />'
                  '\n                    <category android:name="android.intent.category.BROWSABLE" />'
                  '\n                    <data android:scheme="https" android:host="walls.ovrica.name.ng" />'
                  '\n                </intent-filter>\n        </activity>', 1)

          if 'fileprovider' not in content:
              content = content.replace('</application>',
                  '\n            <provider android:name="androidx.core.content.FileProvider"'
                  ' android:authorities="ng.name.ovrica.walls.fileprovider"'
                  ' android:exported="false" android:grantUriPermissions="true">'
                  '\n                <meta-data android:name="android.support.FILE_PROVIDER_PATHS"'
                  ' android:resource="@xml/file_paths" />'
                  '\n            </provider>\n    </application>', 1)

          if 'WallpaperReminderReceiver' not in content:
              content = content.replace('</application>',
                  '        <receiver android:name=".WallpaperReminderReceiver" android:exported="false" />\n    </application>', 1)

          if 'BootReceiver' not in content:
              content = content.replace('</application>',
                  '        <receiver android:name=".BootReceiver" android:exported="true">\n'
                  '            <intent-filter>\n'
                  '                <action android:name="android.intent.action.BOOT_COMPLETED" />\n'
                  '                <action android:name="android.intent.action.QUICKBOOT_POWERON" />\n'
                  '            </intent-filter>\n'
                  '        </receiver>\n    </application>', 1)

          open(path, 'w').write(content)
          print("Manifest patched OK")
          PYEOF

          cat >> android/build.gradle << 'EOF'
          subprojects { configurations.all { resolutionStrategy {
            force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
          } } }
          EOF

      - name: Generate keystore
        run: |
          keytool -genkeypair -v -keystore walls.keystore \
            -alias walls -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      # Build both APK and AAB
      - name: Build APK + AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Sign and package
        run: |
          BT=$ANDROID_SDK_ROOT/build-tools/34.0.0

          # ── APK ──────────────────────────────────────────────────────────────
          UNSIGNED=$(find android -name "app-release-unsigned.apk" | head -1)
          [ -z "$UNSIGNED" ] && echo "ERROR: No unsigned APK!" && exit 1
          $BT/zipalign -v -p 4 "$UNSIGNED" app-aligned.apk
          $BT/apksigner sign --ks walls.keystore --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out app-release-signed.apk app-aligned.apk
          $BT/apksigner verify --verbose app-release-signed.apk

          # ── AAB ──────────────────────────────────────────────────────────────
          AAB_UNSIGNED=$(find android -name "app-release.aab" | head -1)
          if [ -n "$AAB_UNSIGNED" ]; then
            # Sign AAB with jarsigner (apksigner doesn't sign AABs)
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore walls.keystore \
              -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
              -keypass  ${{ secrets.KEYSTORE_PASSWORD }} \
              "$AAB_UNSIGNED" walls
            cp "$AAB_UNSIGNED" app-release-signed.aab
          fi

          # ── Fingerprint & assetlinks ──────────────────────────────────────────
          mkdir -p release
          cp app-release-signed.apk release/
          [ -f app-release-signed.aab ] && cp app-release-signed.aab release/
          keytool -list -v -keystore walls.keystore \
            -alias walls -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep "SHA256" > release/sha256.txt
          SHA256=$(sed 's/.*SHA256: //' release/sha256.txt)
          echo '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"ng.name.ovrica.walls","sha256_cert_fingerprints":["'"$SHA256"'"]}}]' \
            > release/assetlinks.json
          zip -j release/walls-release.zip \
            release/app-release-signed.apk release/sha256.txt release/assetlinks.json
          [ -f release/app-release-signed.aab ] && \
            zip -j release/walls-release-aab.zip release/app-release-signed.aab

      - uses: actions/upload-artifact@v4
        with:
          name: walls-release-apk
          path: ${{ github.workspace }}/release/walls-release.zip
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: walls-release-aab
          path: ${{ github.workspace }}/release/walls-release-aab.zip
          retention-days: 30
