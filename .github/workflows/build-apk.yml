        run: |
          sudo apt-get install -y imagemagick librsvg2-bin -q
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          npx cap sync android

          SVG="public/icon/icon.svg"; LOGO="public/icon/icon-512x512.png"; RES="android/app/src/main/res"
