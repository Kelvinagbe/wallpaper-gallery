            <path android:fillColor="#FFFFFF" android:pathData="M11,2 Q11,0 13,0 L18,0 Q20,0 20,2 L20,9 Q20,9 18,9 L13,9 Q11,9 11,7 Z"/>
            <path android:fillColor="#FFFFFF" android:pathData="M0,13 Q0,11 2,11 L7,11 Q9,11 9,13 L9,18 Q9,20 7,20 L2,20 Q0,20 0,18 Z"/>
            <path android:fillColor="#FFFFFF" android:fillAlpha="0.4" android:pathData="M11,13 Q11,11 13,11 L18,11 Q20,11 20,13 L20,18 Q20,20 18,20 L13,20 Q11,20 11,18 Z"/>
          </vector>
          XMLEOF

          for dir in drawable-mdpi drawable-hdpi drawable-xhdpi drawable-xxhdpi drawable-xxxhdpi; do
            mkdir -p "$RES/$dir"
            convert -size 1080x1920 xc:"#111318" \( "$LOGO" -resize 300x300 \) -gravity center -composite "$RES/$dir/splash.png"
          done
          mkdir -p "$RES/drawable-night" "$RES/drawable"
          convert -size 1080x1920 xc:"#111318" \( "$LOGO" -resize 300x300 \) -gravity center -composite "$RES/drawable-night/splash.png"
          convert -size 1080x1920 xc:"#F1F3F4" \( "$LOGO" -resize 300x300 \) -gravity center -composite "$RES/drawable/splash.png"

          STYLES="$RES/values/styles.xml"
          [ -f "$STYLES" ] && sed -i \
