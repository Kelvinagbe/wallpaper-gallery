                  String label = forced ? "Update Required" : "Update Available";
                  String badge = forced
                      ? "<span style=\\\"display:inline-block;padding:4px 12px;background:#ff4d4f;border-radius:20px;font-size:12px;font-weight:700;color:#fff;letter-spacing:.5px;margin-bottom:16px\\\">REQUIRED</span>"
                      : "<span style=\\\"display:inline-block;padding:4px 12px;background:rgba(108,99,255,0.18);border-radius:20px;font-size:12px;font-weight:700;color:#6c63ff;letter-spacing:.5px;margin-bottom:16px\\\">NEW VERSION</span>";
                  String maybeBtn = forced ? "" :
                      "<button onclick=\\\"document.getElementById('walls-upd-overlay').remove()\\\" " +
                      "style=\\\"margin-top:10px;width:100%;max-width:320px;padding:13px;background:transparent;" +
                      "border:1px solid " + bdr + ";border-radius:14px;color:" + muted + ";font-size:14px;" +
                      "cursor:pointer;font-family:inherit\\\">Maybe Later</button>";
                  String js = "(function(){" +
                      "if(document.getElementById('walls-upd-overlay'))return;" +
                      "var o=document.createElement('div');o.id='walls-upd-overlay';" +
                      "o.style.cssText='position:fixed;inset:0;background:" + bg + ";z-index:2147483647;" +
                          "display:flex;flex-direction:column;align-items:center;justify-content:center;" +
                          "font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:32px;box-sizing:border-box;text-align:center';" +
                      "o.innerHTML='" +
                          "<img src=\\\"file:///android_res/mipmap/ic_launcher.png\\\" " +
                              "onerror=\\\"this.style.display=\\'none\\'\\\" " +
                              "style=\\\"width:88px;height:88px;border-radius:22px;margin-bottom:20px;" +
                              "box-shadow:0 4px 32px rgba(108,99,255,0.35)\\\"/>" +
                          badge +
                          "<h2 style=\\\"font-size:24px;font-weight:800;color:" + fg + ";margin:0 0 6px\\\">" + label + "</h2>" +
                          "<p style=\\\"font-size:13px;color:" + muted + ";margin:0 0 8px\\\">v" + current + " &rarr; v" + latest + (forced ? " &nbsp;&bull;&nbsp; Required to continue" : "") + "</p>" +
                          "<div style=\\\"width:100%;max-width:340px;background:" + card + ";border-radius:16px;padding:16px;margin:24px 0 0;box-sizing:border-box\\\">" +
                              "<p style=\\\"font-size:13px;color:" + muted + ";margin:0 0 16px;line-height:1.5\\\">A new version of Walls is available with improvements and bug fixes.</p>" +
                              "<button onclick=\\\"window.Android&&Android.openUrl('" + BASE_URL + "/download')\\\" " +
