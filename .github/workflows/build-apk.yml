              // ── Helper: fire walls_dl_done with localUrl back to JS ───────────────
              private void notifyJsDownloadDone(String id, String fname, String title, String localUrl) {
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) return;
                  runOnUiThread(() -> wv.evaluateJavascript(
                      "window.dispatchEvent(new CustomEvent('walls_dl_done',{detail:{" +
                      "id:'" + escJs(id) + "'," +
                      "localUrl:'" + escJs(localUrl) + "'," +
                      "filename:'" + escJs(fname) + "'," +
                      "name:'" + escJs(title) + "'}}))", null));
              }

              private void pipe(InputStream in, OutputStream out) throws IOException {
                  byte[] buf = new byte[8192]; int n;
                  while ((n = in.read(buf)) != -1) out.write(buf, 0, n);
                  in.close(); out.close();
              }

              private String escJs(String s) { return s == null ? "" : s.replace("\\","\\\\").replace("'","\\'").replace("\n","\\n"); }

              private boolean hasStoragePermission() {
                  if (Build.VERSION.SDK_INT >= 29) return true; // private folder needs no permission
                  return ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE) == PackageManager.PERMISSION_GRANTED;
              }

              private void requestStoragePermission() {
                  if (Build.VERSION.SDK_INT >= 29) return; // not needed for private folder
                  ActivityCompat.requestPermissions(this, new String[]{ Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE }, REQ_STORAGE);
              }

              @Override
              public void onRequestPermissionsResult(int code, @NonNull String[] perms, @NonNull int[] results) {
                  super.onRequestPermissionsResult(code, perms, results);
                  if (code == REQ_NOTIF) return;
                  boolean granted = results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED;
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null) wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_perm_" + (granted ? "granted" : "denied") + "'))", null);
              }

              private void logWallpaperSet(String target) {
                  try {
                      SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                      JSONArray logs = new JSONArray(prefs.getString("wp_set_log", "[]"));
                      JSONObject entry = new JSONObject();
                      entry.put("time", new java.text.SimpleDateFormat("yyyy-MM-dd HH:mm", java.util.Locale.getDefault()).format(new java.util.Date()));
                      entry.put("target", target); logs.put(entry);
                      while (logs.length() > 50) logs.remove(0);
                      prefs.edit().putString("wp_set_log", logs.toString()).apply();
                  } catch (Exception ignored) {}
              }

              String getVersion() { try { return getPackageManager().getPackageInfo(getPackageName(), 0).versionName; } catch (Exception e) { return "1.0.0"; } }

              void mkChannel(String id, String name, String desc) {
                  if (Build.VERSION.SDK_INT < 26) return;
                  NotificationChannel ch = new NotificationChannel(id, name, NotificationManager.IMPORTANCE_HIGH);
                  ch.setDescription(desc); ch.enableVibration(true); ch.setVibrationPattern(new long[]{0,250,100,250});
                  nm.createNotificationChannel(ch);
              }

              NotificationCompat.Builder notifBuilder(String ch, String title, String text) {
                  NotificationCompat.Builder b = new NotificationCompat.Builder(this, ch)
                      .setSmallIcon(R.drawable.ic_notification).setContentTitle(title).setContentText(text)
                      .setPriority(NotificationCompat.PRIORITY_HIGH);
                  try { b.setLargeIcon(BitmapFactory.decodeResource(getResources(), R.mipmap.ic_launcher)); } catch (Exception ignored) {}
                  return b;
              }

              private void handleDeepLink(Intent intent) {
                  if (intent == null || getBridge() == null) return;
                  Uri data = intent.getData(); if (data == null) return;
                  WebView wv = getBridge().getWebView(); if (wv == null) return;
                  runOnUiThread(() -> wv.loadUrl(data.toString()));
              }

              private void handleNotifUrl(Intent intent) {
                  if (intent == null) return;
                  String url = intent.getStringExtra("open_url");
                  if (url == null || url.isEmpty()) return;
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv != null) runOnUiThread(() -> wv.loadUrl(url));
              }

              private void showWelcome() {
                  SharedPreferences prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE);
                  if (!prefs.getBoolean("first_launch", true)) return;
                  prefs.edit().putBoolean("first_launch", false).apply();
                  nm.notify(NOTIF_WELCOME, notifBuilder(PROMO_CH, "Welcome to Walls! 🎨", "Tap to explore thousands of curated wallpapers.")
                      .setContentIntent(PendingIntent.getActivity(this, 0, getPackageManager().getLaunchIntentForPackage(getPackageName()),
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE)).setAutoCancel(true).build());
              }

              private void checkForUpdate() {
                  new Thread(() -> {
                      try {
                          HttpURLConnection c = (HttpURLConnection) new URL(BASE_URL + "/api/version").openConnection();
                          c.setConnectTimeout(8000); c.setReadTimeout(8000); c.connect();
                          if (c.getResponseCode() != 200) return;
                          BufferedReader br = new BufferedReader(new InputStreamReader(c.getInputStream()));
                          StringBuilder sb = new StringBuilder(); String line;
                          while ((line = br.readLine()) != null) sb.append(line);
                          JSONObject obj = new JSONObject(sb.toString());
                          String latest = obj.optString("version", "");
                          boolean forced = obj.optBoolean("forced", false);
                          String current = getVersion();
                          if (latest.isEmpty() || latest.equals(current)) return;
                          WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                          if (wv != null) {
                              final String l = latest; final boolean f = forced;
                              runOnUiThread(() -> wv.evaluateJavascript(
                                  "window.dispatchEvent(new CustomEvent('walls_update',{detail:{latest:'" + escJs(l) + "',forced:" + f + "}}))", null));
                          }
                      } catch (Exception ignored) {}
                  }).start();
              }

              private void scheduleReminder() {
                  AlarmManager am = (AlarmManager) getSystemService(ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(this, 0, new Intent(this, WallpaperReminderReceiver.class), PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), pi);
                  else am.setRepeating(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), TimeUnit.HOURS.toMillis(6), pi);
              }
          }
          EOF

      # ─── WallsFirebaseMessagingService.java ──────────────────────────────────
      - name: Write WallsFirebaseMessagingService.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallsFirebaseMessagingService.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.graphics.*;
          import android.os.Build;
          import androidx.core.app.NotificationCompat;
          import com.google.firebase.messaging.FirebaseMessagingService;
          import com.google.firebase.messaging.RemoteMessage;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.Map;

          public class WallsFirebaseMessagingService extends FirebaseMessagingService {
              private static final int NOTIF_ID = 6001;

              @Override public void onNewToken(String token) {
                  super.onNewToken(token);
                  getSharedPreferences(MainActivity.PREF_FILE, MODE_PRIVATE).edit().putString("fcm_token", token).apply();
              }

              @Override public void onMessageReceived(RemoteMessage message) {
                  super.onMessageReceived(message);
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  Map<String,String> data = message.getData();
                  String title   = data.getOrDefault("title",   "🔥 New Wallpapers!");
                  String body    = data.getOrDefault("body",    "Fresh picks are live on Walls.");
                  String url     = data.getOrDefault("url",     null);
                  String imgUrl  = data.getOrDefault("image_url", null);
                  String channel = data.getOrDefault("channel", MainActivity.TREND_CH);
                  if (message.getNotification() != null) {
                      if (message.getNotification().getTitle() != null) title = message.getNotification().getTitle();
                      if (message.getNotification().getBody()  != null) body  = message.getNotification().getBody();
                      if (message.getNotification().getImageUrl() != null) imgUrl = message.getNotification().getImageUrl().toString();
                  }
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel ch = new NotificationChannel(channel, "Walls Notifications", NotificationManager.IMPORTANCE_HIGH);
                      ch.enableVibration(true); nm.createNotificationChannel(ch);
                  }
                  Intent tap = getPackageManager().getLaunchIntentForPackage(getPackageName());
                  if (url != null) { tap = new Intent(this, MainActivity.class); tap.putExtra("open_url", url); tap.addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP); }
                  PendingIntent pi = PendingIntent.getActivity(this, 0, tap, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  NotificationCompat.Builder nb = new NotificationCompat.Builder(this, channel)
                      .setSmallIcon(R.drawable.ic_notification).setContentTitle(title).setContentText(body)
                      .setPriority(NotificationCompat.PRIORITY_HIGH).setAutoCancel(true).setContentIntent(pi);
                  if (imgUrl != null) {
                      try {
                          HttpURLConnection c = (HttpURLConnection) new URL(imgUrl).openConnection();
                          c.setConnectTimeout(10000); c.connect();
                          Bitmap bmp = BitmapFactory.decodeStream((InputStream) c.getContent());
                          if (bmp != null) nb.setLargeIcon(bmp).setStyle(new NotificationCompat.BigPictureStyle().bigPicture(bmp).bigLargeIcon((Bitmap)null));
                      } catch (Exception ignored) {}
                  }
                  nm.notify(NOTIF_ID, nb.build());
              }
          }
