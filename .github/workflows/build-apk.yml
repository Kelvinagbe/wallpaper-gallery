
name: Build Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          printf "33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" \
            > $ANDROID_SDK_ROOT/licenses/google-gdk-license
          printf "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" \
            > $ANDROID_SDK_ROOT/licenses/android-googletv-license
          printf "d975f751698a77b662f1254ddbeed3901e976f5a" \
            > $ANDROID_SDK_ROOT/licenses/intel-android-extra-license
          printf "33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" \
            > $ANDROID_SDK_ROOT/licenses/mips-android-sysimage-license

          SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          echo "y" | $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3
          echo "Android SDK ready."

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "ng.name.ovrica.walls",
            "appName": "Walls",
            "webDir": "out",
            "server": {
              "url": "https://walls.ovrica.name.ng",
              "cleartext": false
            },
            "android": {
              "allowMixedContent": false
            }
          }
          EOF
          echo "capacitor.config.json created:"
          cat capacitor.config.json

      - name: Add Android platform if not present
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android folder already exists."
          fi

      - name: Write MainActivity with download, wallpaper and deep link support
        run: |
          MAIN_ACTIVITY=android/app/src/main/java/ng/name/ovrica/walls/MainActivity.java
          mkdir -p $(dirname $MAIN_ACTIVITY)
          cat > $MAIN_ACTIVITY << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.DownloadManager;
          import android.app.WallpaperManager;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.Manifest;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Environment;
          import android.webkit.URLUtil;
          import android.webkit.WebView;
          import android.widget.Toast;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;
          import java.io.IOException;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class MainActivity extends BridgeActivity {

              private static final int NOTIFICATION_PERMISSION_CODE = 1001;
              private DownloadManager downloadManager;
              private long lastDownloadId = -1;
              private boolean isWallpaperIntent = false;

              @Override
              protected void onStart() {
                  super.onStart();
                  downloadManager = (DownloadManager) getSystemService(Context.DOWNLOAD_SERVICE);
                  requestNotificationPermission();
                  setupDownloadListener();
                  registerDownloadReceiver();
                  handleDeepLink(getIntent());
              }

              @Override
              protected void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  handleDeepLink(intent);
              }

              // ─── Deep Link Handler ───────────────────────────────────────────
              private void handleDeepLink(Intent intent) {
                  if (intent == null) return;
                  Uri data = intent.getData();
                  if (data != null) {
                      String url = data.toString();
                      WebView webView = getBridge().getWebView();
                      if (webView != null) {
                          runOnUiThread(() -> webView.loadUrl(url));
                      }
                  }
              }

              // ─── Notification Permission (Android 13+) ───────────────────────
              private void requestNotificationPermission() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this,
                              Manifest.permission.POST_NOTIFICATIONS)
                              != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this,
                                  new String[]{Manifest.permission.POST_NOTIFICATIONS},
                                  NOTIFICATION_PERMISSION_CODE);
                      }
                  }
              }

              // ─── WebView Download Listener ───────────────────────────────────
              private void setupDownloadListener() {
                  WebView webView = getBridge().getWebView();
                  webView.setDownloadListener((url, userAgent, contentDisposition, mimetype, contentLength) -> {

                      String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                      isWallpaperIntent = mimetype != null && mimetype.startsWith("image/");

                      Toast.makeText(this,
                          isWallpaperIntent
                              ? "Downloading wallpaper: " + fileName
                              : "Downloading: " + fileName,
                          Toast.LENGTH_SHORT).show();

                      DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                      request.setTitle(fileName);
                      request.setDescription(isWallpaperIntent
                          ? "Downloading wallpaper..."
                          : "Downloading file...");
                      request.setMimeType(mimetype);
                      request.addRequestHeader("User-Agent", userAgent);
                      request.setDestinationInExternalPublicDir(
                          Environment.DIRECTORY_DOWNLOADS, fileName
                      );
                      request.setNotificationVisibility(
                          DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED
                      );

                      lastDownloadId = downloadManager.enqueue(request);
                  });
              }

              // ─── Download Complete Receiver ──────────────────────────────────
              private void registerDownloadReceiver() {
                  BroadcastReceiver receiver = new BroadcastReceiver() {
                      @Override
                      public void onReceive(Context context, Intent intent) {
                          long id = intent.getLongExtra(DownloadManager.EXTRA_DOWNLOAD_ID, -1);
                          if (id != lastDownloadId) return;

                          DownloadManager.Query query = new DownloadManager.Query();
                          query.setFilterById(id);
                          Cursor cursor = downloadManager.query(query);

                          if (cursor.moveToFirst()) {
                              int statusIndex = cursor.getColumnIndex(DownloadManager.COLUMN_STATUS);
                              int status = cursor.getInt(statusIndex);

                              if (status == DownloadManager.STATUS_SUCCESSFUL && isWallpaperIntent) {
                                  int uriIndex = cursor.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI);
                                  String localUri = cursor.getString(uriIndex);

                                  runOnUiThread(() -> {
                                      Toast.makeText(context,
                                          "Download complete! Opening wallpaper picker...",
                                          Toast.LENGTH_SHORT).show();
                                      openWallpaperPicker(Uri.parse(localUri));
                                  });
                              } else if (status == DownloadManager.STATUS_FAILED) {
                                  runOnUiThread(() ->
                                      Toast.makeText(context,
                                          "Download failed. Please try again.",
                                          Toast.LENGTH_SHORT).show()
                                  );
                              }
                          }
                          cursor.close();
                      }
                  };

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(receiver,
                          new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE),
                          Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(receiver,
                          new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE));
                  }
              }

              // ─── System Wallpaper Picker ─────────────────────────────────────
              private void openWallpaperPicker(Uri imageUri) {
                  Intent intent = new Intent(Intent.ACTION_ATTACH_DATA);
                  intent.setDataAndType(imageUri, "image/*");
                  intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                  intent.putExtra("mimeType", "image/*");
                  startActivity(Intent.createChooser(intent, "Set as wallpaper"));
              }
          }
          EOF
          echo "MainActivity.java written."

      - name: Add permissions and deep link intent filter to AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml

          # Add permissions if not present
          if ! grep -q "INTERNET" $MANIFEST; then
            sed -i '/<manifest/a\
                <uses-permission android:name="android.permission.INTERNET" />\
                <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />\
                <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\
                <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\
                <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\
                <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\
                <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\
                <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />\
                <uses-permission android:name="android.permission.SET_WALLPAPER" />\
                <uses-permission android:name="android.permission.SET_WALLPAPER_HINTS" />\
                <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
                <uses-permission android:name="android.permission.WAKE_LOCK" />' \
              $MANIFEST
            echo "Permissions added."
          fi

          # Add deep link intent filter inside <activity> tag
          if ! grep -q "walls.ovrica.name.ng" $MANIFEST; then
            sed -i '/<\/activity>/i\
                    <intent-filter android:autoVerify="true">\
                        <action android:name="android.intent.action.VIEW" />\
                        <category android:name="android.intent.category.DEFAULT" />\
                        <category android:name="android.intent.category.BROWSABLE" />\
                        <data android:scheme="https" android:host="walls.ovrica.name.ng" />\
                    </intent-filter>' \
              $MANIFEST
            echo "Deep link intent filter added."
          fi

          echo "=== AndroidManifest.xml ==="
          cat $MANIFEST

      - name: Create assets directory
        run: |
          mkdir -p android/app/src/main/assets
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo "Assets directory ready:"
          ls -la android/app/src/main/assets/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin stdlib duplicate classes
        run: |
          cat >> android/build.gradle << 'EOF'

          subprojects {
            configurations.all {
              resolutionStrategy {
                force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
                force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
                force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
              }
            }
          }
          EOF
          echo "Kotlin resolution strategy applied."

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Build release APK and AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace
          echo "=== APKs ===" && find . -name "*.apk"
          echo "=== AABs ===" && find . -name "*.aab"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/34.0.0

          UNSIGNED=$(find ${{ github.workspace }}/android -name "app-release-unsigned.apk" | head -1)

          if [ -z "$UNSIGNED" ]; then
            echo "ERROR: No unsigned release APK found!"
            exit 1
          fi

          echo "Signing: $UNSIGNED"
          $BUILD_TOOLS/zipalign -v -p 4 "$UNSIGNED" ${{ github.workspace }}/app-aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks ${{ github.workspace }}/walls.keystore \
            --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out ${{ github.workspace }}/app-release-signed.apk \
            ${{ github.workspace }}/app-aligned.apk
          $BUILD_TOOLS/apksigner verify --verbose ${{ github.workspace }}/app-release-signed.apk
          echo "APK signed and verified."

      - name: Package release artifacts
        run: |
          mkdir -p ${{ github.workspace }}/release

          cp ${{ github.workspace }}/app-release-signed.apk \
            ${{ github.workspace }}/release/app-release-signed.apk

          AAB=$(find ${{ github.workspace }}/android -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" ${{ github.workspace }}/release/app-release-bundle.aab
            echo "AAB copied."
          else
            echo "WARNING: No AAB found."
          fi

          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > ${{ github.workspace }}/release/sha256.txt
          cat ${{ github.workspace }}/release/sha256.txt

          SHA256=$(cat ${{ github.workspace }}/release/sha256.txt | sed 's/.*SHA256: //')
          cat > ${{ github.workspace }}/release/assetlinks.json << EOF
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "ng.name.ovrica.walls",
              "sha256_cert_fingerprints": ["$SHA256"]
            }
          }]
          EOF
          echo "=== assetlinks.json ==="
          cat ${{ github.workspace }}/release/assetlinks.json

          cd ${{ github.workspace }}
          zip -j release/walls-release.zip \
            release/app-release-signed.apk \
            release/app-release-bundle.aab \
            release/sha256.txt \
            release/assetlinks.json
          echo "=== Release package contents ==="
          unzip -l release/walls-release.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-release
          path: ${{ github.workspace }}/release/walls-release.zip
          retention-days: 30
