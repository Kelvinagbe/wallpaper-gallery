name: Build Android APK + AAB (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK"     >> $GITHUB_ENV
          mkdir -p $SDK/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > $SDK/licenses/android-sdk-license
          echo "y" | $SDK/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: Install dependencies & Configure Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          [ -f "public/app/index.html" ] || (echo "ERROR: public/app/index.html not found." && exit 1)
          printf '{"appId":"ng.name.ovrica.walls","appName":"Walls","webDir":"public/app","android":{"allowMixedContent":true,"backgroundColor":"#000000"}}' \
            > capacitor.config.json
          npx cap add android

      - name: Copy google-services.json
        run: cp public/google-services.json android/app/google-services.json

      - name: Write resource files
        run: |
          RES=android/app/src/main/res
          mkdir -p "$RES/xml" "$RES/values" "$RES/layout"

          cat > "$RES/xml/file_paths.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="walls_downloads" path="Pictures/Walls/" />
            <external-path name="external_files" path="." />
            <external-files-path name="external_files_path" path="." />
            <cache-path name="cache" path="." />
          </paths>
          EOF

          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="ic_launcher_background">#000000</color></resources>' \
            > "$RES/values/ic_launcher_background.xml"

          cat > "$RES/layout/notification_grid.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:background="#1a1a1a" android:orientation="vertical" android:padding="10dp">
            <TextView android:id="@+id/notif_title"
                android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:textColor="#FFFFFF" android:textSize="13sp" android:textStyle="bold"
                android:layout_marginBottom="8dp"/>
            <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal">
              <ImageView android:id="@+id/img1" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <ImageView android:id="@+id/img2" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <ImageView android:id="@+id/img3" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop"/>
            </LinearLayout>
            <LinearLayout android:layout_width="match_parent" android:layout_height="75dp" android:orientation="horizontal" android:layout_marginTop="3dp">
              <ImageView android:id="@+id/img4" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <ImageView android:id="@+id/img5" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:scaleType="centerCrop" android:layout_marginEnd="3dp"/>
              <FrameLayout android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1">
                <ImageView android:id="@+id/img6" android:layout_width="match_parent" android:layout_height="match_parent" android:scaleType="centerCrop"/>
                <TextView android:id="@+id/more_text" android:layout_width="match_parent" android:layout_height="match_parent"
                    android:gravity="center" android:textColor="#FFFFFF" android:textSize="15sp"
                    android:textStyle="bold" android:background="#99000000"/>
              </FrameLayout>
            </LinearLayout>
          </LinearLayout>
          EOF

      # ─── MainActivity.kt ──────────────────────────────────────────────────────
      - name: Write MainActivity.kt
        run: |
          MAIN=android/app/src/main/java/ng/name/ovrica/walls/MainActivity.kt
          mkdir -p $(dirname $MAIN)
          cat > $MAIN << 'EOF'
          package ng.name.ovrica.walls

          import android.app.*
          import android.content.*
          import android.content.pm.PackageManager
          import android.content.res.Configuration
          import android.database.Cursor
          import android.graphics.*
          import android.graphics.drawable.ColorDrawable
          import android.Manifest
          import android.net.Uri
          import android.os.*
          import android.provider.MediaStore
          import android.webkit.*
          import android.widget.Toast
          import android.view.View
          import android.view.ViewGroup
          import android.view.WindowManager
          import android.widget.FrameLayout
          import android.widget.ProgressBar
          import androidx.annotation.NonNull
          import androidx.appcompat.app.AlertDialog
          import androidx.core.app.*
          import androidx.core.content.*
          import androidx.core.splashscreen.SplashScreen
          import com.getcapacitor.BridgeActivity
          import com.google.firebase.messaging.FirebaseMessaging
          import org.json.*
          import java.io.*
          import java.net.*
          import java.util.concurrent.TimeUnit

          class MainActivity : BridgeActivity() {

              companion object {
                  const val DL_CH    = "walls_downloads"
                  const val PROMO_CH = "walls_promo"
                  const val TREND_CH = "walls_trending"
                  const val BASE_URL  = "https://walls.ovrica.name.ng"
                  const val PREF_FILE = "walls_prefs"
                  private const val NOTIF_ING     = 2001
                  private const val NOTIF_DONE    = 2002
                  private const val NOTIF_WELCOME = 4001
                  private const val REQ_STORAGE   = 1002
                  private const val REQ_NOTIF     = 1001
                  private const val TIMEOUT_MS    = 30_000L
                  private const val WALLS_FOLDER  = "Walls"
                  private const val AUTHORITY     = "ng.name.ovrica.walls.fileprovider"
                  private const val PREF_MIN_VER  = "cached_min_version"
              }

              private var dm: DownloadManager? = null
              private var nm: NotificationManager? = null
              private var dlReceiver: BroadcastReceiver? = null
              private val progressHandler = Handler(Looper.getMainLooper())
              private var progressRunnable: Runnable? = null
              private var lastId = -1L
              private var downloadStartTime = 0L
              private var lastFile = ""
              private var lastLocalPath = ""
              private var pendingDlUrl: String? = null
              private var pendingDlName: String? = null
              private var pendingWpUrl: String? = null
              private var pendingWpTarget: String? = null
              private var backPressedTime = 0L
              private var webLoaded = false
              private var splashDone = false
              private var lastBgColor = 0
              private var loadingOverlay: FrameLayout? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  val splash = SplashScreen.installSplashScreen(this)
                  splash.setKeepOnScreenCondition { !splashDone }
                  lastBgColor = Color.parseColor(if (isDarkTheme()) "#111318" else "#F1F3F4")
                  window.setBackgroundDrawable(ColorDrawable(lastBgColor))
                  window.addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS)
                  super.onCreate(savedInstanceState)
                  applySystemTheme()
                  FirebaseMessaging.getInstance().token.addOnCompleteListener { task ->
                      if (!task.isSuccessful) return@addOnCompleteListener
                      val token = task.result
                      android.util.Log.d("FCM", "Token: $token")
                      getSharedPreferences(PREF_FILE, MODE_PRIVATE).edit().putString("fcm_token", token).apply()
                  }
              }

              override fun onStart() {
                  super.onStart()
                  dm = getSystemService(DOWNLOAD_SERVICE) as DownloadManager
                  nm = getSystemService(NOTIFICATION_SERVICE) as NotificationManager
                  mkChannel(DL_CH,    "Walls Downloads",     "Wallpaper download notifications")
                  mkChannel(PROMO_CH, "Wallpaper Reminders", "Periodic reminders")
                  mkChannel(TREND_CH, "Trending Wallpapers", "Hot & trending wallpaper picks")
                  if (Build.VERSION.SDK_INT >= 33 &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED)
                      ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.POST_NOTIFICATIONS), REQ_NOTIF)
                  if (bridge?.webView != null && !webLoaded) { setupWebView(); setupJsBridge(); webLoaded = true }
                  registerDlReceiver(); scheduleReminder()
                  handleDeepLink(intent); handleNotifUrl(intent)
                  showWelcome(); checkForUpdate()
              }

              override fun onNewIntent(i: Intent) { super.onNewIntent(i); handleDeepLink(i); handleNotifUrl(i) }

              override fun onResume() {
                  super.onResume()
                  val wv = bridge?.webView ?: return
                  val newBg = Color.parseColor(if (isDarkTheme()) "#111318" else "#F1F3F4")
                  lastBgColor = newBg
                  window.setBackgroundDrawable(ColorDrawable(newBg))
                  wv.setBackgroundColor(newBg)
                  val url = wv.url
                  if (url == null || url == "about:blank") wv.loadUrl(BASE_URL)
              }

              override fun onConfigurationChanged(c: Configuration) { super.onConfigurationChanged(c); applySystemTheme() }

              @Suppress("DEPRECATION")
              override fun onBackPressed() {
                  val wv = bridge?.webView
                  if (wv != null && wv.canGoBack()) { wv.goBack(); return }
                  if (System.currentTimeMillis() - backPressedTime < 2000) { super.onBackPressed(); return }
                  backPressedTime = System.currentTimeMillis()
                  Toast.makeText(this, "Press back again to exit", Toast.LENGTH_SHORT).show()
              }

              override fun onDestroy() {
                  super.onDestroy(); stopProgressPolling()
                  dlReceiver?.let { try { unregisterReceiver(it) } catch (e: Exception) { } }
              }

              private fun isDarkTheme() =
                  (resources.configuration.uiMode and Configuration.UI_MODE_NIGHT_MASK) == Configuration.UI_MODE_NIGHT_YES

              private fun applySystemTheme() {
                  val dark = isDarkTheme()
                  val bg = Color.parseColor(if (dark) "#111318" else "#F1F3F4")
                  lastBgColor = bg; window.setBackgroundDrawable(ColorDrawable(bg))
                  val wv = bridge?.webView
                  wv?.setBackgroundColor(bg)
                  wv?.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_theme',{detail:{dark:$dark}}))", null)
                  if (Build.VERSION.SDK_INT >= 21) { window.statusBarColor = bg; window.navigationBarColor = bg }
                  if (Build.VERSION.SDK_INT >= 26) {
                      val decor = window.decorView
                      var flags = decor.systemUiVisibility
                      flags = if (!dark) flags or (View.SYSTEM_UI_FLAG_LIGHT_NAVIGATION_BAR or View.SYSTEM_UI_FLAG_LIGHT_STATUS_BAR)
                              else       flags and (View.SYSTEM_UI_FLAG_LIGHT_NAVIGATION_BAR or View.SYSTEM_UI_FLAG_LIGHT_STATUS_BAR).inv()
                      decor.systemUiVisibility = flags
                  }
              }

              private fun offlineHtml(): String {
                  val dark = isDarkTheme()
                  val bg = if (dark) "#111318" else "#F1F3F4"
                  val fg = if (dark) "#ffffff" else "#1a1a1a"
                  val muted = if (dark) "rgba(255,255,255,0.5)" else "rgba(0,0,0,0.45)"
                  return "<html><body style='background:$bg;color:$fg;font-family:-apple-system,sans-serif;" +
                      "display:flex;flex-direction:column;align-items:center;justify-content:center;" +
                      "height:100vh;margin:0;text-align:center;padding:32px;box-sizing:border-box'>" +
                      "<div style='font-size:56px;margin-bottom:8px'>📡</div>" +
                      "<h2 style='margin:0 0 8px;font-size:20px'>No Internet</h2>" +
                      "<p style='margin:0 0 28px;font-size:14px;color:$muted'>Check your connection and try again</p>" +
                      "<button onclick='location.reload()' style='padding:13px 32px;background:#6c63ff;" +
                      "border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer'>Retry</button>" +
                      "</body></html>"
              }

              fun handleNotifUrl(intent: Intent?) {
                  val url = intent?.getStringExtra("open_url")?.takeIf { it.isNotEmpty() } ?: return
                  val wv = bridge?.webView ?: return
                  runOnUiThread { showLoadingOverlay(wv); wv.loadUrl(url) }
              }

              private fun setupWebView() {
                  val wv = bridge!!.webView
                  val ws = wv.settings
                  ws.javaScriptEnabled = true; ws.domStorageEnabled = true; ws.allowFileAccess = true
                  ws.allowContentAccess = true; ws.cacheMode = WebSettings.LOAD_DEFAULT; ws.textZoom = 100
                  ws.setSupportZoom(false); ws.useWideViewPort = true; ws.mediaPlaybackRequiresUserGesture = false
                  if (Build.VERSION.SDK_INT >= 21) ws.mixedContentMode = WebSettings.MIXED_CONTENT_ALWAYS_ALLOW
                  wv.setBackgroundColor(lastBgColor)

                  wv.webViewClient = object : WebViewClient() {
                      private val toH = Handler(Looper.getMainLooper())
                      private var toR: Runnable? = null

                      override fun onPageStarted(v: WebView, url: String, fav: Bitmap?) {
                          runOnUiThread { showLoadingOverlay(v) }
                          toR?.let { toH.removeCallbacks(it) }
                          toR = Runnable { splashDone = true; runOnUiThread { hideLoadingOverlay(v); v.loadData(offlineHtml(), "text/html", "UTF-8") } }
                          toH.postDelayed(toR!!, 15000)
                      }

                      override fun onPageFinished(v: WebView, url: String) {
                          toR?.let { toH.removeCallbacks(it) }; toR = null
                          splashDone = true; runOnUiThread { hideLoadingOverlay(v) }
                          val dark = isDarkTheme()
                          val fcmToken = getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("fcm_token", "") ?: ""
                          v.evaluateJavascript(
                              "window.WALLS_PLATFORM='android';" +
                              "window.WALLS_VERSION='${getVersion()}';" +
                              "window.WALLS_DARK=$dark;" +
                              "window.WALLS_FCM_TOKEN='$fcmToken';" +
                              "window.WallsApp={" +
                              "  download:        function(u,n){Android.downloadFile(u,n||'wallpaper.jpg')}," +
                              "  setWallpaper:    function(u,t){Android.setWallpaper(u,t||'home')}," +
                              "  requestStorage:  function(){Android.requestStoragePermission()}," +
                              "  hasStorage:      function(){return Android.hasStorage()}," +
                              "  isAndroid:       function(){return true}," +
                              "  getVersion:      function(){return Android.getVersion()}," +
                              "  openUrl:         function(u){Android.openUrl(u)}," +
                              "  getTheme:        function(){return Android.getTheme()}," +
                              "  getSystemImages: function(){return new Promise(function(res){var cb='_wCb'+Date.now();window[cb]=function(d){delete window[cb];res(d)};Android.getSystemImages(cb);})}," +
                              "  getWallsFolder:  function(){return new Promise(function(res){var cb='_wCb'+Date.now();window[cb]=function(d){delete window[cb];res(d)};Android.getWallsFolder(cb);})}," +
                              "  shareFile:       function(p){Android.shareFile(p)}," +
                              "  toast:           function(m){Android.showToast(m)}," +
                              "  getSetLog:       function(){try{return JSON.parse(Android.getWallpaperLog())}catch(e){return []}}," +
                              "  getFcmToken:     function(){return window.WALLS_FCM_TOKEN}," +
                              "  pickImages:function(cb){" +
                              "    window._wallsPickCb=cb;Android.requestStoragePermission();" +
                              "    window.addEventListener('walls_perm_granted',function h(){" +
                              "      window.removeEventListener('walls_perm_granted',h);Android.getSystemImages('_wallsPickCb');" +
                              "    },{once:true});" +
                              "  }" +
                              "};" +
                              "window.Android_download=    function(u,n){window.WallsApp.download(u,n)};" +
                              "window.Android_setWallpaper=function(u,t){window.WallsApp.setWallpaper(u,t)};" +
                              "window.Android_pickImages=  function(cb){window.WallsApp.pickImages(cb)};" +
                              "window.Android_hasStorage=  function(){return window.WallsApp.hasStorage()};" +
                              "window.Android_getFcmToken= function(){return window.WALLS_FCM_TOKEN};" +
                              "window.dispatchEvent(new CustomEvent('walls_native_ready',{detail:{" +
                              "  hasStorage:${hasStoragePermission()},dark:$dark,platform:'android',fcmToken:'$fcmToken'}}));" +
                              "window.dispatchEvent(new CustomEvent('walls_theme',{detail:{dark:$dark}}));", null)
                      }

                      override fun onReceivedError(v: WebView, req: WebResourceRequest, err: WebResourceError) {
                          if (!req.isForMainFrame) return
                          toR?.let { toH.removeCallbacks(it) }; toR = null
                          splashDone = true
                          runOnUiThread { hideLoadingOverlay(v); v.loadData(offlineHtml(), "text/html", "UTF-8") }
                      }

                      override fun shouldOverrideUrlLoading(v: WebView, req: WebResourceRequest): Boolean {
                          val url = req.url.toString()
                          if (url.startsWith(BASE_URL) || url.startsWith("https://localhost") || url.startsWith("http://localhost") || url.startsWith("capacitor://")) return false
                          try { startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(url))) } catch (e: Exception) { }
                          return true
                      }
                  }

                  wv.webChromeClient = object : WebChromeClient() {
                      override fun onConsoleMessage(msg: ConsoleMessage): Boolean {
                          android.util.Log.d("WallsJS", "${msg.sourceId()}:${msg.lineNumber()} ${msg.message()}"); return true
                      }
                      override fun onJsConfirm(v: WebView, url: String, msg: String, r: JsResult): Boolean {
                          AlertDialog.Builder(this@MainActivity).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK") { _, _ -> r.confirm() }.setNegativeButton("Cancel") { _, _ -> r.cancel() }
                              .setOnCancelListener { r.cancel() }.show(); return true
                      }
                      override fun onJsAlert(v: WebView, url: String, msg: String, r: JsResult): Boolean {
                          AlertDialog.Builder(this@MainActivity).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK") { _, _ -> r.confirm() }.setOnCancelListener { r.confirm() }.show(); return true
                      }
                      override fun onJsPrompt(v: WebView, url: String, msg: String, def: String?, r: JsPromptResult): Boolean {
                          AlertDialog.Builder(this@MainActivity).setTitle("Walls").setMessage(msg)
                              .setPositiveButton("OK") { _, _ -> r.confirm(def) }.setNegativeButton("Cancel") { _, _ -> r.cancel() }
                              .setOnCancelListener { r.cancel() }.show(); return true
                      }
                  }
              }

              fun showLoadingOverlay(wv: WebView) {
                  if (loadingOverlay?.parent != null) return
                  val fl = FrameLayout(this)
                  fl.setBackgroundColor(lastBgColor)
                  val pb = ProgressBar(this)
                  pb.isIndeterminate = true
                  pb.indeterminateDrawable.setColorFilter(Color.parseColor("#6c63ff"), android.graphics.PorterDuff.Mode.SRC_IN)
                  val lp = FrameLayout.LayoutParams(120, 120)
                  lp.gravity = android.view.Gravity.CENTER
                  fl.addView(pb, lp); loadingOverlay = fl
                  (wv.parent as? ViewGroup)?.addView(fl, ViewGroup.LayoutParams(-1, -1))
              }

              fun hideLoadingOverlay(wv: WebView) {
                  loadingOverlay?.let { (it.parent as? ViewGroup)?.removeView(it) }
                  loadingOverlay = null
              }

              private fun setupJsBridge() {
                  bridge!!.webView.addJavascriptInterface(object : Any() {
                      @android.webkit.JavascriptInterface
                      fun downloadFile(url: String?, filename: String?) {
                          if (url.isNullOrEmpty()) return
                          var name = if (!filename.isNullOrEmpty()) filename else "wallpaper.jpg"
                          if (!name.contains(".")) name += ".jpg"
                          val fn = name
                          if (hasStoragePermission()) runOnUiThread { triggerDownload(url, fn) }
                          else { pendingDlUrl = url; pendingDlName = fn; requestStoragePermission() }
                      }
                      @android.webkit.JavascriptInterface
                      fun setWallpaper(url: String?, target: String?) {
                          if (url.isNullOrEmpty()) return
                          if (hasStoragePermission()) runOnUiThread { downloadForWallpaper(url, target) }
                          else { pendingWpUrl = url; pendingWpTarget = target; requestStoragePermission() }
                      }
                      @android.webkit.JavascriptInterface fun requestStoragePermission() { runOnUiThread { this@MainActivity.requestStoragePermission() } }
                      @android.webkit.JavascriptInterface fun hasStorage()   = hasStoragePermission()
                      @android.webkit.JavascriptInterface fun isAndroid()    = true
                      @android.webkit.JavascriptInterface fun getVersion()   = this@MainActivity.getVersion()
                      @android.webkit.JavascriptInterface fun getTheme()     = if (isDarkTheme()) "dark" else "light"
                      @android.webkit.JavascriptInterface fun getFcmToken()  = getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("fcm_token", "") ?: ""
                      @android.webkit.JavascriptInterface fun showToast(m: String?) { m?.let { runOnUiThread { Toast.makeText(this@MainActivity, it, Toast.LENGTH_SHORT).show() } } }
                      @android.webkit.JavascriptInterface fun openUrl(url: String?) {
                          if (url.isNullOrEmpty()) return
                          runOnUiThread { try { startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(url))) } catch (e: Exception) { } }
                      }
                      @android.webkit.JavascriptInterface fun getWallpaperLog() =
                          try { getSharedPreferences(PREF_FILE, MODE_PRIVATE).getString("wp_set_log", "[]") ?: "[]" } catch (e: Exception) { "[]" }

                      @android.webkit.JavascriptInterface
                      fun getSystemImages(callbackName: String?): String {
                          Thread {
                              try {
                                  val arr = JSONArray()
                                  if (Build.VERSION.SDK_INT >= 29) {
                                      val proj = arrayOf(MediaStore.Images.Media._ID, MediaStore.Images.Media.DISPLAY_NAME, MediaStore.Images.Media.SIZE, MediaStore.Images.Media.RELATIVE_PATH)
                                      val cur = contentResolver.query(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, proj, null, null, MediaStore.Images.Media.DATE_ADDED + " DESC")
                                      cur?.use {
                                          val idIdx   = it.getColumnIndexOrThrow(MediaStore.Images.Media._ID)
                                          val nameIdx = it.getColumnIndexOrThrow(MediaStore.Images.Media.DISPLAY_NAME)
                                          val sizeIdx = it.getColumnIndexOrThrow(MediaStore.Images.Media.SIZE)
                                          val relIdx  = it.getColumnIndexOrThrow(MediaStore.Images.Media.RELATIVE_PATH)
                                          while (it.moveToNext()) {
                                              val id = it.getLong(idIdx)
                                              val contentUri = Uri.withAppendedPath(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, id.toString())
                                              val relPath = it.getString(relIdx)
                                              val isWalls = relPath?.contains("Walls") == true
                                              arr.put(JSONObject().put("uri", contentUri.toString()).put("name", it.getString(nameIdx)).put("size", it.getLong(sizeIdx)).put("path", contentUri.toString()).put("isLocal", isWalls))
                                          }
                                      }
                                  } else {
                                      val proj = arrayOf(MediaStore.Images.Media.DATA, MediaStore.Images.Media.DISPLAY_NAME, MediaStore.Images.Media.SIZE)
                                      val cur = contentResolver.query(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, proj, null, null, MediaStore.Images.Media.DATE_ADDED + " DESC")
                                      cur?.use {
                                          val di = it.getColumnIndexOrThrow(MediaStore.Images.Media.DATA)
                                          val ni = it.getColumnIndexOrThrow(MediaStore.Images.Media.DISPLAY_NAME)
                                          val si = it.getColumnIndexOrThrow(MediaStore.Images.Media.SIZE)
                                          while (it.moveToNext()) {
                                              val filePath = it.getString(di)
                                              arr.put(JSONObject().put("uri", "file://$filePath").put("path", filePath).put("name", it.getString(ni)).put("size", it.getLong(si)).put("isLocal", filePath?.contains("/Walls/") == true))
                                          }
                                      }
                                  }
                                  val json = arr.toString()
                                  val wv = bridge?.webView
                                  if (wv != null && !callbackName.isNullOrEmpty())
                                      runOnUiThread { wv.evaluateJavascript("if(typeof window['$callbackName']==='function')window['$callbackName']($json);", null) }
                              } catch (e: Exception) {
                                  android.util.Log.e("WallsStorage", "getSystemImages error: ${e.message}")
                                  val wv = bridge?.webView
                                  if (wv != null && !callbackName.isNullOrEmpty())
                                      runOnUiThread { wv.evaluateJavascript("if(typeof window['$callbackName']==='function')window['$callbackName']([]);", null) }
                              }
                          }.start()
                          return "pending"
                      }

                      @android.webkit.JavascriptInterface
                      fun getWallsFolder(callbackName: String?): String {
                          Thread {
                              try {
                                  val arr = JSONArray()
                                  if (Build.VERSION.SDK_INT >= 29) {
                                      val proj = arrayOf(MediaStore.Images.Media._ID, MediaStore.Images.Media.DISPLAY_NAME, MediaStore.Images.Media.SIZE)
                                      val cur = contentResolver.query(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, proj, "${MediaStore.Images.Media.RELATIVE_PATH} LIKE ?", arrayOf("%Walls/%"), MediaStore.Images.Media.DATE_ADDED + " DESC")
                                      cur?.use {
                                          val idIdx   = it.getColumnIndexOrThrow(MediaStore.Images.Media._ID)
                                          val nameIdx = it.getColumnIndexOrThrow(MediaStore.Images.Media.DISPLAY_NAME)
                                          val sizeIdx = it.getColumnIndexOrThrow(MediaStore.Images.Media.SIZE)
                                          while (it.moveToNext()) {
                                              val id = it.getLong(idIdx)
                                              val contentUri = Uri.withAppendedPath(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, id.toString())
                                              arr.put(JSONObject().put("uri", contentUri.toString()).put("name", it.getString(nameIdx)).put("size", it.getLong(sizeIdx)).put("isLocal", true))
                                          }
                                      }
                                  } else {
                                      val wallsDir = File(android.os.Environment.getExternalStoragePublicDirectory(android.os.Environment.DIRECTORY_PICTURES), "Walls")
                                      if (wallsDir.exists()) {
                                          wallsDir.listFiles { _, name -> name.lowercase().matches(Regex(".*\\.(jpg|jpeg|png|webp)")) }?.forEach { f ->
                                              arr.put(JSONObject().put("uri", "file://${f.absolutePath}").put("path", f.absolutePath).put("name", f.name).put("size", f.length()).put("isLocal", true))
                                          }
                                      }
                                  }
                                  val json = arr.toString()
                                  val wv = bridge?.webView
                                  if (wv != null && !callbackName.isNullOrEmpty())
                                      runOnUiThread { wv.evaluateJavascript("if(typeof window['$callbackName']==='function')window['$callbackName']($json);", null) }
                              } catch (e: Exception) {
                                  android.util.Log.e("WallsStorage", "getWallsFolder error: ${e.message}")
                                  val wv = bridge?.webView
                                  if (wv != null && !callbackName.isNullOrEmpty())
                                      runOnUiThread { wv.evaluateJavascript("if(typeof window['$callbackName']==='function')window['$callbackName']([]);", null) }
                              }
                          }.start()
                          return "pending"
                      }

                      @android.webkit.JavascriptInterface
                      fun shareFile(path: String?) {
                          if (path.isNullOrEmpty()) return
                          runOnUiThread {
                              try {
                                  val f = File(path.replace("file://", ""))
                                  val uri = FileProvider.getUriForFile(this@MainActivity, AUTHORITY, f)
                                  startActivity(Intent.createChooser(Intent(Intent.ACTION_SEND).setType("image/*")
                                      .putExtra(Intent.EXTRA_STREAM, uri).addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION), "Share wallpaper"))
                              } catch (e: Exception) { Toast.makeText(this@MainActivity, "Share failed: ${e.message}", Toast.LENGTH_SHORT).show() }
                          }
                      }
                  }, "Android")
              }

              private fun hasStoragePermission(): Boolean {
                  if (Build.VERSION.SDK_INT >= 34)
                      return ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_IMAGES) == PackageManager.PERMISSION_GRANTED
                          || ContextCompat.checkSelfPermission(this, "android.permission.READ_MEDIA_VISUAL_USER_SELECTED") == PackageManager.PERMISSION_GRANTED
                  if (Build.VERSION.SDK_INT >= 33) return ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_IMAGES) == PackageManager.PERMISSION_GRANTED
                  if (Build.VERSION.SDK_INT >= 29) return true
                  return ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE) == PackageManager.PERMISSION_GRANTED
              }

              private fun requestStoragePermission() {
                  when {
                      Build.VERSION.SDK_INT >= 34 -> ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.READ_MEDIA_IMAGES, "android.permission.READ_MEDIA_VISUAL_USER_SELECTED"), REQ_STORAGE)
                      Build.VERSION.SDK_INT >= 33 -> ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.READ_MEDIA_IMAGES), REQ_STORAGE)
                      Build.VERSION.SDK_INT < 29  -> ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE), REQ_STORAGE)
                  }
              }

              override fun onRequestPermissionsResult(code: Int, perms: Array<String>, results: IntArray) {
                  super.onRequestPermissionsResult(code, perms, results)
                  if (code != REQ_STORAGE) return
                  val granted = results.isNotEmpty() && results[0] == PackageManager.PERMISSION_GRANTED
                  val wv = bridge?.webView
                  wv?.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_perm_${if (granted) "granted" else "denied"}'))", null)
                  if (!granted) { Toast.makeText(this, "Storage permission denied.", Toast.LENGTH_LONG).show(); return }
                  pendingDlUrl?.let { u -> val n = pendingDlName ?: "wallpaper.jpg"; pendingDlUrl = null; pendingDlName = null; runOnUiThread { triggerDownload(u, n) } }
                  pendingWpUrl?.let { u -> val t = pendingWpTarget; pendingWpUrl = null; pendingWpTarget = null; runOnUiThread { downloadForWallpaper(u, t) } }
              }

              private fun triggerDownload(url: String, filename: String) {
                  lastFile = filename; downloadStartTime = System.currentTimeMillis()
                  Toast.makeText(this, "Starting download…", Toast.LENGTH_SHORT).show()
                  nm?.notify(NOTIF_ING, notifBuilder(DL_CH, "⬇️ Downloading", lastFile).setProgress(0, 0, true).setOngoing(true).setOnlyAlertOnce(true).build())
                  try {
                      File(android.os.Environment.getExternalStoragePublicDirectory(android.os.Environment.DIRECTORY_PICTURES), WALLS_FOLDER).mkdirs()
                      val req = DownloadManager.Request(Uri.parse(url))
                          .setTitle(lastFile).setDescription("Saving to Pictures/Walls…").setMimeType("image/jpeg")
                          .setDestinationInExternalPublicDir(android.os.Environment.DIRECTORY_PICTURES, "$WALLS_FOLDER/$lastFile")
                          .setNotificationVisibility(DownloadManager.Request.VISIBILITY_HIDDEN)
                      lastId = dm!!.enqueue(req); startProgressPolling()
                      bridge?.webView?.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_started',{detail:{name:'$lastFile'}}))", null)
                  } catch (e: Exception) { nm?.cancel(NOTIF_ING); runOnUiThread { Toast.makeText(this, "Download failed: ${e.message}", Toast.LENGTH_LONG).show() } }
              }

              private fun downloadForWallpaper(url: String, target: String?) {
                  Toast.makeText(this, "Downloading wallpaper…", Toast.LENGTH_SHORT).show()
                  Thread {
                      try {
                          val conn = URL(url).openConnection() as HttpURLConnection
                          conn.connectTimeout = 15000; conn.readTimeout = 30000; conn.connect()
                          val bmp = BitmapFactory.decodeStream(conn.inputStream) ?: throw Exception("Could not decode image")
                          val flags = when (target) {
                              "lock" -> WallpaperManager.FLAG_LOCK
                              "both" -> WallpaperManager.FLAG_SYSTEM or WallpaperManager.FLAG_LOCK
                              else   -> WallpaperManager.FLAG_SYSTEM
                          }
                          applyWallpaperBitmap(bmp, flags)
                          val fname = "walls_${System.currentTimeMillis()}.jpg"
                          val dir = File(android.os.Environment.getExternalStoragePublicDirectory(android.os.Environment.DIRECTORY_PICTURES), WALLS_FOLDER)
                          dir.mkdirs()
                          val out = File(dir, fname)
                          FileOutputStream(out).use { bmp.compress(Bitmap.CompressFormat.JPEG, 95, it) }
                          scanFile(out)
                      } catch (e: Exception) { runOnUiThread { Toast.makeText(this, "Could not set wallpaper: ${e.message}", Toast.LENGTH_LONG).show() } }
                  }.start()
              }

              private fun applyWallpaperBitmap(bmp: Bitmap, flags: Int) {
                  try {
                      val wm = WallpaperManager.getInstance(this)
                      if (Build.VERSION.SDK_INT >= 24) wm.setBitmap(bmp, null, true, flags) else wm.setBitmap(bmp)
                      val target = when (flags) {
                          WallpaperManager.FLAG_LOCK -> "Lock Screen"
                          WallpaperManager.FLAG_SYSTEM or WallpaperManager.FLAG_LOCK -> "Both"
                          else -> "Home Screen"
                      }
                      logWallpaperSet(target)
                      runOnUiThread {
                          Toast.makeText(this, "Wallpaper set! 🎉", Toast.LENGTH_SHORT).show()
                          bridge?.webView?.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_wp_set'))", null)
                      }
                  } catch (e: Exception) { runOnUiThread { Toast.makeText(this, "Could not set wallpaper: ${e.message}", Toast.LENGTH_LONG).show() } }
              }

              private fun logWallpaperSet(target: String) {
                  try {
                      val prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE)
                      val logs = JSONArray(prefs.getString("wp_set_log", "[]"))
                      val entry = JSONObject()
                      entry.put("time", java.text.SimpleDateFormat("yyyy-MM-dd HH:mm", java.util.Locale.getDefault()).format(java.util.Date()))
                      entry.put("target", target); logs.put(entry)
                      while (logs.length() > 50) logs.remove(0)
                      prefs.edit().putString("wp_set_log", logs.toString()).apply()
                  } catch (e: Exception) { }
              }

              private fun applyWallpaper(file: File, flags: Int) {
                  Thread {
                      try {
                          val bmp = BitmapFactory.decodeFile(file.absolutePath) ?: throw Exception("Could not decode image")
                          applyWallpaperBitmap(bmp, flags)
                      } catch (e: Exception) { runOnUiThread { Toast.makeText(this, "Could not set wallpaper: ${e.message}", Toast.LENGTH_LONG).show() } }
                  }.start()
              }

              private fun scanFile(file: File) { sendBroadcast(Intent(Intent.ACTION_MEDIA_SCANNER_SCAN_FILE).setData(Uri.fromFile(file))) }
              fun getVersion() = try { packageManager.getPackageInfo(packageName, 0).versionName ?: "1.0.0" } catch (e: Exception) { "1.0.0" }

              private fun startProgressPolling() {
                  stopProgressPolling()
                  progressRunnable = object : Runnable {
                      override fun run() {
                          if (lastId == -1L) return
                          if (System.currentTimeMillis() - downloadStartTime > TIMEOUT_MS) {
                              dm?.remove(lastId); lastId = -1; nm?.cancel(NOTIF_ING)
                              nm?.notify(NOTIF_DONE, notifBuilder(DL_CH, "Download Timed Out", "\"$lastFile\" took too long.").setAutoCancel(true).build())
                              runOnUiThread { Toast.makeText(this@MainActivity, "Download timed out.", Toast.LENGTH_LONG).show() }; return
                          }
                          val c = dm?.query(DownloadManager.Query().setFilterById(lastId))
                          if (c == null || !c.moveToFirst()) { c?.close(); progressHandler.postDelayed(this, 1000); return }
                          val status   = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_STATUS))
                          val dl       = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_BYTES_DOWNLOADED_SO_FAR))
                          val tot      = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_TOTAL_SIZE_BYTES))
                          val localUri = c.getString(c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI))
                          if (localUri != null) lastLocalPath = localUri
                          c.close()
                          if (status == DownloadManager.STATUS_FAILED) {
                              stopProgressPolling(); nm?.cancel(NOTIF_ING)
                              nm?.notify(NOTIF_DONE, notifBuilder(DL_CH, "Download Failed", "\"$lastFile\" could not be downloaded.").setAutoCancel(true).build())
                              runOnUiThread { Toast.makeText(this@MainActivity, "Download failed.", Toast.LENGTH_LONG).show() }; return
                          }
                          if (status == DownloadManager.STATUS_RUNNING || status == DownloadManager.STATUS_PAUSED) {
                              if (tot > 0) {
                                  val pct = (dl * 100L / tot).toInt()
                                  val sz  = if (dl  < 1 shl 20) String.format("%.1f KB", dl /1024f) else String.format("%.1f MB", dl /(1024f*1024))
                                  val tsz = if (tot < 1 shl 20) String.format("%.1f KB", tot/1024f) else String.format("%.1f MB", tot/(1024f*1024))
                                  val nb = notifBuilder(DL_CH, lastFile, "$sz / $tsz  ·  $pct%").setProgress(100, pct, false).setOngoing(true).setOnlyAlertOnce(true)
                                  if (lastLocalPath.isNotEmpty()) {
                                      try {
                                          val o = BitmapFactory.Options(); o.inSampleSize = 4
                                          val t = BitmapFactory.decodeFile(File(Uri.parse(lastLocalPath).path!!).absolutePath, o)
                                          if (t != null) nb.setLargeIcon(t)
                                      } catch (e: Exception) { }
                                  }
                                  nm?.notify(NOTIF_ING, nb.build())
                                  bridge?.webView?.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_progress',{detail:{pct:$pct,name:'$lastFile'}}))", null)
                              }
                              progressHandler.postDelayed(this, 1000)
                          } else stopProgressPolling()
                      }
                  }
                  progressHandler.postDelayed(progressRunnable!!, 500)
              }

              private fun stopProgressPolling() {
                  progressRunnable?.let { progressHandler.removeCallbacks(it) }; progressRunnable = null
              }

              private fun registerDlReceiver() {
                  dlReceiver = object : BroadcastReceiver() {
                      override fun onReceive(ctx: Context, intent: Intent) {
                          val id = intent.getLongExtra(DownloadManager.EXTRA_DOWNLOAD_ID, -1)
                          if (id != lastId) return
                          stopProgressPolling()
                          val c = dm?.query(DownloadManager.Query().setFilterById(id))
                          if (c == null || !c.moveToFirst()) { c?.close(); return }
                          val status = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_STATUS))
                          val uri    = c.getString(c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI))
                          val reason = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_REASON))
                          c.close(); nm?.cancel(NOTIF_ING)
                          runOnUiThread {
                              if (status == DownloadManager.STATUS_SUCCESSFUL && uri != null) onDownloadSuccess(ctx, uri)
                              else {
                                  nm?.notify(NOTIF_DONE, notifBuilder(DL_CH, "Download Failed", "Could not download \"$lastFile\".").setAutoCancel(true).build())
                                  Toast.makeText(ctx, "Download failed (code $reason)", Toast.LENGTH_LONG).show()
                              }
                          }
                      }
                  }
                  val f = IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE)
                  if (Build.VERSION.SDK_INT >= 33) registerReceiver(dlReceiver, f, RECEIVER_NOT_EXPORTED)
                  else registerReceiver(dlReceiver, f)
              }

              private fun onDownloadSuccess(ctx: Context, localUri: String) {
                  try {
                      val file = File(Uri.parse(localUri).path!!); scanFile(file)
                      bridge?.webView?.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_dl_done',{detail:{name:'$lastFile'}}))", null)
                      var thumb: Bitmap? = null
                      try { val o = BitmapFactory.Options(); o.inSampleSize = 4; thumb = BitmapFactory.decodeFile(file.absolutePath, o) } catch (e: Exception) { }
                      val safeUri = FileProvider.getUriForFile(ctx, AUTHORITY, file)
                      val setIntent = Intent.createChooser(Intent(Intent.ACTION_ATTACH_DATA).setDataAndType(safeUri, "image/*")
                          .addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION).putExtra("mimeType", "image/*"), "Set as wallpaper")
                      val nb = notifBuilder(DL_CH, "✅ Wallpaper Saved!", "\"$lastFile\" — tap to set as wallpaper")
                      thumb?.let { nb.setLargeIcon(it); nb.setStyle(NotificationCompat.BigPictureStyle().bigPicture(it).bigLargeIcon(null as Bitmap?).setBigContentTitle("✅ Wallpaper Saved!").setSummaryText(lastFile)) }
                      nm?.notify(NOTIF_DONE, nb.setContentIntent(PendingIntent.getActivity(ctx, 0, setIntent, PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)).setAutoCancel(true).build())
                  } catch (e: Exception) { nm?.notify(NOTIF_DONE, notifBuilder(DL_CH, "Error", "Saved but could not open: ${e.message}").setAutoCancel(true).build()) }
              }

              fun mkChannel(id: String, name: String, desc: String) {
                  if (Build.VERSION.SDK_INT < 26) return
                  val ch = NotificationChannel(id, name, NotificationManager.IMPORTANCE_HIGH)
                  ch.description = desc; ch.enableVibration(true); ch.vibrationPattern = longArrayOf(0, 250, 100, 250)
                  ch.setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI,
                      android.media.AudioAttributes.Builder().setUsage(android.media.AudioAttributes.USAGE_NOTIFICATION).build())
                  nm?.createNotificationChannel(ch)
              }

              fun notifBuilder(ch: String, title: String, text: String): NotificationCompat.Builder {
                  val b = NotificationCompat.Builder(this, ch)
                      .setSmallIcon(R.drawable.ic_notification).setContentTitle(title).setContentText(text)
                      .setPriority(NotificationCompat.PRIORITY_HIGH).setCategory(NotificationCompat.CATEGORY_STATUS).setDefaults(NotificationCompat.DEFAULT_ALL)
                  try { b.setLargeIcon(BitmapFactory.decodeResource(resources, R.mipmap.ic_launcher)) } catch (e: Exception) { }
                  return b
              }

              fun launchIntent() = PendingIntent.getActivity(this, 0, packageManager.getLaunchIntentForPackage(packageName),
                  PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)

              private fun handleDeepLink(intent: Intent?) {
                  if (intent == null || bridge == null) return
                  val data = intent.data ?: return
                  val url = data.toString()
                  val wv = bridge!!.webView ?: return
                  runOnUiThread {
                      showLoadingOverlay(wv)
                      val dlH = Handler(Looper.getMainLooper())
                      var dlT: Runnable? = null
                      wv.webViewClient = object : WebViewClient() {
                          override fun onPageStarted(v: WebView, u: String, f: Bitmap?) {
                              runOnUiThread { showLoadingOverlay(v) }
                              dlT?.let { dlH.removeCallbacks(it) }
                              dlT = Runnable { splashDone = true; runOnUiThread { hideLoadingOverlay(v); v.loadData(offlineHtml(), "text/html", "UTF-8") } }
                              dlH.postDelayed(dlT!!, 15000)
                          }
                          override fun onPageFinished(v: WebView, u: String) {
                              dlT?.let { dlH.removeCallbacks(it) }; dlT = null
                              splashDone = true; runOnUiThread { hideLoadingOverlay(v) }
                          }
                          override fun onReceivedError(v: WebView, req: WebResourceRequest, err: WebResourceError) {
                              if (!req.isForMainFrame) return
                              dlT?.let { dlH.removeCallbacks(it) }; dlT = null
                              splashDone = true; runOnUiThread { hideLoadingOverlay(v); v.loadData(offlineHtml(), "text/html", "UTF-8") }
                          }
                          override fun shouldOverrideUrlLoading(v: WebView, req: WebResourceRequest): Boolean {
                              val u = req.url.toString()
                              if (u.startsWith(BASE_URL) || u.startsWith("https://localhost") || u.startsWith("http://localhost") || u.startsWith("capacitor://")) return false
                              try { startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(u))) } catch (e: Exception) { }
                              return true
                          }
                      }
                      wv.loadUrl(url)
                      wv.evaluateJavascript("window.dispatchEvent(new CustomEvent('walls_deeplink',{detail:{url:'$url'}}))", null)
                  }
              }

              private fun showWelcome() {
                  val prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE)
                  val first = prefs.getBoolean("first_launch", true)
                  if (first) prefs.edit().putBoolean("first_launch", false).apply()
                  nm?.notify(NOTIF_WELCOME, notifBuilder(PROMO_CH,
                      if (first) "Welcome to Walls 🖼️" else "🔥 Hot wallpapers waiting!",
                      if (first) "Discover stunning wallpapers curated just for you." else "Check out today's trending wallpapers. Find your next favorite.")
                      .setContentIntent(launchIntent()).setAutoCancel(true).build())
              }

              private fun checkForUpdate() {
                  val cv = getVersion()
                  val prefs = getSharedPreferences(PREF_FILE, MODE_PRIVATE)
                  val cachedMin = prefs.getString(PREF_MIN_VER, "") ?: ""
                  if (cachedMin.isNotEmpty() && isNewer(cachedMin, cv)) { runOnUiThread { showUpdateUI(cv, cachedMin, true) }; return }
                  Thread {
                      try {
                          val conn = URL("$BASE_URL/version.json").openConnection() as HttpURLConnection
                          conn.connectTimeout = 5000; conn.readTimeout = 5000; conn.setRequestProperty("Cache-Control", "no-cache")
                          if (conn.responseCode != 200) return@Thread
                          val sb = conn.inputStream.bufferedReader().readText()
                          val vObj = JSONObject(sb)
                          val latest = vObj.optString("latest", "")
                          val minVer = vObj.optString("minVersion", "")
                          if (minVer.isNotEmpty()) prefs.edit().putString(PREF_MIN_VER, minVer).apply()
                          if (latest.isNotEmpty() && isNewer(latest, cv)) {
                              val forced = minVer.isNotEmpty() && isNewer(minVer, cv)
                              runOnUiThread { showUpdateUI(cv, latest, forced) }
                          }
                      } catch (e: Exception) { android.util.Log.e("WallsUpdate", e.message ?: "") }
                  }.start()
              }

              private fun isNewer(a: String, b: String): Boolean {
                  return try {
                      val av = a.split("."); val bv = b.split(".")
                      for (i in 0 until maxOf(av.size, bv.size)) {
                          val ai = if (i < av.size) av[i].trim().toInt() else 0
                          val bi = if (i < bv.size) bv[i].trim().toInt() else 0
                          if (ai != bi) return ai > bi
                      }
                      false
                  } catch (e: Exception) { false }
              }

              private fun showUpdateUI(current: String, latest: String, forced: Boolean) {
                  val wv = bridge?.webView ?: return
                  val dark = isDarkTheme()
                  val bg    = if (dark) "#0d0d12" else "#F1F3F4"
                  val fg    = if (dark) "#ffffff"  else "#111318"
                  val muted = if (dark) "rgba(255,255,255,0.5)" else "rgba(0,0,0,0.45)"
                  val bdr   = if (dark) "rgba(255,255,255,0.08)" else "rgba(0,0,0,0.1)"
                  val label = if (forced) "Update Required" else "Update Available"
                  val sub   = "v$current → v$latest${if (forced) " — Required to continue" else ""}"
                  val dlUrl = "$BASE_URL/download"
                  val laterBtn = if (!forced) "var later=document.createElement('button');later.textContent='Maybe Later';later.style.cssText='margin-top:10px;width:100%;padding:13px;background:transparent;border:1px solid $bdr;border-radius:14px;color:$muted;font-size:14px;cursor:pointer;font-family:inherit';later.onclick=function(){document.getElementById('walls-upd-overlay').remove()};w.appendChild(later);" else ""
                  val js = "(function(){if(document.getElementById('walls-upd-overlay'))return;" +
                      "var o=document.createElement('div');o.id='walls-upd-overlay';" +
                      "o.style.cssText='position:fixed;inset:0;background:$bg;z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:32px;box-sizing:border-box;text-align:center';" +
                      "var img=document.createElement('img');img.src='file:///android_res/mipmap/ic_launcher.png';img.style.cssText='width:80px;height:80px;border-radius:20px;margin-bottom:24px;box-shadow:0 4px 32px rgba(108,99,255,0.35)';img.onerror=function(){this.style.display='none'};o.appendChild(img);" +
                      "var h=document.createElement('div');h.textContent='$label';h.style.cssText='font-size:24px;font-weight:800;color:$fg;margin-bottom:8px';o.appendChild(h);" +
                      "var s=document.createElement('div');s.textContent='$sub';s.style.cssText='font-size:14px;color:$muted;margin-bottom:40px';o.appendChild(s);" +
                      "var w=document.createElement('div');w.style.cssText='width:100%;max-width:340px';" +
                      "var btn=document.createElement('button');btn.textContent='Update Now';btn.style.cssText='width:100%;padding:16px;background:#6c63ff;border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer';" +
                      "btn.onclick=function(){window.Android&&Android.openUrl('$dlUrl')};w.appendChild(btn);" +
                      laterBtn +
                      "o.appendChild(w);document.body.appendChild(o);})();"
                  wv.post { wv.evaluateJavascript(js, null) }
              }

              private fun scheduleReminder() {
                  val am = getSystemService(ALARM_SERVICE) as AlarmManager
                  val pi = PendingIntent.getBroadcast(this, 0, Intent(this, WallpaperReminderReceiver::class.java), PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), pi)
                  else am.setRepeating(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6), TimeUnit.HOURS.toMillis(6), pi)
              }
          }
          EOF

      # ─── WallsFirebaseMessagingService.kt ────────────────────────────────────
      # Firebase Console → Custom data keys:
      #   title      → notification title
      #   body       → notification body text
      #   url        → open URL in WebView on tap
      #   image_url  → single image BigPicture style
      #   images     → comma-separated URLs for 6-image grid
      #   total      → total count → shows "+N More" on last grid cell
      #   channel    → walls_trending | walls_promo | walls_downloads
      #
      # FIX: Send as DATA-ONLY message (no "notification" key in payload).
      # In Firebase Console use "Additional options > Custom data" for all fields.
      # If you include a "notification" key, Android shows its own notification
      # and onMessageReceived is NOT called when the app is in background.
      - name: Write WallsFirebaseMessagingService.kt
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallsFirebaseMessagingService.kt
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls

          import android.app.*
          import android.content.*
          import android.graphics.*
          import android.os.Build
          import android.widget.RemoteViews
          import androidx.core.app.NotificationCompat
          import com.google.firebase.messaging.FirebaseMessagingService
          import com.google.firebase.messaging.RemoteMessage
          import java.io.InputStream
          import java.net.HttpURLConnection
          import java.net.URL

          class WallsFirebaseMessagingService : FirebaseMessagingService() {

              companion object {
                  private const val NOTIF_ID = 6001
              }

              override fun onNewToken(token: String) {
                  super.onNewToken(token)
                  getSharedPreferences(MainActivity.PREF_FILE, MODE_PRIVATE).edit().putString("fcm_token", token).apply()
                  android.util.Log.d("FCM", "New token: $token")
              }

              override fun onMessageReceived(message: RemoteMessage) {
                  super.onMessageReceived(message)
                  val nm = getSystemService(NOTIFICATION_SERVICE) as NotificationManager
                  val data = message.data

                  // FIX: Always prefer data payload fields over notification object.
                  // This ensures onMessageReceived fires even in background/killed state
                  // when you send data-only messages from Firebase Console.
                  var title   = data["title"]   ?: message.notification?.title
                  var body    = data["body"]     ?: message.notification?.body
                  val url     = data["url"]
                  var imgUrl  = data["image_url"]
                  // Also check FCM notification imageUrl field (set via Firebase Console "Image" field)
                  if (imgUrl == null) imgUrl = message.notification?.imageUrl?.toString()
                  val images  = data["images"]
                  val channel = data["channel"] ?: MainActivity.TREND_CH
                  val total   = data["total"]?.toIntOrNull() ?: 0

                  if (title == null) title = "🔥 New Wallpapers!"
                  if (body  == null) body  = "Fresh picks are live on Walls."

                  // FIX: Always recreate the channel on receive in case app was cleared
                  if (Build.VERSION.SDK_INT >= 26) {
                      val ch = NotificationChannel(channel, "Trending Wallpapers", NotificationManager.IMPORTANCE_HIGH)
                      ch.description = "FCM push"; ch.enableVibration(true); ch.vibrationPattern = longArrayOf(0, 250, 100, 250)
                      // FIX: set sound so notification is actually audible
                      ch.setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI,
                          android.media.AudioAttributes.Builder().setUsage(android.media.AudioAttributes.USAGE_NOTIFICATION).build())
                      nm.createNotificationChannel(ch)
                  }

                  var tapIntent = packageManager.getLaunchIntentForPackage(packageName)
                  if (!url.isNullOrEmpty()) {
                      tapIntent = Intent(this, MainActivity::class.java).apply {
                          putExtra("open_url", url)
                          addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP or Intent.FLAG_ACTIVITY_CLEAR_TOP)
                      }
                  }
                  val pi = PendingIntent.getActivity(this, 0, tapIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)

                  val fTitle = title; val fBody = body; val fChannel = channel
                  val fImgUrl = imgUrl; val fImages = images; val fTotal = total

                  Thread {
                      val nb = NotificationCompat.Builder(this, fChannel)
                          .setSmallIcon(R.drawable.ic_notification)
                          .setContentTitle(fTitle).setContentText(fBody)
                          .setPriority(NotificationCompat.PRIORITY_HIGH)
                          .setDefaults(NotificationCompat.DEFAULT_ALL)
                          .setVibrate(longArrayOf(0, 250, 100, 250))
                          // FIX: set sound explicitly so it rings even on some custom ROMs
                          .setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI)
                          .setContentIntent(pi).setAutoCancel(true)

                      if (!fImages.isNullOrEmpty()) {
                          // 6-image grid style
                          val urls = fImages.split(",")
                          val bitmaps = arrayOfNulls<Bitmap>(6)
                          for (i in 0 until minOf(urls.size, 6)) {
                              bitmaps[i] = fetchBitmap(urls[i].trim(), 2)
                          }
                          val rv = RemoteViews(packageName, R.layout.notification_grid)
                          rv.setTextViewText(R.id.notif_title, fTitle)
                          val imgIds = intArrayOf(R.id.img1, R.id.img2, R.id.img3, R.id.img4, R.id.img5, R.id.img6)
                          for (i in 0..5) {
                              if (bitmaps[i] != null) rv.setImageViewBitmap(imgIds[i], bitmaps[i])
                              else                    rv.setImageViewResource(imgIds[i], R.mipmap.ic_launcher)
                          }
                          val extra = if (fTotal > 6) fTotal - 5 else 0
                          rv.setTextViewText(R.id.more_text, if (extra > 0) "+$extra More" else "")
                          nb.setCustomBigContentView(rv).setStyle(NotificationCompat.DecoratedCustomViewStyle())

                      } else if (!fImgUrl.isNullOrEmpty()) {
                          // Single BigPicture — higher res fetch (inSampleSize=1)
                          val bmp = fetchBitmap(fImgUrl, 1)
                          if (bmp != null) {
                              nb.setLargeIcon(bmp)
                              nb.setStyle(NotificationCompat.BigPictureStyle()
                                  .bigPicture(bmp)
                                  .bigLargeIcon(null as Bitmap?)
                                  .setBigContentTitle(fTitle)
                                  .setSummaryText(fBody))
                          }
                      }
                      nm.notify(NOTIF_ID, nb.build())
                  }.start()
              }

              private fun fetchBitmap(imageUrl: String, sampleSize: Int): Bitmap? {
                  var c: HttpURLConnection? = null
                  return try {
                      c = URL(imageUrl).openConnection() as HttpURLConnection
                      c.connectTimeout = 8000; c.readTimeout = 10000
                      c.setRequestProperty("User-Agent", "Walls-Android/1.0")
                      c.connect()
                      if (c.responseCode != 200) return null
                      val o = BitmapFactory.Options(); o.inSampleSize = sampleSize
                      val `is` = c.inputStream
                      val bmp = BitmapFactory.decodeStream(`is`, null, o)
                      `is`.close(); bmp
                  } catch (e: Exception) {
                      android.util.Log.e("FCM", "fetchBitmap failed: $imageUrl — ${e.message}"); null
                  } finally {
                      c?.disconnect()
                  }
              }
          }
          EOF

      # ─── WallpaperReminderReceiver.kt ─────────────────────────────────────────
      - name: Write WallpaperReminderReceiver.kt
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallpaperReminderReceiver.kt
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls

          import android.app.*
          import android.content.*
          import android.graphics.*
          import android.os.Build
          import androidx.core.app.NotificationCompat
          import java.util.concurrent.TimeUnit

          class WallpaperReminderReceiver : BroadcastReceiver() {
              companion object { private const val NOTIF_ID = 5001 }

              override fun onReceive(ctx: Context, intent: Intent) {
                  reschedule(ctx)
                  val nm = ctx.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                  if (Build.VERSION.SDK_INT >= 26) {
                      val ch = NotificationChannel(MainActivity.TREND_CH, "Trending Wallpapers", NotificationManager.IMPORTANCE_HIGH)
                      ch.description = "Hot & trending wallpaper picks"; ch.enableVibration(true)
                      nm.createNotificationChannel(ch)
                  }
                  val appIcon = try { BitmapFactory.decodeResource(ctx.resources, R.mipmap.ic_launcher) } catch (e: Exception) { null }
                  val pi = PendingIntent.getActivity(ctx, 0,
                      ctx.packageManager.getLaunchIntentForPackage(ctx.packageName),
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)
                  val nb = NotificationCompat.Builder(ctx, MainActivity.TREND_CH)
                      .setSmallIcon(R.drawable.ic_notification)
                      .setContentTitle("🔥 Hot wallpapers waiting!")
                      .setContentText("Fresh picks are live on Walls. Come see what's new.")
                      .setPriority(NotificationCompat.PRIORITY_HIGH).setDefaults(NotificationCompat.DEFAULT_ALL)
                      .setVibrate(longArrayOf(0, 250, 100, 250)).setContentIntent(pi).setAutoCancel(true)
                  appIcon?.let { nb.setLargeIcon(it) }
                  nm.notify(NOTIF_ID, nb.build())
              }

              private fun reschedule(ctx: Context) {
                  val am = ctx.getSystemService(Context.ALARM_SERVICE) as AlarmManager
                  val pi = PendingIntent.getBroadcast(ctx, 0, Intent(ctx, WallpaperReminderReceiver::class.java), PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)
                  val next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6)
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi)
                  else am.set(AlarmManager.RTC_WAKEUP, next, pi)
              }
          }
          EOF

      # ─── BootReceiver.kt ──────────────────────────────────────────────────────
      - name: Write BootReceiver.kt
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/BootReceiver.kt
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls

          import android.app.*
          import android.content.*
          import android.os.Build
          import java.util.concurrent.TimeUnit

          class BootReceiver : BroadcastReceiver() {
              override fun onReceive(ctx: Context, intent: Intent) {
                  if (intent.action != Intent.ACTION_BOOT_COMPLETED &&
                      intent.action != "android.intent.action.QUICKBOOT_POWERON") return
                  val am = ctx.getSystemService(Context.ALARM_SERVICE) as AlarmManager
                  val pi = PendingIntent.getBroadcast(ctx, 0, Intent(ctx, WallpaperReminderReceiver::class.java), PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)
                  val next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(1)
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi)
                  else am.set(AlarmManager.RTC_WAKEUP, next, pi)
              }
          }
          EOF

      # ─── Assets, icons, splash, styles ───────────────────────────────────────
