name: Build Android APK + AAB (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SDK: /usr/local/lib/android/sdk
      JAVA_DIR: android/app/src/main/java/ng/name/ovrica/walls
      RES: android/app/src/main/res
      KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK"     >> $GITHUB_ENV
          mkdir -p $SDK/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > $SDK/licenses/android-sdk-license
          echo "y" | $SDK/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: Install dependencies & Configure Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          [ -f "public/app/index.html" ] || (echo "ERROR: public/app/index.html not found." && exit 1)
          printf '{"appId":"ng.name.ovrica.walls","appName":"Walls","webDir":"public/app","android":{"allowMixedContent":true,"backgroundColor":"#000000"}}' \
            > capacitor.config.json
          npx cap add android

          # ── Copy icon to resources/ ──────────────────────────────────────────
          mkdir -p resources
          ICON_SRC="public/icon/icon-512x512.png"
          if [ -f "$ICON_SRC" ]; then
            cp "$ICON_SRC" resources/icon.png && echo "Icon copied"
          else
            echo "WARNING: $ICON_SRC not found — using Capacitor default icon"
          fi

          # ── Generate mipmap sizes with @capacitor/assets then Pillow ─────────
          if [ -f "resources/icon.png" ]; then
            npx @capacitor/assets generate --android \
              --iconBackgroundColor '#000000' \
              --iconBackgroundColorDark '#000000' 2>&1 || true

            pip install pillow --break-system-packages -q
            python3 -c 'import sys,os; from PIL import Image; src="resources/icon.png"; res=sys.argv[1]; img=Image.open(src).convert("RGBA"); sizes={"mipmap-mdpi":48,"mipmap-hdpi":72,"mipmap-xhdpi":96,"mipmap-xxhdpi":144,"mipmap-xxxhdpi":192}; [(__import__("os").makedirs(os.path.join(res,f),exist_ok=True) or img.resize((px,px),Image.LANCZOS).save(os.path.join(res,f,"ic_launcher.png")) or img.resize((px,px),Image.LANCZOS).save(os.path.join(res,f,"ic_launcher_round.png"))) for f,px in sizes.items()]; print("Icons generated")' "$RES"
          fi

      - name: Copy google-services.json
        run: cp public/google-services.json android/app/google-services.json

      - name: Write resource files
        run: |
          mkdir -p "$RES/xml" "$RES/values" "$RES/drawable"

          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths>\n  <external-path name="walls_downloads" path="Pictures/Walls/" />\n  <external-path name="external_files" path="." />\n  <external-files-path name="external_files_path" path="." />\n  <cache-path name="cache" path="." />\n</paths>\n' \
            > "$RES/xml/file_paths.xml"

          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="ic_launcher_background">#000000</color></resources>\n' \
            > "$RES/values/ic_launcher_background.xml"

          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n  <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">\n    <item name="android:windowBackground">#000000</item>\n    <item name="colorPrimary">#6c63ff</item>\n    <item name="colorPrimaryDark">#000000</item>\n    <item name="colorAccent">#6c63ff</item>\n  </style>\n  <style name="Theme.App.SplashScreen" parent="Theme.SplashScreen">\n    <item name="windowSplashScreenBackground">#000000</item>\n    <item name="windowSplashScreenAnimatedIcon">@mipmap/ic_launcher</item>\n    <item name="postSplashScreenTheme">@style/AppTheme</item>\n  </style>\n</resources>\n' \
            > "$RES/values/styles.xml"

          printf '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android"\n    android:width="24dp" android:height="24dp"\n    android:viewportWidth="24" android:viewportHeight="24">\n  <path android:fillColor="#FFFFFF"\n      android:pathData="M12,2C8.13,2 5,5.13 5,9v6l-2,2v1h18v-1l-2,-2V9C19,5.13 15.87,2 12,2zM12,22c1.1,0 2,-0.9 2,-2h-4C10,21.1 10.9,22 12,22z"/>\n</vector>\n' \
            > "$RES/drawable/ic_notification.xml"


      - name: Write Java source files
        run: |
          mkdir -p "$JAVA_DIR"
          echo "" | base64 -d > "$JAVA_DIR/MainActivity.java"
          echo "" | base64 -d > "$JAVA_DIR/WallsFirebaseMessagingService.java"
          echo "" | base64 -d > "$JAVA_DIR/WallpaperReminderReceiver.java"
          echo "" | base64 -d > "$JAVA_DIR/BootReceiver.java"

      - name: Patch AndroidManifest & build files
        run: |
          echo "" | base64 -d > /tmp/patch_manifest.py
          python3 /tmp/patch_manifest.py
          echo "" | base64 -d >> android/build.gradle


      - name: Add dependencies, generate keystore & build
        run: |
          # Patch build.gradle dependencies
          sed -i '/dependencies {/a\    implementation "androidx.core:core-splashscreen:1.0.1"' android/app/build.gradle
          sed -i '/dependencies {/a\    implementation "com.google.firebase:firebase-messaging"' android/app/build.gradle
          sed -i '/dependencies {/a\    implementation platform("com.google.firebase:firebase-bom:34.11.0")' android/app/build.gradle
          sed -i "/^plugins {/a\\    id 'com.google.gms.google-services'" android/app/build.gradle
          sed -i "/^        classpath 'com.android.tools.build:gradle/a\\        classpath 'com.google.gms:google-services:4.4.4'" android/build.gradle

          # Generate keystore
          keytool -genkeypair -v -keystore walls.keystore \
            -alias walls -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KS_PASS" -keypass "$KS_PASS" \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

          # Build APK + AAB
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease bundleRelease

      - name: Sign and package
        run: |
          BT=$ANDROID_SDK_ROOT/build-tools/34.0.0
          UNSIGNED=$(find android -name "app-release-unsigned.apk" | head -1)
          [ -z "$UNSIGNED" ] && echo "ERROR: No unsigned APK!" && exit 1

          $BT/zipalign -v -p 4 "$UNSIGNED" app-aligned.apk
          $BT/apksigner sign --ks walls.keystore --ks-key-alias walls \
            --ks-pass pass:"$KS_PASS" --key-pass pass:"$KS_PASS" \
            --out app-release-signed.apk app-aligned.apk
          $BT/apksigner verify --verbose app-release-signed.apk

          AAB_UNSIGNED=$(find android -name "app-release.aab" | head -1)
          if [ -n "$AAB_UNSIGNED" ]; then
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore walls.keystore -storepass "$KS_PASS" -keypass "$KS_PASS" \
              "$AAB_UNSIGNED" walls
            cp "$AAB_UNSIGNED" app-release-signed.aab
          fi

          mkdir -p release
          cp app-release-signed.apk release/
          [ -f app-release-signed.aab ] && cp app-release-signed.aab release/

          keytool -list -v -keystore walls.keystore -alias walls \
            -storepass "$KS_PASS" | grep "SHA256" > release/sha256.txt
          SHA256=$(sed 's/.*SHA256: //' release/sha256.txt)

          # Generate assetlinks.json — MUST be hosted at:
          # https://walls.ovrica.name.ng/.well-known/assetlinks.json
          echo '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"ng.name.ovrica.walls","sha256_cert_fingerprints":["'"$SHA256"'"]}}]' \
            > release/assetlinks.json

          zip -j release/walls-release.zip release/app-release-signed.apk release/sha256.txt release/assetlinks.json
          [ -f release/app-release-signed.aab ] && zip -j release/walls-release-aab.zip release/app-release-signed.aab

      - uses: actions/upload-artifact@v4
        with:
          name: walls-release-apk
          path: ${{ github.workspace }}/release/walls-release.zip
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: walls-release-aab
          path: ${{ github.workspace }}/release/walls-release-aab.zip
          retention-days: 30
