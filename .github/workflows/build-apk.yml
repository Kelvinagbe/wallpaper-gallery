name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          echo "Config written:"
          cat ~/.bubblewrap/config.json

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Run Bubblewrap init to generate Android project
        run: |
          mkdir -p walls-android
          # Pipe all expected answers:
          # 1. App name
          # 2. Short name  
          # 3. Start URL
          # 4. Theme color
          # 5. Background color
          # 6. Display mode
          # 7. Orientation
          # 8. Icon URL
          # 9. Maskable icon
          # 10. Keep existing keystore = no, create new = yes
          # 11. Keystore path
          # 12. Keystore password
          # 13. Key alias
          # 14. Key password
          printf "\n\n\n\n\n\n\n\n\nn\n${{ github.workspace }}/walls.keystore\n${{ secrets.KEYSTORE_PASSWORD }}\nwalls\n${{ secrets.KEYSTORE_PASSWORD }}\n" | \
          bubblewrap init \
            --manifest https://walls.ovrica.name.ng/manifest.webmanifest \
            --directory ${{ github.workspace }}/walls-android

      - name: List generated files
        run: |
          echo "Files in walls-android:"
          ls -la walls-android/

      - name: Build APK with Gradle
        run: |
          cd walls-android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/walls.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=walls \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Find APK
        run: |
          find walls-android -name "*.apk" | head -5
          find walls-android -name "*.apk" -exec cp {} app-release-signed.apk \;

      - name: Get SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > sha256.txt
          cat sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-apk
          path: |
            app-release-signed.apk
            sha256.txt
          retention-days: 30
