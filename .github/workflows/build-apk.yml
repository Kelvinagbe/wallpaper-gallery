                                  .bigLargeIcon((Bitmap) null)  // hide large icon when expanded to show more of the picture
                                  .setBigContentTitle("🔥 Hot wallpapers waiting!")
                                  .setSummaryText(summary));
                      } else {
                          // InboxStyle: list of wallpaper titles
                          NotificationCompat.InboxStyle inbox = new NotificationCompat.InboxStyle()
                              .setBigContentTitle("🔥 Hot wallpapers waiting!").setSummaryText(titles.size() + " hot wallpapers");
                          for (String t : titles) inbox.addLine("🖼  " + t);
                          nb = new NotificationCompat.Builder(ctx, TREND_CH)
                              .setSmallIcon(R.drawable.ic_notification)
                              .setContentTitle("🔥 Hot wallpapers waiting!").setContentText(summary).setStyle(inbox);
                          if (appIcon != null) nb.setLargeIcon(appIcon);
                      }
                      nb.setPriority(NotificationCompat.PRIORITY_HIGH)
                        .setDefaults(NotificationCompat.DEFAULT_ALL)
                        .setVibrate(new long[]{0, 250, 100, 250})
                        .setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI)
                        .setContentIntent(pi).setAutoCancel(true);
                      nm.notify(NOTIF_ID, nb.build());
                  } catch (Exception e) { fallback(ctx, nm); }
              }

              private void reschedule(Context ctx) {
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(ctx, 0, new Intent(ctx, WallpaperReminderReceiver.class),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi);
                  else am.set(AlarmManager.RTC_WAKEUP, next, pi);
              }

              private void fallback(Context ctx, NotificationManager nm) {
                  Bitmap appIcon = null;
                  try { appIcon = BitmapFactory.decodeResource(ctx.getResources(), R.mipmap.ic_launcher); } catch (Exception ignored) {}
                  NotificationCompat.Builder nb = new NotificationCompat.Builder(ctx, TREND_CH)
                      .setSmallIcon(R.drawable.ic_notification)
                      .setContentTitle("🔥 Hot wallpapers waiting!")
                      .setContentText("Fresh picks are live on Walls. Come see what's new.")
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .setContentIntent(PendingIntent.getActivity(ctx, 0,
                          ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE))
                      .setAutoCancel(true);
                  if (appIcon != null) nb.setLargeIcon(appIcon);
                  nm.notify(NOTIF_ID, nb.build());
              }
          }
          EOF

      # ─── BootReceiver ─────────────────────────────────────────────────────────
      - name: Write BootReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/BootReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;
          import android.app.*; import android.content.*; import android.os.Build;
          import java.util.concurrent.TimeUnit;

          public class BootReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context ctx, Intent intent) {
                  if (!Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction()) &&
                      !"android.intent.action.QUICKBOOT_POWERON".equals(intent.getAction())) return;
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(ctx, 0, new Intent(ctx, WallpaperReminderReceiver.class),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(1);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi);
                  else am.set(AlarmManager.RTC_WAKEUP, next, pi);
              }
          }
          EOF

      # ─── Assets, icons, splash, styles ───────────────────────────────────────
      - name: Assets, sync, icons, splash & styles
        run: |
          sudo apt-get install -y imagemagick librsvg2-bin -q
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          npx cap sync android

          SVG="public/icon/icon.svg"
          LOGO="public/icon/icon-512x512.png"
          RES="android/app/src/main/res"

          # Generate the 512px PNG from SVG using rsvg-convert (avoids ImageMagick MSVG black-border bug)
          if [ -f "$SVG" ]; then
            rsvg-convert -w 512 -h 512 "$SVG" -o "$LOGO" 2>/dev/null \
              || convert -background none "$SVG" -resize 512x512 "$LOGO"
          fi
          [ -f "$LOGO" ] || (echo "ERROR: $LOGO not found — add public/icon/icon.svg or icon-512x512.png to your repo!"; exit 1)

          # ── Launcher icons (all densities) ────────────────────────────────────
          for cfg in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            folder="${cfg%%:*}"; size="${cfg##*:}"; mkdir -p "$RES/$folder"
            convert "$LOGO" -resize "${size}x${size}" "$RES/$folder/ic_launcher.png"
            cp "$RES/$folder/ic_launcher.png" "$RES/$folder/ic_launcher_round.png"
          done

          # ── Adaptive icon foreground: prefer SVG for quality ─────────────────
          mkdir -p "$RES/drawable" "$RES/mipmap-anydpi-v26"
          if [ -f "$SVG" ]; then
            rsvg-convert -w 432 -h 432 "$SVG" -o "$RES/drawable/ic_launcher_foreground.png" 2>/dev/null \
              || convert "$SVG" -resize 432x432 "$RES/drawable/ic_launcher_foreground.png"
          else
            convert "$LOGO" -resize 432x432 "$RES/drawable/ic_launcher_foreground.png"
          fi

          # Adaptive icon XML
          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n  <background android:drawable="@color/ic_launcher_background"/>\n  <foreground android:drawable="@drawable/ic_launcher_foreground"/>\n</adaptive-icon>' \
            > "$RES/mipmap-anydpi-v26/ic_launcher.xml"
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

          # ── Notification icon: Walls SVG 4-rect logo (white, AAPT-safe) ──────
          cat > "$RES/drawable/ic_notification.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="20" android:viewportHeight="20">
            <path android:fillColor="#FFFFFF" android:pathData="M0,2 Q0,0 2,0 L9,0 Q9,0 9,2 L9,9 Q9,9 7,9 L2,9 Q0,9 0,7 Z"/>
            <path android:fillColor="#FFFFFF" android:pathData="M11,2 Q11,0 13,0 L18,0 Q20,0 20,2 L20,9 Q20,9 18,9 L13,9 Q11,9 11,7 Z"/>
            <path android:fillColor="#FFFFFF" android:pathData="M0,13 Q0,11 2,11 L7,11 Q9,11 9,13 L9,18 Q9,20 7,20 L2,20 Q0,20 0,18 Z"/>
            <path android:fillColor="#FFFFFF" android:fillAlpha="0.4" android:pathData="M11,13 Q11,11 13,11 L18,11 Q20,11 20,13 L20,18 Q20,20 18,20 L13,20 Q11,20 11,18 Z"/>
          </vector>
          XMLEOF

          # ── Splash: dark bg default, light bg for day theme ───────────────────
          for dir in drawable-mdpi drawable-hdpi drawable-xhdpi drawable-xxhdpi drawable-xxxhdpi; do
            mkdir -p "$RES/$dir"
            convert -size 1080x1920 xc:"#111318" \( "$LOGO" -resize 300x300 \) -gravity center -composite "$RES/$dir/splash.png"
          done
          mkdir -p "$RES/drawable-night" "$RES/drawable"
          convert -size 1080x1920 xc:"#111318" \( "$LOGO" -resize 300x300 \) -gravity center -composite "$RES/drawable-night/splash.png"
          convert -size 1080x1920 xc:"#F1F3F4" \( "$LOGO" -resize 300x300 \) -gravity center -composite "$RES/drawable/splash.png"

          # ── Patch styles.xml — single sed call, anchored to parent=" ─────────
          STYLES="$RES/values/styles.xml"
          [ -f "$STYLES" ] && sed -i \
            -e 's|parent="Theme\.AppCompat\.Light\.NoActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.DayNight\.DarkActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.Light\.DarkActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.DarkActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.Light"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.NoActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            "$STYLES"

          # ── Splash themes (light/dark + API 31 variants) ─────────────────────
          for qualifier in "values" "values-v31" "values-night" "values-night-v31"; do
            mkdir -p "$RES/$qualifier"
            [[ "$qualifier" == *night* ]] && BG="#111318" || BG="#F1F3F4"
            [[ "$qualifier" == *v31* ]]   && ICON_BG='<item name="windowSplashScreenIconBackgroundColor">#000000</item>' || ICON_BG=""
            cat > "$RES/$qualifier/splash_theme.xml" << XMLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.App.SplashScreen" parent="Theme.SplashScreen">
              <item name="windowSplashScreenBackground">$BG</item>
              <item name="windowSplashScreenAnimatedIcon">@mipmap/ic_launcher</item>
              $ICON_BG
              <item name="postSplashScreenTheme">@style/AppTheme</item>
            </style>
          </resources>
          XMLEOF
          done

      - name: Patch AndroidManifest
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          ET.register_namespace('android', 'http://schemas.android.com/apk/res/android')
          ET.register_namespace('tools',   'http://schemas.android.com/tools')
          ANDROID = 'http://schemas.android.com/apk/res/android'
          def a(name): return f'{{{ANDROID}}}{name}'

          path = 'android/app/src/main/AndroidManifest.xml'
          tree = ET.parse(path); root = tree.getroot()

          existing = {el.get(a('name')) for el in root.findall('uses-permission')}
          for perm in [
              'android.permission.INTERNET', 'android.permission.ACCESS_NETWORK_STATE',
              'android.permission.READ_MEDIA_IMAGES', 'android.permission.POST_NOTIFICATIONS',
              'android.permission.SET_WALLPAPER', 'android.permission.SET_WALLPAPER_HINTS',
              'android.permission.SCHEDULE_EXACT_ALARM', 'android.permission.USE_EXACT_ALARM',
              'android.permission.RECEIVE_BOOT_COMPLETED',
              'android.permission.DOWNLOAD_WITHOUT_NOTIFICATION',
          ]:
              if perm not in existing: ET.SubElement(root, 'uses-permission').set(a('name'), perm)

          for perm, sdk in [('android.permission.WRITE_EXTERNAL_STORAGE', '28'), ('android.permission.READ_EXTERNAL_STORAGE', '32')]:
              if perm not in existing:
                  el = ET.SubElement(root, 'uses-permission')
                  el.set(a('name'), perm); el.set(a('maxSdkVersion'), sdk)

          app = root.find('application')
          app.set(a('icon'), '@mipmap/ic_launcher'); app.set(a('roundIcon'), '@mipmap/ic_launcher_round')
          app.set(a('usesCleartextTraffic'), 'true'); app.set(a('hardwareAccelerated'), 'true')

          activity = next((act for act in app.findall('activity') if 'MainActivity' in act.get(a('name'), '')), None)
          if activity is not None:
              activity.set(a('exported'), 'true')
              activity.set(a('theme'), '@style/Theme.App.SplashScreen')
              activity.set(a('configChanges'), 'uiMode|orientation|screenSize|keyboardHidden')
              existing_hosts = [d.get(a('host'), '') for f in activity.findall('intent-filter') for d in f.findall('data')]
              if 'walls.ovrica.name.ng' not in existing_hosts:
                  filt = ET.SubElement(activity, 'intent-filter'); filt.set(a('autoVerify'), 'true')
                  ET.SubElement(filt, 'action').set(a('name'), 'android.intent.action.VIEW')
                  ET.SubElement(filt, 'category').set(a('name'), 'android.intent.category.DEFAULT')
                  ET.SubElement(filt, 'category').set(a('name'), 'android.intent.category.BROWSABLE')
                  data = ET.SubElement(filt, 'data')
                  data.set(a('scheme'), 'https'); data.set(a('host'), 'walls.ovrica.name.ng')

          if 'ng.name.ovrica.walls.fileprovider' not in [p.get(a('authorities'), '') for p in app.findall('provider')]:
              prov = ET.SubElement(app, 'provider')
              prov.set(a('name'), 'androidx.core.content.FileProvider')
              prov.set(a('authorities'), 'ng.name.ovrica.walls.fileprovider')
              prov.set(a('exported'), 'false'); prov.set(a('grantUriPermissions'), 'true')
              meta = ET.SubElement(prov, 'meta-data')
              meta.set(a('name'), 'android.support.FILE_PROVIDER_PATHS'); meta.set(a('resource'), '@xml/file_paths')

          receiver_names = [r.get(a('name'), '') for r in app.findall('receiver')]
          if '.WallpaperReminderReceiver' not in receiver_names:
              rec = ET.SubElement(app, 'receiver')
              rec.set(a('name'), '.WallpaperReminderReceiver'); rec.set(a('exported'), 'false')
          if '.BootReceiver' not in receiver_names:
              rec = ET.SubElement(app, 'receiver')
              rec.set(a('name'), '.BootReceiver'); rec.set(a('exported'), 'true')
              filt = ET.SubElement(rec, 'intent-filter')
              ET.SubElement(filt, 'action').set(a('name'), 'android.intent.action.BOOT_COMPLETED')
              ET.SubElement(filt, 'action').set(a('name'), 'android.intent.action.QUICKBOOT_POWERON')

          tree.write(path, encoding='utf-8', xml_declaration=True)
          ET.parse(path)
          print("Manifest patched and validated OK")
          PYEOF

          cat >> android/build.gradle << 'EOF'
          subprojects { configurations.all { resolutionStrategy {
            force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
          } } }
          EOF

      - name: Add splashscreen dependency & generate keystore
        run: |
          sed -i '/dependencies {/a\    implementation "androidx.core:core-splashscreen:1.0.1"' android/app/build.gradle
          keytool -genkeypair -v -keystore walls.keystore \
            -alias walls -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Build APK + AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Sign and package
        run: |
          BT=$ANDROID_SDK_ROOT/build-tools/34.0.0
          UNSIGNED=$(find android -name "app-release-unsigned.apk" | head -1)
          [ -z "$UNSIGNED" ] && echo "ERROR: No unsigned APK!" && exit 1
          $BT/zipalign -v -p 4 "$UNSIGNED" app-aligned.apk
          $BT/apksigner sign --ks walls.keystore --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out app-release-signed.apk app-aligned.apk
          $BT/apksigner verify --verbose app-release-signed.apk
          AAB_UNSIGNED=$(find android -name "app-release.aab" | head -1)
          if [ -n "$AAB_UNSIGNED" ]; then
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore walls.keystore \
              -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
              "$AAB_UNSIGNED" walls
            cp "$AAB_UNSIGNED" app-release-signed.aab
          fi
          mkdir -p release
          cp app-release-signed.apk release/
          [ -f app-release-signed.aab ] && cp app-release-signed.aab release/
          keytool -list -v -keystore walls.keystore -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep "SHA256" > release/sha256.txt
          SHA256=$(sed 's/.*SHA256: //' release/sha256.txt)
          echo '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"ng.name.ovrica.walls","sha256_cert_fingerprints":["'"$SHA256"'"]}}]' \
            > release/assetlinks.json
          zip -j release/walls-release.zip release/app-release-signed.apk release/sha256.txt release/assetlinks.json
          [ -f release/app-release-signed.aab ] && zip -j release/walls-release-aab.zip release/app-release-signed.aab

      - uses: actions/upload-artifact@v4
        with:
          name: walls-release-apk
          path: ${{ github.workspace }}/release/walls-release.zip
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: walls-release-aab
          path: ${{ github.workspace }}/release/walls-release-aab.zip
          retention-days: 30
