            folder="${cfg%%:*}"; size="${cfg##*:}"; mkdir -p "$RES/$folder"
            convert "$LOGO" -resize "${size}x${size}" "$RES/$folder/ic_launcher.png"
            cp "$RES/$folder/ic_launcher.png" "$RES/$folder/ic_launcher_round.png"
          done

          mkdir -p "$RES/drawable" "$RES/mipmap-anydpi-v26"
          if [ -f "$SVG" ]; then
            rsvg-convert -w 432 -h 432 "$SVG" -o "$RES/drawable/ic_launcher_foreground.png" 2>/dev/null || convert "$SVG" -resize 432x432 "$RES/drawable/ic_launcher_foreground.png"
          else
            convert "$LOGO" -resize 432x432 "$RES/drawable/ic_launcher_foreground.png"
          fi
          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n  <background android:drawable="@color/ic_launcher_background"/>\n  <foreground android:drawable="@drawable/ic_launcher_foreground"/>\n</adaptive-icon>' \
            > "$RES/mipmap-anydpi-v26/ic_launcher.xml"
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

          cat > "$RES/drawable/ic_notification.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp" android:viewportWidth="20" android:viewportHeight="20">
