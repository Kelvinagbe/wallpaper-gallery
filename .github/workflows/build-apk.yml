name: Build Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          mkdir -p $SDK/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" > $SDK/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" > $SDK/licenses/android-sdk-preview-license
          printf "33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" > $SDK/licenses/google-gdk-license
          echo "y" | $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      # ── 1. Install deps + verify public/app/index.html exists ──────────────
      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/splash-screen
          [ -f "public/app/index.html" ] || (echo "ERROR: public/app/index.html not found." && exit 1)

      # ── 2. Capacitor (serves public/app directly — no build step needed) ───
      - name: Configure Capacitor
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "ng.name.ovrica.walls",
            "appName": "Walls",
            "webDir": "public/app",
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2500,
                "launchAutoHide": true,
                "backgroundColor": "#0a0a0a",
                "androidSplashResourceName": "splash",
                "showSpinner": false
              }
            }
          }
          EOF
          [ ! -d "android" ] && npx cap add android || true

      - name: Write file_paths.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="walls_downloads" path="Pictures/Walls/" />
            <external-path name="external_files" path="." />
          </paths>
          EOF

      # ── 3. MainActivity — download + SET WALLPAPER + notifications ──────────
      - name: Write MainActivity.java
        run: |
          MAIN=android/app/src/main/java/ng/name/ovrica/walls/MainActivity.java
          mkdir -p $(dirname $MAIN)
          cat > $MAIN << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.graphics.*;
          import android.Manifest;
          import android.net.Uri;
          import android.os.*;
          import android.provider.MediaStore;
          import android.webkit.*;
          import android.widget.Toast;
          import androidx.core.app.*;
          import androidx.core.content.*;
          import com.getcapacitor.BridgeActivity;
          import java.io.*;
          import java.net.*;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends BridgeActivity {

              // ── Constants ──────────────────────────────────────────────────────────────
              private static final String DL_CH    = "walls_downloads";
              private static final String PROMO_CH = "walls_promo";
              private static final String TREND_CH = "walls_trending";
              private static final int NOTIF_ING  = 2001, NOTIF_DONE = 2002,
                                       NOTIF_WELCOME = 4001, NOTIF_TREND = 5001;
              private static final long TIMEOUT_MS = 60_000;
              private static final String WALLS_FOLDER = "Walls";
              private static final String AUTHORITY    = "ng.name.ovrica.walls.fileprovider";
              private static final String BASE_URL     = "https://walls.ovrica.name.ng";

              // ── State ──────────────────────────────────────────────────────────────────
              private DownloadManager dm;
              private NotificationManager nm;
              private BroadcastReceiver dlReceiver;
              private Handler progressHandler = new Handler(Looper.getMainLooper());
              private Runnable progressRunnable;
              private long lastId = -1, downloadStartTime = 0;
              private String lastFile = "", lastLocalPath = "";

              // ── Lifecycle ──────────────────────────────────────────────────────────────
              @Override
              public void onStart() {
                  super.onStart();
                  dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                  nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  mkChannel(DL_CH,    "Walls Downloads",     "Wallpaper download notifications");
                  mkChannel(PROMO_CH, "Wallpaper Reminders", "Periodic reminders");
                  mkChannel(TREND_CH, "Trending Wallpapers", "Hot & trending wallpaper picks");
                  if (Build.VERSION.SDK_INT >= 33 && ContextCompat.checkSelfPermission(this,
                          Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED)
                      ActivityCompat.requestPermissions(this,
                          new String[]{Manifest.permission.POST_NOTIFICATIONS}, 1001);
                  if (getBridge() != null && getBridge().getWebView() != null) {
                      getBridge().getWebView().getSettings().setTextZoom(100);
                      setupWebViewLoader();
                      setupDownload();
                  }
                  registerDlReceiver();
                  scheduleReminder();
                  handleDeepLink(getIntent());
                  showWelcome();
                  checkForUpdate();
              }

              @Override public void onNewIntent(Intent i) { super.onNewIntent(i); handleDeepLink(i); }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  stopProgressPolling();
                  if (dlReceiver != null) try { unregisterReceiver(dlReceiver); } catch (Exception ignored) {}
              }

              // ── WebView loader (fade-in) ────────────────────────────────────────────────
              private void setupWebViewLoader() {
                  WebView wv = getBridge().getWebView();
                  wv.setBackgroundColor(Color.parseColor("#0a0a0a"));
                  wv.setAlpha(0f);
                  wv.setWebViewClient(new WebViewClient() {
                      @Override public void onPageFinished(WebView v, String url) {
                          v.animate().alpha(1f).setDuration(400).start();
                      }
                      @Override public void onReceivedError(WebView v, WebResourceRequest req, WebResourceError err) {
                          if (req.isForMainFrame()) v.animate().alpha(1f).setDuration(200).start();
                      }
                  });
              }

              // ── Notification helpers ───────────────────────────────────────────────────
              private void mkChannel(String id, String name, String desc) {
                  if (Build.VERSION.SDK_INT < 26) return;
                  NotificationChannel ch = new NotificationChannel(id, name, NotificationManager.IMPORTANCE_HIGH);
                  ch.setDescription(desc);
                  ch.enableVibration(true);
                  ch.setVibrationPattern(new long[]{0, 250, 100, 250});
                  ch.setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI,
                      new android.media.AudioAttributes.Builder()
                          .setUsage(android.media.AudioAttributes.USAGE_NOTIFICATION).build());
                  nm.createNotificationChannel(ch);
              }

              private NotificationCompat.Builder notif(String ch, int icon, String title, String text) {
                  return new NotificationCompat.Builder(this, ch)
                      .setSmallIcon(icon).setContentTitle(title).setContentText(text)
                      .setDefaults(NotificationCompat.DEFAULT_ALL);
              }

              private PendingIntent launchIntent() {
                  return PendingIntent.getActivity(this, 0,
                      getPackageManager().getLaunchIntentForPackage(getPackageName()),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
              }

              // ── Deep link ─────────────────────────────────────────────────────────────
              private void handleDeepLink(Intent intent) {
                  if (intent == null) return;
                  Uri data = intent.getData();
                  if (data != null && getBridge() != null && getBridge().getWebView() != null)
                      runOnUiThread(() -> getBridge().getWebView().loadUrl(data.toString()));
              }

              // ── Welcome notification ──────────────────────────────────────────────────
              private void showWelcome() {
                  SharedPreferences prefs = getSharedPreferences("walls_prefs", MODE_PRIVATE);
                  boolean first = prefs.getBoolean("first_launch", true);
                  if (first) prefs.edit().putBoolean("first_launch", false).apply();
                  nm.notify(NOTIF_WELCOME, notif(PROMO_CH, android.R.drawable.ic_menu_gallery,
                      first ? "Welcome to Walls 🖼️" : "Welcome back ✨",
                      first ? "Discover stunning wallpapers curated for you."
                            : "Fresh wallpapers are waiting. Find your next favorite.")
                      .setContentIntent(launchIntent()).setAutoCancel(true).build());
              }

              // ── Update check ──────────────────────────────────────────────────────────
              private void checkForUpdate() {
                  String current;
                  try { current = getPackageManager().getPackageInfo(getPackageName(), 0).versionName; }
                  catch (Exception e) { current = "1.0.0"; }
                  final String cv = current;
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(BASE_URL + "/version.json").openConnection();
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000);
                          conn.setRequestProperty("Cache-Control", "no-cache");
                          if (conn.getResponseCode() != 200) return;
                          BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder(); String line;
                          while ((line = br.readLine()) != null) sb.append(line);
                          br.close();
                          String json   = sb.toString();
                          String latest = json.replaceAll(".*\"latest\"\\s*:\\s*\"([^\"]+)\".*", "$1");
                          String minVer = json.replaceAll(".*\"minVersion\"\\s*:\\s*\"([^\"]+)\".*", "$1");
                          if (!latest.equals(json) && isNewer(latest, cv)) {
                              boolean forced = isNewer(minVer, cv);
                              runOnUiThread(() -> showUpdateDialog(cv, latest, forced));
                          }
                      } catch (Exception ignored) {}
                  }).start();
              }

              private boolean isNewer(String a, String b) {
                  try {
                      String[] av = a.split("\\."), bv = b.split("\\.");
                      for (int i = 0; i < Math.max(av.length, bv.length); i++) {
                          int ai = i < av.length ? Integer.parseInt(av[i].trim()) : 0;
                          int bi = i < bv.length ? Integer.parseInt(bv[i].trim()) : 0;
                          if (ai != bi) return ai > bi;
                      }
                  } catch (Exception ignored) {}
                  return false;
              }

              private void showUpdateDialog(String current, String latest, boolean forced) {
                  AlertDialog.Builder b = new AlertDialog.Builder(this)
                      .setTitle(forced ? "Update Required" : "Update Available")
                      .setMessage("Current: v" + current + "\nLatest: v" + latest
                          + (forced ? "\n\nThis update is required to continue." : ""))
                      .setPositiveButton("Update Now", (dlg, w) -> {
                          startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(BASE_URL + "/download")));
                          if (forced) finish();
                      });
                  if (!forced) b.setNegativeButton("Later", (dlg, w) -> dlg.dismiss());
                  AlertDialog d = b.create();
                  d.setCancelable(!forced);
                  d.show();
              }

              // ── Download setup ────────────────────────────────────────────────────────
              private void setupDownload() {
                  getBridge().getWebView().setDownloadListener((url, ua, cd, mime, len) -> {
                      lastFile = URLUtil.guessFileName(url, cd, mime);
                      if (!lastFile.contains(".")) lastFile += ".jpg";
                      downloadStartTime = System.currentTimeMillis();
                      lastLocalPath = "";
                      runOnUiThread(() -> Toast.makeText(this, "Starting download…", Toast.LENGTH_SHORT).show());
                      nm.notify(NOTIF_ING, notif(DL_CH, android.R.drawable.stat_sys_download,
                          "Downloading", lastFile).setProgress(0, 0, true).setOngoing(true).build());
                      try {
                          new File(android.os.Environment.getExternalStoragePublicDirectory(
                              android.os.Environment.DIRECTORY_PICTURES), WALLS_FOLDER).mkdirs();
                          DownloadManager.Request req = new DownloadManager.Request(Uri.parse(url));
                          req.setTitle(lastFile).setDescription("Downloading wallpaper…")
                             .setMimeType(mime).addRequestHeader("User-Agent", ua)
                             .setDestinationInExternalPublicDir(
                                 android.os.Environment.DIRECTORY_PICTURES, WALLS_FOLDER + "/" + lastFile)
                             .setNotificationVisibility(DownloadManager.Request.VISIBILITY_HIDDEN);
                          lastId = dm.enqueue(req);
                          startProgressPolling();
                      } catch (Exception e) {
                          nm.cancel(NOTIF_ING);
                          runOnUiThread(() -> Toast.makeText(this, "Download failed: " + e.getMessage(), Toast.LENGTH_LONG).show());
                      }
                  });
              }

              // ── Progress polling ──────────────────────────────────────────────────────
              private void startProgressPolling() {
                  stopProgressPolling();
                  progressRunnable = new Runnable() {
                      @Override public void run() {
                          if (lastId == -1) return;
                          if (System.currentTimeMillis() - downloadStartTime > TIMEOUT_MS) {
                              dm.remove(lastId); lastId = -1; nm.cancel(NOTIF_ING);
                              nm.notify(NOTIF_DONE, notif(DL_CH, android.R.drawable.stat_notify_error,
                                  "Download Timed Out", "\"" + lastFile + "\" took too long.")
                                  .setAutoCancel(true).build());
                              runOnUiThread(() -> Toast.makeText(MainActivity.this, "Download timed out.", Toast.LENGTH_LONG).show());
                              return;
                          }
                          Cursor c = dm.query(new DownloadManager.Query().setFilterById(lastId));
                          if (c == null || !c.moveToFirst()) { if (c != null) c.close(); progressHandler.postDelayed(this, 1000); return; }
                          int sCol = c.getColumnIndex(DownloadManager.COLUMN_STATUS);
                          long dl  = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_BYTES_DOWNLOADED_SO_FAR));
                          long tot = c.getLong(c.getColumnIndex(DownloadManager.COLUMN_TOTAL_SIZE_BYTES));
                          int uCol = c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI);
                          if (uCol != -1 && c.getString(uCol) != null) lastLocalPath = c.getString(uCol);
                          int status = sCol != -1 ? c.getInt(sCol) : -1;
                          c.close();
                          if (status == DownloadManager.STATUS_RUNNING || status == DownloadManager.STATUS_PAUSED) {
                              if (tot > 0) {
                                  int pct = (int)(dl * 100L / tot);
                                  String sz = dl < 1<<20 ? String.format("%.1f KB", dl/1024f) : String.format("%.1f MB", dl/(1024f*1024));
                                  nm.notify(NOTIF_ING, notif(DL_CH, android.R.drawable.stat_sys_download,
                                      "Downloading", sz + " / " + (tot < 1<<20 ? String.format("%.1f KB", tot/1024f) : String.format("%.1f MB", tot/(1024f*1024))))
                                      .setProgress(100, pct, false).setOngoing(true).build());
                              }
                              progressHandler.postDelayed(this, 1000);
                          } else { stopProgressPolling(); }
                      }
                  };
                  progressHandler.postDelayed(progressRunnable, 500);
              }

              private void stopProgressPolling() {
                  if (progressRunnable != null) { progressHandler.removeCallbacks(progressRunnable); progressRunnable = null; }
              }

              // ── Download complete receiver ─────────────────────────────────────────────
              private void registerDlReceiver() {
                  dlReceiver = new BroadcastReceiver() {
                      @Override public void onReceive(Context ctx, Intent intent) {
                          long id = intent.getLongExtra(DownloadManager.EXTRA_DOWNLOAD_ID, -1);
                          if (id != lastId) return;
                          stopProgressPolling();
                          Cursor c = dm.query(new DownloadManager.Query().setFilterById(id));
                          if (c == null || !c.moveToFirst()) { if (c != null) c.close(); return; }
                          int status  = c.getInt(c.getColumnIndex(DownloadManager.COLUMN_STATUS));
                          int uCol    = c.getColumnIndex(DownloadManager.COLUMN_LOCAL_URI);
                          String uri  = uCol != -1 ? c.getString(uCol) : null;
                          c.close();
                          nm.cancel(NOTIF_ING);
                          runOnUiThread(() -> {
                              if (status == DownloadManager.STATUS_SUCCESSFUL && uri != null) {
                                  onDownloadSuccess(ctx, uri);
                              } else {
                                  nm.notify(NOTIF_DONE, notif(DL_CH, android.R.drawable.stat_notify_error,
                                      "Download Failed", "Could not download \"" + lastFile + "\".")
                                      .setAutoCancel(true).build());
                                  Toast.makeText(ctx, "Download failed. Please try again.", Toast.LENGTH_SHORT).show();
                              }
                          });
                      }
                  };
                  IntentFilter f = new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE);
                  if (Build.VERSION.SDK_INT >= 33) registerReceiver(dlReceiver, f, RECEIVER_NOT_EXPORTED);
                  else registerReceiver(dlReceiver, f);
              }

              // ── Set wallpaper directly ─────────────────────────────────────────────────
              // Called after a successful download. Shows a dialog: Home / Lock / Both / Cancel.
              private void onDownloadSuccess(Context ctx, String localUri) {
                  try {
                      File file = new File(Uri.parse(localUri).getPath());
                      // Scan into MediaStore
                      ContentValues cv = new ContentValues();
                      cv.put(MediaStore.Images.Media.DISPLAY_NAME, lastFile);
                      cv.put(MediaStore.Images.Media.MIME_TYPE, "image/jpeg");
                      cv.put(MediaStore.Images.Media.RELATIVE_PATH,
                          android.os.Environment.DIRECTORY_PICTURES + "/" + WALLS_FOLDER);
                      getContentResolver().insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, cv);

                      // Show "Set as wallpaper" dialog
                      new AlertDialog.Builder(this)
                          .setTitle("Set as Wallpaper")
                          .setMessage("Choose where to apply \"" + lastFile + "\"")
                          .setPositiveButton("Home Screen",   (d, w) -> applyWallpaper(file, android.app.WallpaperManager.FLAG_SYSTEM))
                          .setNeutralButton("Lock Screen",    (d, w) -> applyWallpaper(file, android.app.WallpaperManager.FLAG_LOCK))
                          .setNegativeButton("Both",          (d, w) -> applyWallpaper(file, android.app.WallpaperManager.FLAG_SYSTEM | android.app.WallpaperManager.FLAG_LOCK))
                          .create().show();

                      // Success notification
                      Uri safeUri = FileProvider.getUriForFile(ctx, AUTHORITY, file);
                      Intent chooser = Intent.createChooser(
                          new Intent(Intent.ACTION_ATTACH_DATA).setDataAndType(safeUri, "image/*")
                              .addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)
                              .putExtra("mimeType", "image/*"),
                          "Set as wallpaper");
                      nm.notify(NOTIF_DONE, notif(DL_CH, android.R.drawable.stat_sys_download_done,
                          "Wallpaper Saved!", "Tap to set \"" + lastFile + "\" as wallpaper")
                          .setContentIntent(PendingIntent.getActivity(ctx, 0, chooser,
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE))
                          .setAutoCancel(true).build());
                  } catch (Exception e) {
                      nm.notify(NOTIF_DONE, notif(DL_CH, android.R.drawable.stat_notify_error,
                          "Error", "Saved but could not open: " + e.getMessage()).setAutoCancel(true).build());
                  }
              }

              // Applies wallpaper on a background thread (bitmap decode + WallpaperManager)
              private void applyWallpaper(File file, int flags) {
                  new Thread(() -> {
                      try {
                          Bitmap bmp = BitmapFactory.decodeFile(file.getAbsolutePath());
                          if (bmp == null) throw new Exception("Could not decode image");
                          android.app.WallpaperManager wm = android.app.WallpaperManager.getInstance(this);
                          if (Build.VERSION.SDK_INT >= 24) {
                              wm.setBitmap(bmp, null, true, flags);
                          } else {
                              wm.setBitmap(bmp);
                          }
                          runOnUiThread(() -> Toast.makeText(this,
                              "Wallpaper set! 🎉", Toast.LENGTH_SHORT).show());
                      } catch (Exception e) {
                          runOnUiThread(() -> Toast.makeText(this,
                              "Could not set wallpaper: " + e.getMessage(), Toast.LENGTH_LONG).show());
                      }
                  }).start();
              }

              // ── Reminder scheduling ───────────────────────────────────────────────────
              private void scheduleReminder() {
                  AlarmManager am = (AlarmManager) getSystemService(ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(this, 0,
                      new Intent(this, WallpaperReminderReceiver.class),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  am.setRepeating(AlarmManager.RTC_WAKEUP,
                      System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6),
                      TimeUnit.HOURS.toMillis(6), pi);
              }
          }
          EOF

      # ── 4. WallpaperReminderReceiver (unchanged, kept slim) ─────────────────
      - name: Write WallpaperReminderReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallpaperReminderReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;
          import android.app.*;
          import android.content.*;
          import android.graphics.*;
          import android.net.Uri;
          import android.os.*;
          import androidx.core.app.NotificationCompat;
          import java.io.*;
          import java.net.*;
          import java.util.*;
          import java.util.regex.*;

          public class WallpaperReminderReceiver extends BroadcastReceiver {
              private static final String BASE_URL  = "https://walls.ovrica.name.ng";
              private static final String TREND_CH  = "walls_trending";
              private static final int    NOTIF_TREND = 5001;

              @Override public void onReceive(Context ctx, Intent intent) {
                  NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(BASE_URL + "/hot.json").openConnection();
                          conn.setConnectTimeout(6000); conn.setReadTimeout(6000);
                          conn.setRequestProperty("Cache-Control", "no-cache");
                          if (conn.getResponseCode() != 200) { fallback(ctx, nm); return; }
                          BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          StringBuilder sb = new StringBuilder(); String line;
                          while ((line = br.readLine()) != null) sb.append(line);
                          br.close();
                          String json = sb.toString();
                          List<String> titles = new ArrayList<>(), imgUrls = new ArrayList<>();
                          Matcher mt = Pattern.compile("\"title\"\\s*:\\s*\"([^\"]+)\"").matcher(json);
                          while (mt.find() && titles.size() < 5) titles.add(mt.group(1));
                          Matcher mu = Pattern.compile("\"(?:image_url|url|thumbnail)\"\\s*:\\s*\"([^\"]+)\"").matcher(json);
                          while (mu.find() && imgUrls.size() < 5) imgUrls.add(mu.group(1));
                          if (titles.isEmpty()) { fallback(ctx, nm); return; }
                          Bitmap bigPic = null;
                          if (!imgUrls.isEmpty()) try {
                              HttpURLConnection ic = (HttpURLConnection) new URL(imgUrls.get(0)).openConnection();
                              ic.setConnectTimeout(5000); ic.setReadTimeout(5000);
                              bigPic = BitmapFactory.decodeStream(ic.getInputStream());
                          } catch (Exception ignored) {}
                          NotificationCompat.InboxStyle inbox = new NotificationCompat.InboxStyle()
                              .setBigContentTitle("🔥 Trending on Walls").setSummaryText(titles.size() + " hot wallpapers");
                          for (String t : titles) inbox.addLine("🖼️  " + t);
                          PendingIntent pi = PendingIntent.getActivity(ctx, 0,
                              ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                          NotificationCompat.Builder nb = new NotificationCompat.Builder(ctx, TREND_CH)
                              .setSmallIcon(android.R.drawable.ic_menu_gallery)
                              .setContentTitle("🔥 Trending on Walls")
                              .setContentText(titles.get(0) + (titles.size() > 1 ? " + " + (titles.size()-1) + " more" : ""))
                              .setStyle(inbox).setPriority(NotificationCompat.PRIORITY_HIGH)
                              .setDefaults(NotificationCompat.DEFAULT_ALL)
                              .setVibrate(new long[]{0, 250, 100, 250})
                              .setSound(android.provider.Settings.System.DEFAULT_NOTIFICATION_URI)
                              .setContentIntent(pi).setAutoCancel(true);
                          if (bigPic != null) nb.setLargeIcon(bigPic);
                          nm.notify(NOTIF_TREND, nb.build());
                      } catch (Exception e) { fallback(ctx, nm); }
                  }).start();
              }

              private void fallback(Context ctx, NotificationManager nm) {
                  PendingIntent pi = PendingIntent.getActivity(ctx, 0,
                      ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  nm.notify(NOTIF_TREND, new NotificationCompat.Builder(ctx, TREND_CH)
                      .setSmallIcon(android.R.drawable.ic_menu_gallery)
                      .setContentTitle("New wallpapers are waiting 🖼️")
                      .setContentText("Fresh picks are live on Walls. Come see what's new.")
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .setContentIntent(pi).setAutoCancel(true).build());
              }
          }
          EOF

      # ── 5. Sync static files, icons, splash ──────────────────────────────────
      - name: Assets, sync, icons
        run: |
          sudo apt-get install -y imagemagick -q
          mkdir -p android/app/src/main/assets
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          npx cap sync android

          LOGO="public/icons/icon-512x512.png"
          RES="android/app/src/main/res"
          for cfg in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            folder="${cfg%%:*}"; size="${cfg##*:}"
            mkdir -p "$RES/$folder"
            convert "$LOGO" -resize "${size}x${size}" "$RES/$folder/ic_launcher.png"
            cp "$RES/$folder/ic_launcher.png" "$RES/$folder/ic_launcher_round.png"
          done
          mkdir -p "$RES/drawable" "$RES/drawable-land"
          convert -size 2048x2048 xc:"#0a0a0a" \( "$LOGO" -resize 512x512 \) -gravity center -composite "$RES/drawable/splash.png"
          cp "$RES/drawable/splash.png" "$RES/drawable-land/splash.png"
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:icon="[^"]*"/android:icon="@mipmap\/ic_launcher"/' $M
          sed -i 's/android:roundIcon="[^"]*"/android:roundIcon="@mipmap\/ic_launcher_round"/' $M

      # ── 6. Patch manifest ─────────────────────────────────────────────────────
      - name: Patch AndroidManifest
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, re

          ET.register_namespace('android', 'http://schemas.android.com/apk/res/android')
          ET.register_namespace('tools', 'http://schemas.android.com/tools')
          ET.register_namespace('', '')

          path = 'android/app/src/main/AndroidManifest.xml'
          content = open(path).read()

          for perm in [
              'android.permission.INTERNET',
              'android.permission.DOWNLOAD_WITHOUT_NOTIFICATION',
              'android.permission.ACCESS_NETWORK_STATE',
              'android.permission.READ_MEDIA_IMAGES',
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.SET_WALLPAPER',
              'android.permission.SET_WALLPAPER_HINTS',
              'android.permission.SCHEDULE_EXACT_ALARM',
              'android.permission.RECEIVE_BOOT_COMPLETED',
              'android.permission.WAKE_LOCK',
          ]:
              if f'android:name="{perm}"' not in content:
                  content = content.replace('<application', f'    <uses-permission android:name="{perm}" />\n    <application', 1)

          for perm, maxSdk in [('android.permission.WRITE_EXTERNAL_STORAGE','28'), ('android.permission.READ_EXTERNAL_STORAGE','32')]:
              if f'android:name="{perm}"' not in content:
                  content = content.replace('<application', f'    <uses-permission android:name="{perm}" android:maxSdkVersion="{maxSdk}" />\n    <application', 1)

          content = re.sub(r'(<activity\b(?![^>]*android:exported)[^>]*MainActivity[^>]*)', r'\1 android:exported="true"', content)

          if 'walls.ovrica.name.ng' not in content:
              content = content.replace('</activity>',
                  '\n                <intent-filter android:autoVerify="true">'
                  '\n                    <action android:name="android.intent.action.VIEW" />'
                  '\n                    <category android:name="android.intent.category.DEFAULT" />'
                  '\n                    <category android:name="android.intent.category.BROWSABLE" />'
                  '\n                    <data android:scheme="https" android:host="walls.ovrica.name.ng" />'
                  '\n                </intent-filter>\n        </activity>', 1)

          if 'fileprovider' not in content:
              content = content.replace('</application>',
                  '\n            <provider android:name="androidx.core.content.FileProvider"'
                  ' android:authorities="ng.name.ovrica.walls.fileprovider"'
                  ' android:exported="false" android:grantUriPermissions="true">'
                  '\n                <meta-data android:name="android.support.FILE_PROVIDER_PATHS"'
                  ' android:resource="@xml/file_paths" />'
                  '\n            </provider>\n    </application>', 1)

          if 'WallpaperReminderReceiver' not in content:
              content = content.replace('</application>',
                  '        <receiver android:name=".WallpaperReminderReceiver" android:exported="false" />\n    </application>', 1)

          open(path, 'w').write(content)
          print("Manifest patched OK")
          PYEOF
          cat >> android/build.gradle << 'EOF'
          subprojects { configurations.all { resolutionStrategy {
            force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
          } } }
          EOF

      # ── 7. Keystore + Build + Sign ────────────────────────────────────────────
      - name: Generate keystore
        run: |
          keytool -genkeypair -v -keystore walls.keystore \
            -alias walls -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Build
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Sign and package
        run: |
          BT=$ANDROID_SDK_ROOT/build-tools/34.0.0
          UNSIGNED=$(find android -name "app-release-unsigned.apk" | head -1)
          [ -z "$UNSIGNED" ] && echo "ERROR: No unsigned APK!" && exit 1
          $BT/zipalign -v -p 4 "$UNSIGNED" app-aligned.apk
          $BT/apksigner sign --ks walls.keystore --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out app-release-signed.apk app-aligned.apk
          $BT/apksigner verify --verbose app-release-signed.apk
          mkdir -p release && cp app-release-signed.apk release/
          AAB=$(find android -name "*.aab" | head -1)
          [ -n "$AAB" ] && cp "$AAB" release/app-release-bundle.aab
          keytool -list -v -keystore walls.keystore \
            -alias walls -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep "SHA256" > release/sha256.txt
          SHA256=$(sed 's/.*SHA256: //' release/sha256.txt)
          echo '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"ng.name.ovrica.walls","sha256_cert_fingerprints":["'"$SHA256"'"]}}]' \
            > release/assetlinks.json
          zip -j release/walls-release.zip \
            release/app-release-signed.apk release/app-release-bundle.aab \
            release/sha256.txt release/assetlinks.json

      - uses: actions/upload-artifact@v4
        with:
          name: walls-release
          path: ${{ github.workspace }}/release/walls-release.zip
          retention-days: 30