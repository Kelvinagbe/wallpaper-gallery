            -e 's|parent="Theme\.AppCompat\.Light\.DarkActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.DarkActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.Light"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            -e 's|parent="Theme\.AppCompat\.NoActionBar"|parent="Theme.AppCompat.DayNight.NoActionBar"|g' \
            "$STYLES"

          for qualifier in "values" "values-v31" "values-night" "values-night-v31"; do
