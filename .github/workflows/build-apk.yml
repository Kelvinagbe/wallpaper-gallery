name: Build Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Pre-write Android SDK license files
        run: |
          mkdir -p /usr/local/lib/android/sdk/licenses
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > /usr/local/lib/android/sdk/licenses/android-sdk-license
          printf "\nd56f5187479451eabf01fb78af6dfcb131a6481e\n84831b9409646a918e30573bab4c9c91346d8abd" >> /usr/local/lib/android/sdk/licenses/android-sdk-license
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd" > /usr/local/lib/android/sdk/licenses/android-sdk-preview-license
          printf "\n33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" > /usr/local/lib/android/sdk/licenses/google-gdk-license
          printf "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" > /usr/local/lib/android/sdk/licenses/android-googletv-license
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" > /usr/local/lib/android/sdk/licenses/intel-android-extra-license
          printf "\n33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" > /usr/local/lib/android/sdk/licenses/mips-android-sysimage-license
          echo "License files pre-written."

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Re-write license files and install SDK packages
        run: |
          # Re-write after setup-android in case it overwrote them
          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf "\nd56f5187479451eabf01fb78af6dfcb131a6481e\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          printf "\n33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" > $ANDROID_SDK_ROOT/licenses/google-gdk-license
          printf "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" > $ANDROID_SDK_ROOT/licenses/android-googletv-license
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" > $ANDROID_SDK_ROOT/licenses/intel-android-extra-license
          printf "\n33b6937b7c5e5d694e7f30d6c9aab2bd58b9a2c4" > $ANDROID_SDK_ROOT/licenses/mips-android-sysimage-license
          echo "Licenses ready. Installing SDK packages..."
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>/dev/null || true
          echo "Done."

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npx next build
        env:
          NODE_ENV: production

      - name: Verify Next.js output folder
        run: |
          if [ -d "out" ]; then
            echo "Found: out/"
            ls -la out/
          else
            echo "ERROR: No out/ folder. Make sure next.config.js has output: 'export'"
            exit 1
          fi

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create capacitor.config.json if not present
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.js" ] && [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.json << EOF
          {
            "appId": "ng.name.ovrica.walls",
            "appName": "Walls",
            "webDir": "out",
            "bundledWebRuntime": false,
            "android": {
              "minSdkVersion": 21
            }
          }
          EOF
            echo "capacitor.config.json created."
          else
            echo "Capacitor config already exists."
          fi

      - name: Add Android platform if not present
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android folder already exists."
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Walls, OU=App, O=Walls, L=Lagos, S=Lagos, C=NG"

      - name: Build release APK and AAB with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace
          echo "=== APKs ==="
          find . -name "*.apk"
          echo "=== AABs ==="
          find . -name "*.aab"

      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/34.0.0
          UNSIGNED=$(find ${{ github.workspace }}/android -name "*release*.apk" | grep -v signed | head -1)
          echo "Signing: $UNSIGNED"
          $BUILD_TOOLS/zipalign -v -p 4 "$UNSIGNED" ${{ github.workspace }}/app-aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks ${{ github.workspace }}/walls.keystore \
            --ks-key-alias walls \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out ${{ github.workspace }}/app-release-signed.apk \
            ${{ github.workspace }}/app-aligned.apk
          $BUILD_TOOLS/apksigner verify --verbose ${{ github.workspace }}/app-release-signed.apk
          echo "APK signed successfully."

      - name: Copy AAB
        run: |
          AAB=$(find ${{ github.workspace }}/android -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" ${{ github.workspace }}/app-release-bundle.aab
            echo "AAB copied: $AAB"
          fi

      - name: Get SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore ${{ github.workspace }}/walls.keystore \
            -alias walls \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep "SHA256" > sha256.txt
          cat sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: walls-capacitor-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
            sha256.txt
          retention-days: 30
