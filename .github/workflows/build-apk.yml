      # ─── WallsFirebaseMessagingService.java ──────────────────────────────────
      # Firebase Console → Custom data keys:
      #   title      → notification title
      #   body       → notification body text
      #   url        → open URL in WebView on tap
      #   image_url  → single image BigPicture style
      #   images     → comma-separated URLs for 6-image grid
      #   total      → total count → shows "+N More" on last grid cell
      #   channel    → walls_trending | walls_promo | walls_downloads
      #
      # IMPORTANT: To show image in Firebase notification you MUST send as
      # data-only message (no "notification" key in payload), only "data" key.
      # Firebase Console: use "Additional options > Custom data" for image_url.
      - name: Write WallsFirebaseMessagingService.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallsFirebaseMessagingService.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*;
          import android.content.*;
          import android.graphics.*;
          import android.os.Build;
          import android.widget.RemoteViews;
          import androidx.core.app.NotificationCompat;
          import com.google.firebase.messaging.FirebaseMessagingService;
          import com.google.firebase.messaging.RemoteMessage;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.Map;

          public class WallsFirebaseMessagingService extends FirebaseMessagingService {
              private static final int NOTIF_ID = 6001;

              @Override
              public void onNewToken(String token) {
                  super.onNewToken(token);
                  getSharedPreferences(MainActivity.PREF_FILE, MODE_PRIVATE).edit().putString("fcm_token", token).apply();
                  android.util.Log.d("FCM", "New token: " + token);
              }

              @Override
              public void onMessageReceived(RemoteMessage message) {
                  super.onMessageReceived(message);
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  Map<String, String> data = message.getData();

                  String title   = get(data, "title",   message.getNotification() != null ? message.getNotification().getTitle() : null);
                  String body    = get(data, "body",    message.getNotification() != null ? message.getNotification().getBody()  : null);
                  String url     = get(data, "url",     null);
                  String imgUrl  = get(data, "image_url", null);
                  // FIX: also check FCM notification object's imageUrl field (set via Firebase Console "Image" field)
                  if (imgUrl == null && message.getNotification() != null && message.getNotification().getImageUrl() != null)
                      imgUrl = message.getNotification().getImageUrl().toString();
                  String images  = get(data, "images",  null);
                  String channel = get(data, "channel", MainActivity.TREND_CH);
                  int    total   = 0;
                  try { total = Integer.parseInt(data.getOrDefault("total", "0")); } catch (Exception ignored) {}
                  if (title == null) title = "🔥 New Wallpapers!";
                  if (body  == null) body  = "Fresh picks are live on Walls.";

                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel ch = new NotificationChannel(channel, "Trending Wallpapers", NotificationManager.IMPORTANCE_HIGH);
                      ch.setDescription("FCM push"); ch.enableVibration(true); ch.setVibrationPattern(new long[]{0,250,100,250});
                      nm.createNotificationChannel(ch);
                  }

                  Intent tapIntent = getPackageManager().getLaunchIntentForPackage(getPackageName());
                  if (url != null && !url.isEmpty()) {
                      tapIntent = new Intent(this, MainActivity.class);
                      tapIntent.putExtra("open_url", url);
                      tapIntent.addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  }
                  final PendingIntent pi = PendingIntent.getActivity(this, 0, tapIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);

                  final String fTitle = title, fBody = body, fChannel = channel, fImgUrl = imgUrl, fImages = images;
                  final int fTotal = total;

                  new Thread(() -> {
                      NotificationCompat.Builder nb = new NotificationCompat.Builder(this, fChannel)
                          .setSmallIcon(R.drawable.ic_notification)
                          .setContentTitle(fTitle).setContentText(fBody)
                          .setPriority(NotificationCompat.PRIORITY_HIGH)
                          .setDefaults(NotificationCompat.DEFAULT_ALL)
                          .setVibrate(new long[]{0,250,100,250})
                          .setContentIntent(pi).setAutoCancel(true);

                      if (fImages != null && !fImages.isEmpty()) {
                          // 6-image grid style
                          String[] urls = fImages.split(",");
                          Bitmap[] bitmaps = new Bitmap[6];
                          for (int i = 0; i < Math.min(urls.length, 6); i++) {
                              bitmaps[i] = fetchBitmap(urls[i].trim(), 2);
                          }
                          RemoteViews rv = new RemoteViews(getPackageName(), R.layout.notification_grid);
                          rv.setTextViewText(R.id.notif_title, fTitle);
                          int[] imgIds = { R.id.img1, R.id.img2, R.id.img3, R.id.img4, R.id.img5, R.id.img6 };
                          for (int i = 0; i < 6; i++) {
                              if (bitmaps[i] != null) rv.setImageViewBitmap(imgIds[i], bitmaps[i]);
                              else                    rv.setImageViewResource(imgIds[i], R.mipmap.ic_launcher);
                          }
                          int extra = fTotal > 6 ? fTotal - 5 : 0;
                          rv.setTextViewText(R.id.more_text, extra > 0 ? "+" + extra + " More" : "");
                          nb.setCustomBigContentView(rv).setStyle(new NotificationCompat.DecoratedCustomViewStyle());

                      } else if (fImgUrl != null && !fImgUrl.isEmpty()) {
                          // Single BigPicture — FIX: higher res fetch (inSampleSize=1) + setLargeIcon
                          Bitmap bmp = fetchBitmap(fImgUrl, 1);
                          if (bmp != null) {
                              nb.setLargeIcon(bmp);
                              nb.setStyle(new NotificationCompat.BigPictureStyle()
                                  .bigPicture(bmp)
                                  .bigLargeIcon((Bitmap) null)
                                  .setBigContentTitle(fTitle)
                                  .setSummaryText(fBody));
                          }
                      }
                      nm.notify(NOTIF_ID, nb.build());
                  }).start();
              }

              // FIX: shared helper for downloading bitmaps with retry + proper stream close
              private Bitmap fetchBitmap(String imageUrl, int sampleSize) {
                  HttpURLConnection c = null;
                  try {
                      c = (HttpURLConnection) new URL(imageUrl).openConnection();
                      c.setConnectTimeout(8000); c.setReadTimeout(10000);
                      c.setRequestProperty("User-Agent", "Walls-Android/1.0");
                      c.connect();
                      if (c.getResponseCode() != 200) return null;
                      BitmapFactory.Options o = new BitmapFactory.Options();
                      o.inSampleSize = sampleSize;
                      InputStream is = c.getInputStream();
                      Bitmap bmp = BitmapFactory.decodeStream(is, null, o);
                      is.close();
                      return bmp;
                  } catch (Exception e) {
                      android.util.Log.e("FCM", "fetchBitmap failed: " + imageUrl + " — " + e.getMessage());
                      return null;
                  } finally {
                      if (c != null) c.disconnect();
                  }
              }

              private String get(Map<String,String> d, String key, String fallback) {
                  String v = d.get(key); return (v != null && !v.isEmpty()) ? v : fallback;
              }
          }
          EOF

      # ─── WallpaperReminderReceiver.java ───────────────────────────────────────
      - name: Write WallpaperReminderReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/WallpaperReminderReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;

          import android.app.*; import android.content.*; import android.graphics.*;
          import android.os.*; import androidx.core.app.NotificationCompat;
          import java.util.concurrent.TimeUnit;

          public class WallpaperReminderReceiver extends BroadcastReceiver {
              private static final int NOTIF_ID = 5001;

              @Override
              public void onReceive(Context ctx, Intent intent) {
                  reschedule(ctx);
                  NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel ch = new NotificationChannel(MainActivity.TREND_CH, "Trending Wallpapers", NotificationManager.IMPORTANCE_HIGH);
                      ch.setDescription("Hot & trending wallpaper picks"); ch.enableVibration(true);
                      nm.createNotificationChannel(ch);
                  }
                  Bitmap appIcon = null;
                  try { appIcon = BitmapFactory.decodeResource(ctx.getResources(), R.mipmap.ic_launcher); } catch (Exception ignored) {}
                  PendingIntent pi = PendingIntent.getActivity(ctx, 0,
                      ctx.getPackageManager().getLaunchIntentForPackage(ctx.getPackageName()),
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  NotificationCompat.Builder nb = new NotificationCompat.Builder(ctx, MainActivity.TREND_CH)
                      .setSmallIcon(R.drawable.ic_notification)
                      .setContentTitle("🔥 Hot wallpapers waiting!")
                      .setContentText("Fresh picks are live on Walls. Come see what's new.")
                      .setPriority(NotificationCompat.PRIORITY_HIGH).setDefaults(NotificationCompat.DEFAULT_ALL)
                      .setVibrate(new long[]{0,250,100,250}).setContentIntent(pi).setAutoCancel(true);
                  if (appIcon != null) nb.setLargeIcon(appIcon);
                  nm.notify(NOTIF_ID, nb.build());
              }

              private void reschedule(Context ctx) {
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(ctx, 0, new Intent(ctx, WallpaperReminderReceiver.class), PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(6);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi);
                  else am.set(AlarmManager.RTC_WAKEUP, next, pi);
              }
          }
          EOF

      # ─── BootReceiver.java ────────────────────────────────────────────────────
      - name: Write BootReceiver.java
        run: |
          FILE=android/app/src/main/java/ng/name/ovrica/walls/BootReceiver.java
          mkdir -p $(dirname $FILE)
          cat > $FILE << 'EOF'
          package ng.name.ovrica.walls;
          import android.app.*; import android.content.*; import android.os.Build;
          import java.util.concurrent.TimeUnit;

          public class BootReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context ctx, Intent intent) {
                  if (!Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction()) &&
                      !"android.intent.action.QUICKBOOT_POWERON".equals(intent.getAction())) return;
                  AlarmManager am = (AlarmManager) ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = PendingIntent.getBroadcast(ctx, 0, new Intent(ctx, WallpaperReminderReceiver.class), PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  long next = System.currentTimeMillis() + TimeUnit.HOURS.toMillis(1);
                  if (Build.VERSION.SDK_INT >= 23) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, next, pi);
                  else am.set(AlarmManager.RTC_WAKEUP, next, pi);
              }
          }
          EOF

