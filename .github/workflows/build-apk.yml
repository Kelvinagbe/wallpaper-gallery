              // ── Deep Link: opens the exact URL path in WebView ──────────────────────
              // FIX: uses launchMode=singleTask so Android 12+ re-uses existing instance.
              // The assetlinks.json generated at build time must be hosted at:
              //   https://walls.ovrica.name.ng/.well-known/assetlinks.json
              private void handleDeepLink(Intent intent) {
                  if (intent == null) return;
                  Uri data = intent.getData(); if (data == null) return;
                  // Only handle our domain — ignore capacitor:// and localhost
                  String host = data.getHost();
                  if (host == null || !host.contains("walls.ovrica.name.ng")) return;
                  String url = data.toString();
                  // If path is empty or "/", load index
                  String path = data.getPath();
                  if (path == null || path.isEmpty() || path.equals("/")) url = BASE_URL + "/";
                  final String finalUrl = url;
                  WebView wv = getBridge() != null ? getBridge().getWebView() : null;
                  if (wv == null) {
                      // WebView not ready yet — load after a short delay
                      final String u = finalUrl;
                      new Handler(Looper.getMainLooper()).postDelayed(() -> {
                          WebView wv2 = getBridge() != null ? getBridge().getWebView() : null;
                          if (wv2 != null) { showLoadingOverlay(wv2); wv2.loadUrl(u); }
                      }, 500);
                      return;
                  }
                  runOnUiThread(() -> { showLoadingOverlay(wv); wv.loadUrl(finalUrl); });
              }

